<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FNB App</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #e8e6e0}
    .header-title{font-size:15px;font-weight:700;color:#1a1a18}
    .header-right{display:flex;align-items:center;gap:8px}
    .user-chip{font-size:12px;color:#888;background:#f5f5f0;padding:4px 10px;border-radius:20px}
    .icon-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;text-decoration:none}
    .icon-btn:active{background:#e8e6e0}

    .greet{padding:18px 16px 4px}
    .greet-name{font-size:20px;font-weight:700}
    .greet-role{font-size:13px;color:#888;margin-top:3px}

    .stats-card{margin:12px 16px;background:#1D9E75;border-radius:16px;padding:16px 20px;display:flex;gap:0}
    .stat-item{flex:1;text-align:center}
    .stat-item+.stat-item{border-left:0.5px solid rgba(255,255,255,.3)}
    .stat-val{font-size:22px;font-weight:700;color:#fff}
    .stat-lbl{font-size:11px;color:rgba(255,255,255,.75);margin-top:3px}

    .section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:16px 16px 8px}
    .card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 24px}
    .feature-card{background:#fff;border-radius:16px;border:0.5px solid #e8e6e0;padding:18px 16px;cursor:pointer;text-decoration:none;display:flex;flex-direction:column;gap:10px;transition:background .12s}
    .feature-card:active{background:#f5f5f0}
    .feature-card.primary{background:#1D9E75;border-color:#1D9E75;grid-column:1/-1}
    .fc-icon{font-size:28px}
    .fc-label{font-size:14px;font-weight:600;color:#1a1a18}
    .fc-sub{font-size:12px;color:#888;margin-top:1px}
    .feature-card.primary .fc-label,.feature-card.primary .fc-sub{color:#fff}
    .feature-card.primary .fc-sub{color:rgba(255,255,255,.8)}

    .loading{text-align:center;padding:32px;color:#888;font-size:13px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:500}
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">FNB App</div>
  <div class="header-right">
<button class="icon-btn" onclick="showLogout()" title="Đăng xuất" style="color:#c0392b">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<div class="greet">
  <div class="greet-name" id="greetName"></div>
  <div class="greet-role" id="greetRole"></div>
</div>

<div id="statsWrap"></div>

<div class="section-title">Chức năng</div>
<div class="card-grid" id="cardGrid"><div class="loading">Đang tải...</div></div>

<!-- Đăng xuất -->
<div style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center" id="logoutOverlay" onclick="hideLogout()">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px" onclick="event.stopPropagation()">
    <div style="font-size:15px;font-weight:600;text-align:center">Đăng xuất?</div>
    <div style="font-size:13px;color:#888;text-align:center" id="logoutSub"></div>
    <button style="padding:14px;border-radius:12px;border:none;background:#FCEBEB;color:#A32D2D;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit" onclick="Auth.logout()">Đăng xuất</button>
    <button style="padding:14px;border-radius:12px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit" onclick="hideLogout()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../lib/utils.js"></script>
<script src="../auth/auth.js"></script>
<script src="./home.js"></script>
</body>
</html>
