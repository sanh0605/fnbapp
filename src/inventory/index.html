<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Nguyên liệu</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none}
    .header-title{font-size:15px;font-weight:600}
    .icon-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;font-family:inherit}
    .icon-btn:active{background:#e8e6e0}
    .tabs{background:#fff;display:flex;border-bottom:0.5px solid #e8e6e0;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:10px 16px;font-size:13px;font-weight:500;color:#888;text-align:center;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
    .tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
    .content{flex:1;overflow-y:auto;padding:12px 14px 24px;display:flex;flex-direction:column;gap:8px}
    .stock-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:13px 14px;display:flex;align-items:center;gap:12px}
    .stock-card.warn{border-color:#FAC775}
    .stock-card.danger{border-color:#F09595}
    .stock-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .stock-info{flex:1;min-width:0}
    .stock-name{font-size:14px;font-weight:500}
    .stock-detail{font-size:12px;color:#888;margin-top:2px}
    .stock-bar{height:3px;background:#e8e6e0;border-radius:2px;margin-top:6px;overflow:hidden}
    .stock-bar-fill{height:100%;border-radius:2px}
    .stock-bar-fill.ok{background:#1D9E75}
    .stock-bar-fill.warn{background:#EF9F27}
    .stock-bar-fill.danger{background:#E24B4A}
    .stock-amount{text-align:right;flex-shrink:0}
    .stock-num{font-size:16px;font-weight:600}
    .stock-num.warn{color:#BA7517}
    .stock-num.danger{color:#A32D2D}
    .stock-unit{font-size:11px;color:#888}
    .can-make-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:13px 14px;display:flex;align-items:center;gap:12px}
    .can-make-card.zero{opacity:.5}
    .cm-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .cm-info{flex:1}
    .cm-name{font-size:14px;font-weight:500}
    .cm-detail{font-size:12px;color:#888;margin-top:2px}
    .cm-count{font-size:20px;font-weight:700;color:#1D9E75;flex-shrink:0}
    .cm-count.zero{color:#888}
    .cm-unit{font-size:11px;color:#888;text-align:right}
    .receipt-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden}
    .receipt-header{padding:12px 14px;border-bottom:0.5px solid #e8e6e0;display:flex;justify-content:space-between;align-items:center}
    .receipt-title{font-size:13px;font-weight:500}
    .receipt-row{padding:10px 14px;border-bottom:0.5px solid #e8e6e0;display:flex;gap:10px;align-items:center}
    .receipt-row:last-child{border-bottom:none}
    .receipt-info{flex:1}
    .receipt-name{font-size:13px;font-weight:500}
    .receipt-detail{font-size:12px;color:#888;margin-top:2px}
    .receipt-amount{font-size:13px;font-weight:500;text-align:right}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:85dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600}
    .sheet-sub{font-size:13px;color:#888;margin-top:-8px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input,.field select{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field input:focus,.field select:focus{outline:none;border-color:#1D9E75;background:#fff}
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.primary:active{background:#0F6E56}
    .sheet-btn.secondary{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}
    .brew-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #e8e6e0}
    .brew-item:last-child{border-bottom:none}
    .brew-info{flex:1}
    .brew-name{font-size:14px;font-weight:500}
    .brew-recipe{font-size:12px;color:#888;margin-top:2px}
    .brew-btn{padding:7px 14px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}
    .brew-btn:disabled{opacity:.4;cursor:default}
    .info-box{background:#E6F1FB;border-radius:10px;padding:10px 14px;font-size:12px;color:#0C447C;line-height:1.6}
    .section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:4px 2px 0}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0;gap:8px;color:#bbb;font-size:13px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:400}
  </style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <a href="../home/index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="header-title">Nguyên liệu</span>
  </div>
  <div style="display:flex;gap:8px" id="headerBtns"></div>
</div>

<div class="tabs" id="tabBar"></div>
<div class="content" id="content"><div class="empty">Đang tải...</div></div>

<!-- SKU sheet -->
<div class="overlay" id="skuOverlay" onclick="hideSku()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="skuSheetTitle">Thêm SKU</div>
    <div class="field"><label>Mã SKU</label><input type="text" id="skuCode" placeholder="NVL-001"></div>
    <div class="field"><label>Tên SKU</label><input type="text" id="skuName" placeholder="Sữa tươi Mlekovita"></div>
    <div class="field"><label>Loại</label>
      <select id="skuType" onchange="onSkuTypeChange()">
        <option value="raw">Nguyên liệu thô (NVL)</option>
        <option value="supply">Vật tư tiêu hao (VTU)</option>
        <option value="equipment">Dụng cụ thiết bị (CCU)</option>
      </select>
    </div>
    <div class="field"><label>Map về nguyên liệu / vật tư</label>
      <select id="skuMapTo" onchange="onSkuMapToChange()"></select>
    </div>
    <div class="field"><label>Đơn vị cơ bản</label><input type="text" id="skuBaseUnit" placeholder="ml" readonly style="color:#888"></div>
    <div style="height:0.5px;background:#e8e6e0;margin:4px 0"></div>
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">Đơn vị tính</div>
    <div id="skuUnitsEditor"></div>
    <button class="sheet-btn primary" onclick="saveSku()">Lưu SKU</button>
    <button class="sheet-btn secondary" id="delSkuBtn" style="display:none;background:#FCEBEB;color:#A32D2D;border:none" onclick="deleteSku()">Xoá SKU này</button>
    <button class="sheet-btn secondary" onclick="hideSku()">Huỷ</button>
  </div>
</div>

<!-- Chi tiết nguyên liệu thô -->
<div class="overlay" id="rawDetailOverlay" onclick="hideRawDetail()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="rawDetailName"></div>
    <div class="sheet-sub" id="rawDetailStock"></div>
    <div id="rawDetailSkus"></div>
    <button class="sheet-btn secondary" onclick="hideRawDetail()">Đóng</button>
  </div>
</div>

<!-- Xuất huỷ -->
<div class="overlay" id="writeoffOverlay" onclick="hideWriteoff()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="woTitle">Xuất huỷ</div>

    <!-- View A: Danh sách chọn mặt hàng -->
    <div id="woViewList">
      <input id="woSearch" type="text" placeholder="Tìm nguyên liệu hoặc bán thành phẩm..."
        oninput="renderWriteoffList()"
        style="width:100%;padding:9px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px">
      <div id="woItemList" style="max-height:42vh;overflow-y:auto"></div>
      <div id="woCartBar" style="display:none;margin-top:10px;padding:10px 14px;background:#E1F5EE;border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="showWoView('review')">
        <span style="font-size:13px;color:#085041;font-weight:500" id="woCartBarText"></span>
        <span style="font-size:12px;color:#1D9E75;font-weight:600">Xem danh sách →</span>
      </div>
    </div>

    <!-- View B: Nhập số lượng cho mặt hàng vừa chọn -->
    <div id="woViewQty" style="display:none">
      <div id="woPendingInfo" style="background:#f5f5f0;border-radius:10px;padding:10px 12px;margin-bottom:14px"></div>
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:#888;font-weight:500;margin-bottom:6px">Số lượng (<span id="woPendingUnit"></span>)</div>
        <input id="woPendingQty" type="number" min="0.01" step="any" placeholder="0"
          style="width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:16px;font-family:inherit;outline:none">
      </div>
      <button class="sheet-btn primary" onclick="addToWoCart()">Thêm vào danh sách huỷ</button>
      <button class="sheet-btn secondary" onclick="showWoView('list')">← Quay lại</button>
    </div>

    <!-- View C: Xem lại + lý do + xác nhận -->
    <div id="woViewReview" style="display:none">
      <div id="woReviewList" style="max-height:38vh;overflow-y:auto;margin-bottom:12px"></div>
      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:#888;font-weight:500;margin-bottom:6px">Lý do xuất huỷ <span style="color:#e55">*</span></div>
        <input id="writeoffReason" type="text" placeholder="VD: Hàng hỏng, hết hạn, đổ vỡ..."
          style="width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none">
      </div>
      <button class="sheet-btn primary" onclick="confirmWriteoff()">Xác nhận xuất huỷ</button>
      <button class="sheet-btn secondary" onclick="showWoView('list')">← Thêm mặt hàng</button>
    </div>

    <button class="sheet-btn secondary" onclick="hideWriteoff()">Đóng</button>
  </div>
</div>

<!-- Pha bán thành phẩm -->
<div class="overlay" id="brewOverlay" onclick="hideBrew()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Pha bán thành phẩm</div>
    <div class="sheet-sub">Hệ thống tự trừ nguyên liệu thô tương ứng</div>
    <div id="brewList"></div>
    <button class="sheet-btn secondary" onclick="hideBrew()">Đóng</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../auth/auth.js"></script>
<script>
  Auth.require('inventory_view');
  const fmtDate=(d,t=false)=>{const dt=d instanceof Date?d:new Date(d);const p=n=>String(n).padStart(2,'0');const s=`${p(dt.getDate())}/${p(dt.getMonth()+1)}/${dt.getFullYear()}`;return t?`${s} ${p(dt.getHours())}:${p(dt.getMinutes())}`:s;};
  const canEdit    = Auth.can('inventory_edit');
  const canViewRaw = Auth.can('inventory_edit');
  const isOwner    = Auth.getRole() === 'owner';
  const session    = Auth.getSession();

  let activeTab = 1;
  let RAW_MATERIALS=[], SEMI_PRODUCTS=[], SEMI_RECIPES=[], SKU_ITEMS=[];
  let rawStockData={}, semiStockData={}, productsData=[], productRecipes=[];
  let unitConvData={}; // { raw_id: [{unit_name, to_base_rate}, ...] }

  async function init(){
    try {
      const loads = [
        DB.select('semi_products','select=*&order=name.asc'),
        DB.select('semi_stock','select=*'),
        DB.select('products','active=eq.true&select=*&order=sort_order.asc'),
        DB.select('product_recipes','select=*'),
      ];
      if(canViewRaw){
        loads.push(DB.select('raw_materials','active=eq.true&select=*&order=name.asc'));
        loads.push(DB.select('raw_stock','select=*'));
        loads.push(DB.select('semi_recipes','select=*'));
        loads.push(DB.select('unit_conversions','item_type=eq.raw&select=*'));
      }
      if(isOwner) loads.push(DB.select('sku_items','select=*&order=sku_code.asc'));
      const res = await Promise.all(loads);
      SEMI_PRODUCTS = res[0];
      res[1].forEach(s=>semiStockData[s.id]=s);
      productsData = res[2];
      productRecipes = res[3];
      if(canViewRaw){
        RAW_MATERIALS = res[4];
        res[5].forEach(r=>rawStockData[r.id]=r);
        SEMI_RECIPES = res[6];
        (res[7]||[]).forEach(c=>{
          if(!unitConvData[c.item_id]) unitConvData[c.item_id]=[];
          unitConvData[c.item_id].push(c);
        });
        if(isOwner) SKU_ITEMS = res[8]||[];
      } else if(isOwner){
        SKU_ITEMS = res[4]||[];
      }
      setupUI();
      renderContent();
    } catch(e){
      document.getElementById('content').innerHTML=`<div class="empty">Lỗi: ${e.message}</div>`;
    }
  }

  function setupUI(){
    // Tabs theo quyền
    const tabs = [];
    if(canViewRaw) tabs.push({id:1,label:'Nguyên liệu thô'});
    tabs.push({id:2,label:'Bán thành phẩm'});
    tabs.push({id:4,label:'Ly có thể pha'});
    if(canViewRaw) tabs.push({id:5,label:'Lịch sử'});

    activeTab = tabs[0].id;
    document.getElementById('tabBar').innerHTML = tabs.map(t=>
      `<button class="tab${t.id===activeTab?' active':''}" id="tab${t.id}" onclick="switchTab(${t.id})">${t.label}</button>`
    ).join('');

    // Nút header theo quyền
    const btns = document.getElementById('headerBtns');
    if(canEdit){
      btns.innerHTML = `
        <button class="icon-btn" onclick="showWriteoff()" title="Xuất huỷ" style="color:#c0392b">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
        <button class="icon-btn" onclick="showBrew()" title="Pha bán thành phẩm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        </button>`;
    }
  }

  function switchTab(n){
    activeTab=n;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    const el = document.getElementById('tab'+n);
    if(el) el.classList.add('active');
    renderContent();
  }

  function stockStatus(qty, warnAt){ return qty<=0?'danger':qty<=warnAt?'warn':'ok'; }

  function renderContent(){
    if(activeTab===1&&canViewRaw) renderRaw();
    else if(activeTab===2) renderSemi();
    else if(activeTab===4) renderCanMake();
    else if(activeTab===5&&canViewRaw) renderReceipts();
  }

  function renderRaw(){
    const el=document.getElementById('content');
    el.innerHTML=RAW_MATERIALS.map(item=>{
      const d=rawStockData[item.id]||{quantity:0,avg_cost:0};
      const amt=parseFloat(d.quantity)||0;
      const max=item.warn_at*5||500, pct=Math.min(100,Math.round(amt/max*100));
      const st=stockStatus(amt,item.warn_at);
      const avgCost=parseFloat(d.avg_cost)||0;
      const avgText=avgCost>0?` · BQ: ${Math.round(avgCost*1000).toLocaleString('en-US')}₫/1000${item.unit}`:'';
      const convs=(unitConvData[item.id]||[]).filter(c=>Number(c.rate)>1);
      const convText=convs.map(c=>{
        const q=amt/Number(c.rate);
        if(!isFinite(q)||q<=0) return '';
        return `${q%1===0?q.toLocaleString('en-US'):q.toFixed(1)} ${c.input_unit}`;
      }).filter(Boolean).join(' · ');
      return `<div class="stock-card${st==='ok'?'':' '+st}" onclick="showRawDetail('${item.id}')" style="cursor:pointer">
        <div class="stock-icon" style="background:${item.color||'#f5f5f0'}">${item.icon}</div>
        <div class="stock-info">
          <div class="stock-name">${item.name}</div>
          <div class="stock-bar"><div class="stock-bar-fill ${st}" style="width:${pct}%"></div></div>
          <div class="stock-detail">Cảnh báo < ${item.warn_at}${item.unit}${avgText}</div>
          ${convText?`<div class="stock-detail" style="color:#555">${convText}</div>`:''}
        </div>
        <div class="stock-amount">
          <div class="stock-num${st==='ok'?'':' '+st}">${amt.toLocaleString('en-US')}</div>
          <div class="stock-unit">${item.unit}</div>
        </div>
      </div>`;
    }).join('')||'<div class="empty">Chưa có nguyên liệu thô nào</div>';
  }

  function renderSemi(){
    const el=document.getElementById('content');
    el.innerHTML=SEMI_PRODUCTS.map(item=>{
      const d=semiStockData[item.id]||{quantity:0};
      const amt=parseFloat(d.quantity)||0;
      const max=item.warn_at*5||500, pct=Math.min(100,Math.round(amt/max*100));
      const st=stockStatus(amt,item.warn_at);
      return `<div class="stock-card${st==='ok'?'':' '+st}">
        <div class="stock-icon" style="background:${item.color||'#f5f5f0'}">${item.icon}</div>
        <div class="stock-info">
          <div class="stock-name">${item.name}</div>
          <div class="stock-bar"><div class="stock-bar-fill ${st}" style="width:${pct}%"></div></div>
          <div class="stock-detail">Cảnh báo < ${item.warn_at}${item.unit} · Yield: ${item.yields}${item.unit}/mẻ</div>
        </div>
        <div class="stock-amount">
          <div class="stock-num${st==='ok'?'':' '+st}">${amt.toLocaleString('en-US')}</div>
          <div class="stock-unit">${item.unit}</div>
        </div>
      </div>`;
    }).join('')||'<div class="empty">Chưa có bán thành phẩm nào</div>';
  }

  function renderSupplies(){
    const el=document.getElementById('content');
    const consumables=SUPPLIES.filter(s=>s.category==='consumable');
    const equipment=SUPPLIES.filter(s=>s.category==='equipment');
    let html='';
    if(consumables.length){
      html+=`<div class="section-title">Vật tư tiêu hao</div>`;
      html+=consumables.map(s=>{
        const amt=parseFloat(s.quantity)||0;
        const st=stockStatus(amt,s.warn_at);
        const max=s.warn_at*5||100, pct=Math.min(100,Math.round(amt/max*100));
        return `<div class="stock-card${st==='ok'?'':' '+st}">
          <div class="stock-icon" style="background:#f5f5f0">📦</div>
          <div class="stock-info">
            <div class="stock-name">${s.name}</div>
            <div class="stock-bar"><div class="stock-bar-fill ${st}" style="width:${pct}%"></div></div>
            <div class="stock-detail">Cảnh báo < ${s.warn_at} ${s.unit}</div>
          </div>
          <div class="stock-amount">
            <div class="stock-num${st==='ok'?'':' '+st}">${amt.toLocaleString('en-US')}</div>
            <div class="stock-unit">${s.unit}</div>
          </div>
        </div>`;
      }).join('');
    }
    if(equipment.length){

  function updateBrewBtn(semiId){
    const item=SEMI_PRODUCTS.find(s=>s.id===semiId);
    if(!item) return;
    const target=parseFloat(document.getElementById('brewQty_'+semiId)?.value)||0;
    const ratio=item.yields>0?target/item.yields:0;
    const recipes=SEMI_RECIPES.filter(r=>r.semi_id===semiId);
    const tracked=recipes.filter(r=>RAW_MATERIALS.find(x=>x.id===r.raw_id));
    const canBrew=ratio>0&&tracked.every(r=>(parseFloat(rawStockData[r.raw_id]?.quantity)||0)>=r.amount*ratio);
    const btn=document.getElementById('brewBtn_'+semiId);
    if(btn) btn.disabled=!canBrew;
  }

  async function doBrew(semiId){
    const item=SEMI_PRODUCTS.find(s=>s.id===semiId);
    const target=parseFloat(document.getElementById('brewQty_'+semiId)?.value)||item.yields;
    const ratio=target/item.yields; // tỉ lệ so với công thức gốc
    const recipes=SEMI_RECIPES.filter(r=>r.semi_id===semiId);
    const tracked=recipes.filter(r=>RAW_MATERIALS.find(x=>x.id===r.raw_id));
    const enough=tracked.every(r=>(parseFloat(rawStockData[r.raw_id]?.quantity)||0)>=r.amount*ratio);
    if(!enough){toast('Không đủ nguyên liệu thô!');return;}
    try {
      for(const r of tracked){
        const deduct=r.amount*ratio;
        // 1. Trừ raw_stock tổng
        const newQty=Math.max(0,(parseFloat(rawStockData[r.raw_id]?.quantity)||0)-deduct);
        await DB.update('raw_stock',`id=eq.${r.raw_id}`,{quantity:newQty,updated_at:new Date().toISOString()});
        if(rawStockData[r.raw_id]) rawStockData[r.raw_id].quantity=newQty;
        // 2. FIFO: ưu tiên SKU ít tồn nhất (hàng cũ, không được nhập thêm) trước
        const relatedSkus=SKU_ITEMS.filter(s=>s.map_to_id===r.raw_id&&s.map_to_type==='raw')
          .sort((a,b)=>(parseFloat(a.quantity)||0)-(parseFloat(b.quantity)||0));
        let remaining=deduct;
        for(const sku of relatedSkus){
          const sq=parseFloat(sku.quantity)||0; if(sq<=0) continue;
          const take=Math.min(sq,remaining);
          const nq=sq-take;
          await DB.update('sku_items',`id=eq.${sku.id}`,{quantity:nq});
          sku.quantity=nq;
          remaining-=take;
          if(remaining<=0) break;
        }
      }
      const newSemiQty=(parseFloat(semiStockData[semiId]?.quantity)||0)+target;
      await DB.upsert('semi_stock',{id:semiId,quantity:newSemiQty,updated_at:new Date().toISOString()});
      if(semiStockData[semiId]) semiStockData[semiId].quantity=newSemiQty;
      else semiStockData[semiId]={quantity:newSemiQty};
      toast(`✓ Đã pha ${target}${item.unit} ${item.name}`);
      renderBrewList();
      renderContent();
    } catch(e){toast('Lỗi: '+e.message);}
  }

    document.getElementById('rawDetailName').textContent = item.icon+' '+item.name;
    document.getElementById('rawDetailStock').textContent =
      `Tồn kho: ${amt.toLocaleString('en-US')} ${item.unit}`
      +(avgCost>0?` · BQ: ${Math.round(avgCost*1000).toLocaleString('en-US')}₫/1000${item.unit}`:'');

    // Quy đổi tồn kho theo từng đơn vị (dữ liệu đã load sẵn)
    const convs = (unitConvData[id]||[]).filter(c=>c.rate>1);
    const convRows = convs.map(c=>{
      const qty = amt / c.rate;
      const cost = avgCost * c.rate;
      return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #f0f0ec">
        <div style="font-size:13px;color:#555">${c.input_unit}</div>

          <span style="font-size:12px;color:#888"> ${c.input_unit}</span>
          ${cost>0?`<div style="font-size:11px;color:#aaa">${Math.round(cost).toLocaleString('en-US')}₫/${c.input_unit}</div>`:''}
        </div>
      </div>`;
    }).join('');

    // Danh sách SKU — chỉ hiện SKU có quantity > 0 (per-SKU stock)
    const allSkus = SKU_ITEMS.filter(s=>s.map_to_id===id && s.map_to_type==='raw');
    const activeSkus = allSkus.filter(s=>(parseFloat(s.quantity)||0)>0);
    const skuRows = activeSkus.map(s=>{
      const skuQty  = parseFloat(s.quantity)||0;
      const skuRate = Number(s.conv_rate)||1;
      const skuUnit = s.input_unit || item.unit;
      const packQty = skuRate > 1 ? skuQty / skuRate : skuQty;
      const cost    = avgCost * skuRate;
      const baseText = `${skuQty.toLocaleString('en-US')} ${item.unit}`;
      const packText = skuRate > 1
        ? `${packQty%1===0?packQty.toLocaleString('en-US'):packQty.toFixed(1)} ${skuUnit}`
        : '';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid #f0f0ec">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
          <div style="font-size:11px;color:#aaa">${s.sku_code}</div>
          ${cost>0?`<div style="font-size:11px;color:#aaa">${Math.round(cost).toLocaleString('en-US')}₫/${skuUnit}</div>`:''}
        </div>
        <div style="text-align:right;margin-left:12px;flex-shrink:0">
          <div style="font-size:15px;font-weight:700">${baseText}</div>
          ${packText?`<div style="font-size:13px;color:#888">${packText}</div>`:''}
        </div>
      </div>`;
    }).join('');

    document.getElementById('rawDetailSkus').innerHTML =
      `<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:2px">MÃ SKU CÒN HÀNG (${activeSkus.length})</div>`
      +(skuRows||`<div style="font-size:13px;color:#aaa;text-align:center;padding:12px 0">Không có mã SKU nào còn hàng</div>`);

  async function confirmWriteoff(){
    if(!_woCart.length){toast('Chưa chọn mặt hàng nào');return;}
    const reason=document.getElementById('writeoffReason').value.trim();
    if(!reason){toast('Lý do không được để trống');return;}
    try{
      for(const item of _woCart){
        const {id,type,unit,qty}=item;
        if(type==='raw'){
          const newQty=Math.max(0,(parseFloat(rawStockData[id]?.quantity)||0)-qty);
          await DB.update('raw_stock',`id=eq.${id}`,{quantity:newQty,updated_at:new Date().toISOString()});
          if(rawStockData[id]) rawStockData[id].quantity=newQty;
          const skus=SKU_ITEMS.filter(s=>s.map_to_id===id&&s.map_to_type==='raw');
          const total=skus.reduce((s,x)=>s+(parseFloat(x.quantity)||0),0);
          if(total>0) for(const sku of skus){
            const sq=parseFloat(sku.quantity)||0; if(sq<=0) continue;
            const nq=Math.max(0,sq-(sq/total)*qty);
            await DB.update('sku_items',`id=eq.${sku.id}`,{quantity:nq});
            sku.quantity=nq;
          }
        } else {
          const newQty=Math.max(0,(parseFloat(semiStockData[id]?.quantity)||0)-qty);
          await DB.upsert('semi_stock',{id,quantity:newQty,updated_at:new Date().toISOString()});
          if(semiStockData[id]) semiStockData[id].quantity=newQty;
          else semiStockData[id]={quantity:newQty};
        }
        await DB.insert('stock_writeoffs',{item_id:id,item_type:type,quantity:qty,unit,reason},false);
      }
      toast(`✓ Đã xuất huỷ ${_woCart.length} mặt hàng`);
      hideWriteoff();
      renderContent();
    } catch(e){toast('Lỗi: '+e.message);}
  }

  function nextSkuCode(type){
    const prefix = type==='raw'?'NVL':type==='supply'?'VTU':'CCU';
    const nums = SKU_ITEMS.filter(s=>(s.sku_code||'').startsWith(prefix+'-')).map(s=>parseInt(s.sku_code.slice(4))||0);
    return prefix+'-'+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
  }
  function buildSkuMapOptions(type){
    const items = type==='supply'
      ? SUPPLIES.map(x=>({id:x.id,name:x.name,unit:x.unit}))
      : RAW_MATERIALS.map(x=>({id:x.id,name:x.name,unit:x.unit}));
    return '<option value="">— Không map —</option>'+items.map(x=>`<option value="${x.id}" data-unit="${x.unit||''}">${x.name}</option>`).join('');
  }

  function renderSku(){
    const el = document.getElementById('content');
    el.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span class="section-title">Danh mục SKU</span>
      <button onclick="showSku()" style="padding:5px 12px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit">+ Thêm SKU</button>
    </div>`+
    (SKU_ITEMS.length ? SKU_ITEMS.map(s=>`
      <div class="stock-card" style="cursor:pointer" onclick="showSku('${s.id}')">
        <div class="stock-icon" style="background:${skuTypeBg(s.type)}">${skuTypeIcon(s.type)}</div>
        <div class="stock-info">
          <div class="stock-name">${s.sku_code} · ${s.name}</div>
          <div class="stock-detail">${skuTypeLabel(s.type)}${skuMapName(s)?' → '+skuMapName(s):''} · ${s.base_unit||'—'}</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`).join('') : '<div class="empty">Chưa có SKU nào</div>');
  }

  function onSkuTypeChange(){
    const type = document.getElementById('skuType').value;
    if(!editingSkuId) document.getElementById('skuCode').value = nextSkuCode(type);
    document.getElementById('skuMapTo').innerHTML = buildSkuMapOptions(type);
    document.getElementById('skuBaseUnit').value = '';
  }
  function onSkuMapToChange(){
    const opt = document.getElementById('skuMapTo').selectedOptions[0];
    document.getElementById('skuBaseUnit').value = opt?.dataset?.unit||'';
  }

  async function showSku(id){
    editingSkuId = id||null; currentSkuUnits = [];
    const title = document.getElementById('skuSheetTitle');
    const del   = document.getElementById('delSkuBtn');
    const type  = id?(SKU_ITEMS.find(x=>x.id===id)?.type||'raw'):'raw';
    document.getElementById('skuMapTo').innerHTML = buildSkuMapOptions(type);
    if(id){
      const s = SKU_ITEMS.find(x=>x.id===id);
      if(!s) return;
      title.textContent = 'Chỉnh sửa SKU';
      document.getElementById('skuCode').value = s.sku_code||'';
      document.getElementById('skuCode').readOnly = true;
      document.getElementById('skuName').value = s.name||'';
      document.getElementById('skuType').value = s.type||'raw';
      document.getElementById('skuMapTo').innerHTML = buildSkuMapOptions(s.type||'raw');
      document.getElementById('skuMapTo').value = s.map_to_id||'';
      document.getElementById('skuBaseUnit').value = s.base_unit||'';
      del.style.display='block';
      try{ currentSkuUnits = await DB.select('sku_units',`sku_id=eq.${id}&select=*&order=to_base.asc`); }catch(e){ currentSkuUnits=[]; }
    } else {
      title.textContent = 'Thêm SKU';
      document.getElementById('skuCode').value = nextSkuCode('raw');
      document.getElementById('skuCode').readOnly = false;
      document.getElementById('skuName').value = '';
      document.getElementById('skuType').value = 'raw';
      document.getElementById('skuBaseUnit').value = '';
      del.style.display='none';
    }
    renderSkuUnitsEditor();
    document.getElementById('skuOverlay').classList.add('show');
  }
  function hideSku(){ document.getElementById('skuOverlay').classList.remove('show'); }

  function renderSkuUnitsEditor(){
    const base = document.getElementById('skuBaseUnit').value||'đơn vị';
    document.getElementById('skuUnitsEditor').innerHTML =
      currentSkuUnits.map((u,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid #e8e6e0">
          <input type="text" value="${u.unit_name||''}" placeholder="ml/hộp/thùng" onchange="currentSkuUnits[${i}].unit_name=this.value"
            style="flex:1;padding:5px 8px;border:0.5px solid #e8e6e0;border-radius:6px;font-size:12px;font-family:inherit">
          <input type="number" value="${u.to_base||1}" min="0" step="any" onchange="currentSkuUnits[${i}].to_base=parseFloat(this.value)||1"
            style="width:64px;padding:5px 8px;border:0.5px solid #e8e6e0;border-radius:6px;font-size:12px;font-family:inherit;text-align:right">
          <span style="font-size:12px;color:#888;white-space:nowrap">${base}</span>
          <button onclick="currentSkuUnits.splice(${i},1);renderSkuUnitsEditor()"
            style="width:24px;height:24px;border-radius:50%;border:none;background:#e8e6e0;cursor:pointer;font-size:14px;color:#888">×</button>
        </div>
        <input type="text" value="${u.description||''}" placeholder="Mô tả (tuỳ chọn)" onchange="currentSkuUnits[${i}].description=this.value"
          style="width:100%;padding:5px 8px;border:0.5px solid #e8e6e0;border-radius:6px;font-size:12px;font-family:inherit;color:#888;margin-bottom:4px">`
      ).join('')+
      `<button onclick="currentSkuUnits.push({unit_name:'',to_base:1,description:''});renderSkuUnitsEditor()"
        style="width:100%;padding:8px;border:0.5px dashed #d8d6d0;border-radius:10px;background:transparent;font-size:13px;color:#888;cursor:pointer;font-family:inherit;margin-top:4px">+ Thêm đơn vị</button>`;
  }

  async function saveSku(){
    const sku_code  = document.getElementById('skuCode').value.trim();
    const name      = document.getElementById('skuName').value.trim();
    const type      = document.getElementById('skuType').value;
    const map_to_id = document.getElementById('skuMapTo').value||null;
    const base_unit = document.getElementById('skuBaseUnit').value.trim();
    if(!sku_code||!name){ toast('Vui lòng nhập mã và tên SKU'); return; }
    try {
      let skuId = editingSkuId;
      if(editingSkuId){
        await DB.update('sku_items',`id=eq.${editingSkuId}`,{name,type,map_to_id,base_unit});
      } else {
        const res = await DB.insert('sku_items',{sku_code,name,type,map_to_id,base_unit});
        skuId = res[0].id;
      }
      if(skuId){
        await DB.delete('sku_units',`sku_id=eq.${skuId}`);
        for(const u of currentSkuUnits.filter(x=>x.unit_name))
          await DB.insert('sku_units',{sku_id:skuId,unit_name:u.unit_name,to_base:u.to_base||1,description:u.description||''},false);
      }
      hideSku(); toast('✓ Đã lưu SKU');
      SKU_ITEMS = await DB.select('sku_items','select=*&order=sku_code.asc');
      renderSku();
    } catch(e){ toast('Lỗi: '+e.message); }
  }

  async function deleteSku(){
    if(!editingSkuId) return;
    try {
      await DB.delete('sku_units',`sku_id=eq.${editingSkuId}`);
      await DB.delete('sku_items',`id=eq.${editingSkuId}`);
      hideSku(); toast('Đã xoá SKU');
      SKU_ITEMS = await DB.select('sku_items','select=*&order=sku_code.asc');
      renderSku();
    } catch(e){ toast('Lỗi: '+e.message); }
  }

  init();
</script>
</body>
</html>
