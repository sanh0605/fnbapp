<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Liên lạc</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none;flex-shrink:0}
    .header-title{font-size:15px;font-weight:600;flex:1}
    .add-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
    .tabs{background:#fff;display:flex;border-bottom:0.5px solid #e8e6e0;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:10px 14px;font-size:13px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
    .tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
    .content{flex:1;overflow-y:auto;padding:12px 14px 32px;display:flex;flex-direction:column;gap:8px}
    .contact-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
    .contact-card:active{background:#f5f5f0}
    .contact-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .contact-info{flex:1;min-width:0}
    .contact-name{font-size:14px;font-weight:500}
    .contact-sub{font-size:12px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .contact-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
    .badge-ncc{background:#E6F1FB;color:#0C447C}
    .badge-kh{background:#E1F5EE;color:#085041}
    .badge-nq{background:#EEEDFE;color:#3C3489}
    .badge-khac{background:#f5f5f0;color:#888}
    .badge-inactive{background:#FCEBEB;color:#A32D2D}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:8px;color:#bbb;font-size:13px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:92dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input,.field select,.field textarea{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field textarea{resize:none;height:72px;font-size:14px}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1D9E75;background:#fff}
    .field input[readonly]{color:#888}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.primary:active{background:#0F6E56}
    .sheet-btn.danger{background:#FCEBEB;color:#A32D2D}
    .sheet-btn.secondary{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}
    .divider{height:0.5px;background:#e8e6e0;margin:2px 0}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:400}
  </style>
</head>
<body>

<div class="header">
  <a href="../home/index.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <span class="header-title">Liên lạc</span>
  <button class="add-btn" id="addBtn" onclick="showContact()" style="display:none">+ Thêm</button>
</div>

<div class="tabs" id="tabBar"></div>
<div class="content" id="content"><div class="empty">Đang tải...</div></div>

<!-- Contact sheet -->
<div class="overlay" id="contactOverlay" onclick="hideContact()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="contactSheetTitle">Thêm liên lạc</div>

    <div class="row2">
      <div class="field"><label>Mã</label><input type="text" id="cCode" placeholder="NCC-001"></div>
      <div class="field"><label>Loại liên lạc</label>
        <select id="cType" onchange="onTypeChange()">
          <option value="nha_cung_cap">Nhà cung cấp</option>
          <option value="khach_hang">Khách hàng</option>
          <option value="nhuong_quyen">Nhượng quyền</option>
          <option value="khac">Khác</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Tên</label><input type="text" id="cName" placeholder="Nguyễn Văn A / Công ty ABC"></div>
    <div class="row2">
      <div class="field"><label>Số điện thoại</label><input type="tel" id="cPhone" placeholder="0901234567"></div>
      <div class="field"><label>Email</label><input type="text" id="cEmail" placeholder="abc@gmail.com"></div>
    </div>
    <div class="field"><label>Địa chỉ</label><input type="text" id="cAddress" placeholder="123 Đường..."></div>

    <!-- Chỉ hiện cho nhà cung cấp & nhượng quyền -->
    <div id="platformSection">
      <div class="row2">
        <div class="field"><label>Kênh liên hệ / mua hàng</label>
          <select id="cPlatform">
            <option value="direct">Trực tiếp</option>
            <option value="shopee">Shopee</option>
            <option value="lazada">Lazada</option>
            <option value="tiktok">TikTok Shop</option>
            <option value="zalo">Zalo</option>
            <option value="other">Khác</option>
          </select>
        </div>
        <div class="field"><label>Trạng thái</label>
          <select id="cActive">
            <option value="true">Đang hoạt động</option>
            <option value="false">Ngưng</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Link shop / profile</label><input type="text" id="cPlatformUrl" placeholder="https://..."></div>
    </div>

    <div class="field"><label>Ghi chú</label><textarea id="cNote" placeholder="Ghi chú thêm..."></textarea></div>

    <div class="divider"></div>
    <button class="sheet-btn primary" onclick="saveContact()">Lưu liên lạc</button>
    <button class="sheet-btn danger" id="delContactBtn" style="display:none" onclick="deleteContact()">Xoá liên lạc này</button>
    <button class="sheet-btn secondary" onclick="hideContact()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../auth/auth.js"></script>
<script>
  Auth.require('inventory_edit'); // manager + owner
  const isOwner  = Auth.getRole() === 'owner';
  const session  = Auth.getSession();

  const TYPE_META = {
    nha_cung_cap: { label:'NCC',        badge:'badge-ncc',  icon:'🏪', codePrefix:'NCC' },
    khach_hang:   { label:'Khách hàng', badge:'badge-kh',   icon:'👤', codePrefix:'KH'  },
    nhuong_quyen: { label:'Nhượng quyền',badge:'badge-nq',  icon:'🤝', codePrefix:'NQ'  },
    khac:         { label:'Khác',       badge:'badge-khac', icon:'📋', codePrefix:'KC'  },
  };

  const TABS = [
    { key:'all',          label:'Tất cả' },
    { key:'nha_cung_cap', label:'Nhà cung cấp' },
    { key:'khach_hang',   label:'Khách hàng' },
    { key:'nhuong_quyen', label:'Nhượng quyền' },
    { key:'khac',         label:'Khác' },
  ];

  let ALL_CONTACTS = [];
  let activeTab = 'all';
  let editingId  = null;

  async function init(){
    try {
      ALL_CONTACTS = await DB.select('suppliers','select=*&order=contact_type.asc,code.asc');
      if(isOwner) document.getElementById('addBtn').style.display='';
      renderTabs();
      renderContent();
    } catch(e){
      document.getElementById('content').innerHTML=`<div class="empty">Lỗi: ${e.message}<br><small>Kiểm tra migration contact_type</small></div>`;
    }
  }

  function renderTabs(){
    const counts = {};
    TABS.forEach(t=>counts[t.key]=0);
    ALL_CONTACTS.forEach(c=>{
      counts['all']++;
      if(counts[c.contact_type]!==undefined) counts[c.contact_type]++;
      else counts[c.contact_type]=1;
    });
    document.getElementById('tabBar').innerHTML = TABS.map(t=>
      `<button class="tab${t.key===activeTab?' active':''}" onclick="switchTab('${t.key}')">${t.label}${counts[t.key]>0?' ('+counts[t.key]+')':''}</button>`
    ).join('');
  }

  function switchTab(key){
    activeTab = key;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>{ if(t.textContent.startsWith(TABS.find(x=>x.key===key)?.label)) t.classList.add('active'); });
    renderTabs();
    renderContent();
  }

  function renderContent(){
    const list = activeTab==='all' ? ALL_CONTACTS : ALL_CONTACTS.filter(c=>c.contact_type===activeTab);
    const el = document.getElementById('content');
    if(!list.length){ el.innerHTML='<div class="empty">Chưa có liên lạc nào</div>'; return; }
    el.innerHTML = list.map(c=>{
      const meta = TYPE_META[c.contact_type]||TYPE_META.khac;
      const sub  = [c.phone, c.email].filter(Boolean).join(' · ');
      return `<div class="contact-card" onclick="${isOwner?`showContact('${c.id}')`:''}" style="${isOwner?'':'cursor:default'}">
        <div class="contact-icon" style="background:${contactBg(c.contact_type)}">${meta.icon}</div>
        <div class="contact-info">
          <div class="contact-name">${c.code ? c.code+' · ' : ''}${c.name}</div>
          <div class="contact-sub">${sub||c.address||'—'}</div>
        </div>
        <div class="contact-right">
          <span class="badge ${meta.badge}">${meta.label}</span>
          ${c.active===false?'<span class="badge badge-inactive">Ngưng</span>':''}
        </div>
      </div>`;
    }).join('');
  }

  function contactBg(type){
    return {nha_cung_cap:'#E6F1FB',khach_hang:'#E1F5EE',nhuong_quyen:'#EEEDFE',khac:'#f5f5f0'}[type]||'#f5f5f0';
  }

  function nextCode(type){
    const prefix = TYPE_META[type]?.codePrefix||'KC';
    const nums = ALL_CONTACTS
      .filter(c=>c.contact_type===type)
      .map(c=>parseInt((c.code||'').replace(prefix+'-',''))||0);
    return prefix+'-'+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
  }

  function onTypeChange(){
    const type = document.getElementById('cType').value;
    if(!editingId) document.getElementById('cCode').value = nextCode(type);
    const show = type==='nha_cung_cap'||type==='nhuong_quyen';
    document.getElementById('platformSection').style.display = show?'contents':'none';
  }

  function showContact(id){
    if(!isOwner) return;
    editingId = id||null;
    const title = document.getElementById('contactSheetTitle');
    const del   = document.getElementById('delContactBtn');
    if(id){
      const c = ALL_CONTACTS.find(x=>x.id===id);
      if(!c) return;
      title.textContent = 'Chỉnh sửa liên lạc';
      document.getElementById('cCode').value        = c.code||'';
      document.getElementById('cType').value        = c.contact_type||'nha_cung_cap';
      document.getElementById('cName').value        = c.name||'';
      document.getElementById('cPhone').value       = c.phone||'';
      document.getElementById('cEmail').value       = c.email||'';
      document.getElementById('cAddress').value     = c.address||'';
      document.getElementById('cPlatform').value    = c.platform||'direct';
      document.getElementById('cPlatformUrl').value = c.platform_url||'';
      document.getElementById('cActive').value      = String(c.active!==false);
      document.getElementById('cNote').value        = c.note||'';
      del.style.display = 'block';
    } else {
      title.textContent = 'Thêm liên lạc';
      const defType = activeTab!=='all' ? activeTab : 'nha_cung_cap';
      document.getElementById('cType').value     = defType;
      document.getElementById('cCode').value     = nextCode(defType);
      document.getElementById('cName').value     = '';
      document.getElementById('cPhone').value    = '';
      document.getElementById('cEmail').value    = '';
      document.getElementById('cAddress').value  = '';
      document.getElementById('cPlatform').value = 'direct';
      document.getElementById('cPlatformUrl').value = '';
      document.getElementById('cActive').value   = 'true';
      document.getElementById('cNote').value     = '';
      del.style.display = 'none';
    }
    const type = document.getElementById('cType').value;
    document.getElementById('platformSection').style.display =
      (type==='nha_cung_cap'||type==='nhuong_quyen') ? 'contents' : 'none';
    document.getElementById('contactOverlay').classList.add('show');
  }
  function hideContact(){ document.getElementById('contactOverlay').classList.remove('show'); }

  async function saveContact(){
    const code         = document.getElementById('cCode').value.trim();
    const contact_type = document.getElementById('cType').value;
    const name         = document.getElementById('cName').value.trim();
    if(!name){ toast('Vui lòng nhập tên'); return; }
    const data = {
      code, contact_type, name,
      phone:        document.getElementById('cPhone').value.trim(),
      email:        document.getElementById('cEmail').value.trim(),
      address:      document.getElementById('cAddress').value.trim(),
      platform:     document.getElementById('cPlatform').value,
      platform_url: document.getElementById('cPlatformUrl').value.trim(),
      active:       document.getElementById('cActive').value === 'true',
      note:         document.getElementById('cNote').value.trim(),
    };
    try {
      if(editingId){
        await DB.update('suppliers',`id=eq.${editingId}`,data);
      } else {
        await DB.insert('suppliers',data,false);
      }
      hideContact(); toast('✓ Đã lưu');
      ALL_CONTACTS = await DB.select('suppliers','select=*&order=contact_type.asc,code.asc');
      renderTabs(); renderContent();
    } catch(e){ toast('Lỗi: '+e.message); }
  }

  async function deleteContact(){
    if(!editingId) return;
    try {
      await DB.delete('suppliers',`id=eq.${editingId}`);
      hideContact(); toast('Đã xoá');
      ALL_CONTACTS = await DB.select('suppliers','select=*&order=contact_type.asc,code.asc');
      renderTabs(); renderContent();
    } catch(e){ toast('Lỗi: '+e.message); }
  }

  function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.style.opacity='1';
    clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2500);
  }

  init();
</script>
</body>
</html>
