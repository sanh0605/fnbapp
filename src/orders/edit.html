<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Sửa đơn</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0;position:sticky;top:0;z-index:10}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;flex-shrink:0}
    .header-title{font-size:15px;font-weight:600}
    .save-btn{padding:8px 20px;border-radius:20px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .save-btn:active{background:#0F6E56}

    .body{flex:1;overflow-y:auto;padding:14px 14px 40px;display:flex;flex-direction:column;gap:12px}

    /* Section */
    .section{background:#fff;border-radius:16px;border:0.5px solid #e8e6e0;overflow:hidden}
    .section-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;padding:11px 16px 9px;border-bottom:0.5px solid #e8e6e0}
    .field{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:0.5px solid #f5f5f0}
    .field:last-child{border-bottom:none}
    .field-label{font-size:13px;color:#888;flex-shrink:0;min-width:100px}
    .field-input{flex:1;border:none;font-size:14px;color:#1a1a18;background:transparent;font-family:inherit;text-align:right;outline:none;min-width:0}
    .field-input:focus{color:#1D9E75}
    .field-input[type=datetime-local]{font-size:13px}

    /* Items */
    .item-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid #f5f5f0}
    .item-row:last-child{border-bottom:none}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-opt{font-size:12px;color:#888;margin-top:3px;line-height:1.4}
    .item-opt-note{color:#1D9E75}
    .item-price-input{font-size:12px;color:#aaa;border:none;background:transparent;font-family:inherit;text-align:left;width:90px;outline:none;display:block;margin-top:4px}
    .item-price-input:focus{color:#1D9E75}
    .qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .qb{width:28px;height:28px;border-radius:50%;border:0.5px solid #d8d6d0;background:#f5f5f0;color:#1a1a18;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .qb:active{background:#e0e0da}
    .qb.del{border-color:#fcc;background:#FCEBEB;color:#A32D2D;font-size:13px}
    .qn{font-size:14px;font-weight:600;min-width:20px;text-align:center}
    .add-item-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;color:#1D9E75;font-size:13px;font-weight:500}
    .add-item-btn:active{background:#E1F5EE}

    /* Thanh toán */
    .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
    .method-opt{padding:11px;border-radius:12px;border:0.5px solid #d8d6d0;background:#f5f5f0;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
    .method-opt.sel{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:600}

    /* Tổng */
    .finance-box{background:#fff;border-radius:16px;border:0.5px solid #e8e6e0;padding:16px}
    .fin-row{display:flex;justify-content:space-between;align-items:center}
    .fin-label{font-size:13px;color:#888}
    .fin-value{font-size:14px;font-weight:600;color:#444}
    .fin-input-wrap{display:flex;align-items:center;gap:6px}
    .fin-input{border:0.5px solid #d8d6d0;border-radius:10px;padding:7px 12px;font-size:15px;font-weight:600;text-align:right;outline:none;font-family:inherit;background:#fff;width:130px}
    .fin-input:focus{border-color:#1D9E75}
    .fin-divider{border:none;border-top:0.5px solid #f0f0ec;margin:12px 0}
    .fin-payable-row{display:flex;justify-content:space-between;align-items:center}
    .fin-payable-label{font-size:15px;font-weight:700}
    .fin-payable-value{font-size:22px;font-weight:700;color:#1D9E75}
    .fin-change{display:flex;justify-content:space-between;align-items:center;margin-top:12px;background:#E1F5EE;border-radius:10px;padding:10px 14px;display:none}
    .fin-change-lbl{font-size:13px;color:#085041}
    .fin-change-val{font-size:15px;font-weight:700;color:#085041}

    /* Picker */
    .picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .picker-overlay.show{display:flex}
    .picker-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;display:flex;flex-direction:column;max-height:72dvh}
    .picker-header{padding:14px 16px 10px;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .picker-title{font-size:14px;font-weight:600;margin-bottom:8px}
    .picker-search-wrap{position:relative}
    .picker-search{width:100%;padding:8px 12px 8px 32px;border:0.5px solid #e8e6e0;border-radius:10px;font-size:13px;background:#f5f5f0;font-family:inherit;outline:none}
    .picker-search:focus{border-color:#1D9E75}
    .picker-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;pointer-events:none}
    .picker-list{overflow-y:auto;flex:1}
    .picker-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid #f5f5f0;cursor:pointer}
    .picker-item:active{background:#f5f5f0}
    .picker-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .picker-name{flex:1;font-size:13px;font-weight:500}
    .picker-price{font-size:12px;color:#888}
    .picker-close{padding:14px;border-top:0.5px solid #e8e6e0;flex-shrink:0;text-align:center;font-size:13px;color:#888;cursor:pointer}

    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:300}
    .loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#888;font-size:13px}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="header-title" id="pageTitle">Sửa đơn</span>
  </div>
  <button class="save-btn" onclick="saveEdit()">Lưu</button>
</div>

<div class="body" id="body"><div class="loading">Đang tải...</div></div>

<!-- Product Picker -->
<div class="picker-overlay" id="pickerOverlay" onclick="closePicker()">
  <div class="picker-sheet" onclick="event.stopPropagation()">
    <div class="picker-header">
      <div class="picker-title">Chọn món</div>
      <div class="picker-search-wrap">
        <svg class="picker-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="picker-search" id="pickerSearch" placeholder="Tìm món..." oninput="filterPicker(this.value)">
      </div>
    </div>
    <div class="picker-list" id="pickerList"></div>
    <div class="picker-close" onclick="closePicker()">Đóng</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../lib/utils.js"></script>
<script src="../auth/auth.js"></script>
<script src="./edit.js"></script>
</body>
</html>
