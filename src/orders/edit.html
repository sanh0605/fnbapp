<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Sửa đơn</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0;position:sticky;top:0;z-index:10}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;flex-shrink:0}
    .header-title{font-size:15px;font-weight:600}
    .save-btn{padding:8px 20px;border-radius:20px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .save-btn:active{background:#0F6E56}

    .body{flex:1;overflow-y:auto;padding:14px 14px 40px;display:flex;flex-direction:column;gap:12px}

    /* Section */
    .section{background:#fff;border-radius:16px;border:0.5px solid #e8e6e0;overflow:hidden}
    .section-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;padding:11px 16px 9px;border-bottom:0.5px solid #e8e6e0}
    .field{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:0.5px solid #f5f5f0}
    .field:last-child{border-bottom:none}
    .field-label{font-size:13px;color:#888;flex-shrink:0;min-width:100px}
    .field-input{flex:1;border:none;font-size:14px;color:#1a1a18;background:transparent;font-family:inherit;text-align:right;outline:none;min-width:0}
    .field-input:focus{color:#1D9E75}
    .field-input[type=datetime-local]{font-size:13px}

    /* Items */
    .item-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid #f5f5f0}
    .item-row:last-child{border-bottom:none}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-price-input{font-size:12px;color:#aaa;border:none;background:transparent;font-family:inherit;text-align:left;width:90px;outline:none;display:block;margin-top:2px}
    .item-price-input:focus{color:#1D9E75}
    .qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .qb{width:28px;height:28px;border-radius:50%;border:0.5px solid #d8d6d0;background:#f5f5f0;color:#1a1a18;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .qb:active{background:#e0e0da}
    .qb.del{border-color:#fcc;background:#FCEBEB;color:#A32D2D;font-size:13px}
    .qn{font-size:14px;font-weight:600;min-width:20px;text-align:center}
    .add-item-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;color:#1D9E75;font-size:13px;font-weight:500}
    .add-item-btn:active{background:#E1F5EE}

    /* Thanh toán */
    .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
    .method-opt{padding:11px;border-radius:12px;border:0.5px solid #d8d6d0;background:#f5f5f0;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
    .method-opt.sel{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:600}

    /* Tổng */
    .finance-box{background:#fff;border-radius:16px;border:0.5px solid #e8e6e0;padding:16px}
    .fin-row{display:flex;justify-content:space-between;align-items:center}
    .fin-label{font-size:13px;color:#888}
    .fin-value{font-size:14px;font-weight:600;color:#444}
    .fin-input-wrap{display:flex;align-items:center;gap:6px}
    .fin-input{border:0.5px solid #d8d6d0;border-radius:10px;padding:7px 12px;font-size:15px;font-weight:600;text-align:right;outline:none;font-family:inherit;background:#fff;width:130px}
    .fin-input:focus{border-color:#1D9E75}
    .fin-divider{border:none;border-top:0.5px solid #f0f0ec;margin:12px 0}
    .fin-payable-row{display:flex;justify-content:space-between;align-items:center}
    .fin-payable-label{font-size:15px;font-weight:700}
    .fin-payable-value{font-size:22px;font-weight:700;color:#1D9E75}
    .fin-change{display:flex;justify-content:space-between;align-items:center;margin-top:12px;background:#E1F5EE;border-radius:10px;padding:10px 14px;display:none}
    .fin-change-lbl{font-size:13px;color:#085041}
    .fin-change-val{font-size:15px;font-weight:700;color:#085041}

    /* Picker */
    .picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .picker-overlay.show{display:flex}
    .picker-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;display:flex;flex-direction:column;max-height:72dvh}
    .picker-header{padding:14px 16px 10px;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .picker-title{font-size:14px;font-weight:600;margin-bottom:8px}
    .picker-search-wrap{position:relative}
    .picker-search{width:100%;padding:8px 12px 8px 32px;border:0.5px solid #e8e6e0;border-radius:10px;font-size:13px;background:#f5f5f0;font-family:inherit;outline:none}
    .picker-search:focus{border-color:#1D9E75}
    .picker-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;pointer-events:none}
    .picker-list{overflow-y:auto;flex:1}
    .picker-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:0.5px solid #f5f5f0;cursor:pointer}
    .picker-item:active{background:#f5f5f0}
    .picker-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .picker-name{flex:1;font-size:13px;font-weight:500}
    .picker-price{font-size:12px;color:#888}
    .picker-close{padding:14px;border-top:0.5px solid #e8e6e0;flex-shrink:0;text-align:center;font-size:13px;color:#888;cursor:pointer}

    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:300}
    .loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#888;font-size:13px}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="header-title" id="pageTitle">Sửa đơn</span>
  </div>
  <button class="save-btn" onclick="saveEdit()">Lưu</button>
</div>

<div class="body" id="body"><div class="loading">Đang tải...</div></div>

<!-- Product Picker -->
<div class="picker-overlay" id="pickerOverlay" onclick="closePicker()">
  <div class="picker-sheet" onclick="event.stopPropagation()">
    <div class="picker-header">
      <div class="picker-title">Chọn món</div>
      <div class="picker-search-wrap">
        <svg class="picker-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="picker-search" id="pickerSearch" placeholder="Tìm món..." oninput="filterPicker(this.value)">
      </div>
    </div>
    <div class="picker-list" id="pickerList"></div>
    <div class="picker-close" onclick="closePicker()">Đóng</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../auth/auth.js"></script>
<script>
  Auth.require('revenue');
  const fmt = n => (n||0).toLocaleString('en-US') + ' ₫';
  const fmtDate=(d,t=false)=>{const dt=d instanceof Date?d:new Date(d);const p=n=>String(n).padStart(2,'0');const s=`${p(dt.getDate())}/${p(dt.getMonth()+1)}/${dt.getFullYear()}`;return t?`${s} ${p(dt.getHours())}:${p(dt.getMinutes())}`:s;};

  const params = new URLSearchParams(location.search);
  const orderId = params.get('id');
  if(!orderId){ history.back(); }

  let ORDER = null;
  let PRODUCTS = [];
  let editItems = [];
  let editMethod = 'Tiền mặt';
  let editDiscountAmount = 0;
  let editActualReceived = null;

  // ── INIT ──
  async function init(){
    if(!orderId) return;
    try{
      const [orders, prods] = await Promise.all([
        DB.select('orders', `id=eq.${orderId}&select=*`),
        DB.select('products', 'active=eq.true&select=id,name,icon,color,price,category&order=sort_order.asc'),
      ]);
      ORDER = orders?.[0];
      PRODUCTS = prods || [];
      if(!ORDER){ document.getElementById('body').innerHTML='<div class="loading">Không tìm thấy đơn</div>'; return; }
      populate();
    } catch(e){
      document.getElementById('body').innerHTML=`<div class="loading">Lỗi: ${e.message}</div>`;
    }
  }

  function populate(){
    document.getElementById('pageTitle').textContent = `Sửa đơn ${ORDER.order_num||''}`;
    editItems = (Array.isArray(ORDER.items) ? ORDER.items : []).map(i=>({...i}));
    editMethod = ORDER.method || 'Tiền mặt';
    editDiscountAmount = ORDER.discount_amount || 0;
    editActualReceived = ORDER.actual_received || null;
    renderBody();
  }

  function renderBody(){
    const pad = n => String(n).padStart(2,'0');
    const d = new Date(ORDER.created_at);
    const dtVal = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;

    document.getElementById('body').innerHTML = `
      <!-- Thông tin đơn -->
      <div class="section">
        <div class="section-title">Thông tin đơn</div>
        <div class="field">
          <span class="field-label">Số đơn</span>
          <input class="field-input" id="ef-order-num" value="${ORDER.order_num||''}" placeholder="#001">
        </div>
        <div class="field">
          <span class="field-label">Thời gian</span>
          <input class="field-input" id="ef-datetime" type="datetime-local" value="${dtVal}">
        </div>
        <div class="field">
          <span class="field-label">Nhân viên</span>
          <input class="field-input" id="ef-staff" value="${ORDER.staff_name||''}" placeholder="Tên nhân viên">
        </div>
      </div>

      <!-- Món đặt -->
      <div class="section">
        <div class="section-title">Món đặt</div>
        <div id="itemsList"></div>
        <div class="add-item-btn" onclick="openPicker()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Thêm món
        </div>
      </div>

      <!-- Hình thức thanh toán -->
      <div class="section">
        <div class="section-title">Hình thức thanh toán</div>
        <div class="method-grid">
          <button class="method-opt" id="mopt-cash"     onclick="selMethod('Tiền mặt')">Tiền mặt</button>
          <button class="method-opt" id="mopt-transfer" onclick="selMethod('Chuyển khoản')">Chuyển khoản</button>
        </div>
      </div>

      <!-- Tài chính -->
      <div class="finance-box">
        <div class="fin-row">
          <span class="fin-label">Tạm tính</span>
          <span class="fin-value" id="fin-subtotal">0 ₫</span>
        </div>
        <div class="fin-row" style="margin-top:10px">
          <span class="fin-label">Chiết khấu</span>
          <div class="fin-input-wrap">
            <input class="fin-input" id="ef-discount" type="text" inputmode="numeric" placeholder="0"
              oninput="fmtInput(this);calcFinance()" style="width:120px">
            <span style="font-size:13px;color:#888">₫</span>
          </div>
        </div>
        <div class="fin-divider"></div>
        <div class="fin-payable-row">
          <span class="fin-payable-label">Cần thanh toán</span>
          <span class="fin-payable-value" id="fin-payable">0 ₫</span>
        </div>
        <div class="fin-divider"></div>
        <div class="fin-row">
          <span class="fin-label">Thực thu</span>
          <div class="fin-input-wrap">
            <input class="fin-input" id="ef-actual" type="text" inputmode="numeric" placeholder="0"
              oninput="fmtInput(this);calcFinance()" style="width:120px">
            <span style="font-size:13px;color:#888">₫</span>
          </div>
        </div>
        <div class="fin-change" id="fin-change">
          <span class="fin-change-lbl">Hoàn lại cho khách</span>
          <span class="fin-change-val" id="fin-change-val"></span>
        </div>
      </div>`;

    selMethod(editMethod);
    setInput('ef-discount', editDiscountAmount);
    setInput('ef-actual', editActualReceived);
    renderItems();
  }

  // ── ITEMS ──
  function renderItems(){
    const el = document.getElementById('itemsList');
    if(!editItems.length){
      el.innerHTML='<div style="padding:14px 16px;font-size:13px;color:#bbb">Chưa có món nào</div>';
      calcFinance(); return;
    }
    el.innerHTML = editItems.map((item,idx)=>`
      <div class="item-row">
        <div class="item-info">
          <div class="item-name">${item.name||'?'}</div>
          <input class="item-price-input" value="${(item.price||0).toLocaleString('en-US')}"
            onchange="setItemPrice(${idx},this.value)" placeholder="Đơn giá">
        </div>
        <div class="qty-ctrl">
          <button class="qb" onclick="chgQty(${idx},-1)">−</button>
          <span class="qn">${item.qty||1}</span>
          <button class="qb" onclick="chgQty(${idx},1)">+</button>
          <button class="qb del" onclick="removeItem(${idx})">✕</button>
        </div>
      </div>`).join('');
    calcFinance();
  }

  function chgQty(idx,d){
    editItems[idx].qty=(editItems[idx].qty||1)+d;
    if(editItems[idx].qty<=0) editItems.splice(idx,1);
    renderItems();
  }
  function removeItem(idx){ editItems.splice(idx,1); renderItems(); }
  function setItemPrice(idx,val){
    editItems[idx].price = parseFloat(String(val).replace(/[^0-9.]/g,''))||0;
    calcFinance();
  }

  // ── METHOD ──
  function selMethod(m){
    editMethod=m;
    document.getElementById('mopt-cash')?.classList.toggle('sel',m==='Tiền mặt');
    document.getElementById('mopt-transfer')?.classList.toggle('sel',m==='Chuyển khoản');
  }

  // ── FINANCE ──
  function fmtInput(el){
    const raw=el.value.replace(/[^0-9]/g,'');
    el.value = raw ? parseInt(raw,10).toLocaleString('en-US') : '';
  }
  function parseInput(id){ return parseInt((document.getElementById(id)?.value||'').replace(/,/g,''),10)||0; }
  function setInput(id,val){ const el=document.getElementById(id); if(el) el.value=val?val.toLocaleString('en-US'):''; }

  function calcSubtotal(){
    return editItems.reduce((s,i)=>s+(parseFloat(String(i.price).replace(/[^0-9.-]/g,''))||0)*(i.qty||1),0);
  }

  function calcFinance(){
    const subtotal = calcSubtotal();
    editDiscountAmount = Math.max(0, parseInput('ef-discount'));
    editActualReceived = parseInput('ef-actual') || null;
    const disc = Math.min(editDiscountAmount, subtotal);
    const payable = Math.max(0, subtotal - disc);

    document.getElementById('fin-subtotal').textContent = fmt(subtotal);
    document.getElementById('fin-payable').textContent  = fmt(payable);

    const changeEl = document.getElementById('fin-change');
    if(changeEl){
      if(editActualReceived && editActualReceived > payable){
        changeEl.style.display='flex';
        document.getElementById('fin-change-val').textContent = fmt(editActualReceived - payable);
      } else {
        changeEl.style.display='none';
      }
    }
  }

  // ── PICKER ──
  function openPicker(){
    document.getElementById('pickerSearch').value='';
    filterPicker('');
    document.getElementById('pickerOverlay').classList.add('show');
  }
  function closePicker(){ document.getElementById('pickerOverlay').classList.remove('show'); }
  function filterPicker(q){
    const list=document.getElementById('pickerList');
    const filtered=q?PRODUCTS.filter(p=>(p.name||'').toLowerCase().includes(q.toLowerCase())):PRODUCTS;
    if(!filtered.length){list.innerHTML='<div style="padding:16px;text-align:center;font-size:13px;color:#bbb">Không tìm thấy</div>';return;}
    list.innerHTML=filtered.map(p=>`
      <div class="picker-item" onclick="addFromPicker('${p.id}')">
        <div class="picker-icon" style="background:${p.color||'#f5f5f0'}">${p.icon||'☕'}</div>
        <span class="picker-name">${p.name}</span>
        <span class="picker-price">${fmt(p.price||0)}</span>
      </div>`).join('');
  }
  function addFromPicker(id){
    const p=PRODUCTS.find(x=>x.id===id); if(!p) return;
    const ex=editItems.find(i=>i.id===id);
    if(ex) ex.qty=(ex.qty||1)+1;
    else editItems.push({id:p.id,name:p.name,qty:1,price:p.price||0});
    closePicker(); renderItems();
  }

  // ── SAVE ──
  async function saveEdit(){
    const orderNum  = document.getElementById('ef-order-num').value.trim();
    const dtVal     = document.getElementById('ef-datetime').value;
    const staffName = document.getElementById('ef-staff').value.trim();
    const subtotal  = calcSubtotal();
    const disc      = Math.min(editDiscountAmount, subtotal);
    const payable   = Math.max(0, subtotal - disc);
    const payload = {
      order_num:       orderNum || undefined,
      items:           editItems,
      subtotal,
      discount_amount: disc || undefined,
      actual_received: editActualReceived || undefined,
      total:           payable,
      method:          editMethod,
      staff_name:      staffName || undefined,
    };
    if(dtVal) payload.created_at = new Date(dtVal).toISOString();
    try{
      await DB.update('orders', `id=eq.${orderId}`, payload);
      toast('Đã lưu đơn hàng');
      setTimeout(()=>history.back(), 800);
    } catch(e){ toast('Lỗi: '+e.message); }
  }

  // ── TOAST ──
  function toast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg; el.style.opacity=1;
    setTimeout(()=>el.style.opacity=0,2200);
  }

  init();
</script>
</body>
</html>
