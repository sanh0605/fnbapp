<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Đơn bán hàng</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none;flex-shrink:0}
    .header-title{font-size:15px;font-weight:600}
    .period-bar{background:#fff;padding:8px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .period-bar::-webkit-scrollbar{display:none}
    .period-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #d8d6d0;background:transparent;color:#888;font-size:13px;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:inherit}
    .period-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .date-nav{background:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .nav-arrow{width:30px;height:30px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888}
    .nav-arrow:active{background:#e8e6e0}
    .date-label{font-size:14px;font-weight:500}
    .today-btn{font-size:12px;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px}
    .summary-bar{background:#fff;border-bottom:0.5px solid #e8e6e0;padding:10px 16px;display:flex;gap:0;flex-shrink:0}
    .sum-item{flex:1;text-align:center}
    .sum-item+.sum-item{border-left:0.5px solid #e8e6e0}
    .sum-label{font-size:11px;color:#888;margin-bottom:3px}
    .sum-value{font-size:16px;font-weight:700;color:#1a1a18}
    .sum-value.green{color:#1D9E75}
    .pay-breakdown{background:#fff;border-bottom:0.5px solid #e8e6e0;padding:10px 14px;display:flex;gap:8px;flex-shrink:0}
    .pay-chip{flex:1;border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
    .pay-chip.cash{background:#E1F5EE}
    .pay-chip.transfer{background:#E6F1FB}
    .pay-chip.voided{background:#f5f5f0}
    .pay-chip-label{font-size:10px;font-weight:500;color:#888}
    .pay-chip.cash .pay-chip-label{color:#085041}
    .pay-chip.transfer .pay-chip-label{color:#0C447C}
    .pay-chip-value{font-size:13px;font-weight:700;color:#1a1a18}
    .pay-chip.cash .pay-chip-value{color:#085041}
    .pay-chip.transfer .pay-chip-value{color:#0C447C}
    .pay-chip-count{font-size:11px;color:#888}
    .search-bar{padding:10px 14px;background:#f5f5f0;flex-shrink:0}
    .search-input{width:100%;padding:9px 14px 9px 36px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:13px;background:#fff;font-family:inherit;color:#1a1a18}
    .search-input:focus{outline:none;border-color:#1D9E75}
    .search-wrap{position:relative}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#bbb;pointer-events:none}
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:10px 14px 24px;display:flex;flex-direction:column;gap:8px}
    .content::-webkit-scrollbar{display:none}
    .loading{display:flex;align-items:center;justify-content:center;padding:32px;color:#888;font-size:13px}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:8px;color:#bbb;font-size:13px}
    .custom-row{display:flex;gap:8px;align-items:center;padding:10px 14px;background:#f5f5f0;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .custom-row input[type=text]{flex:1;padding:8px 10px;border:0.5px solid #e8e6e0;border-radius:10px;font-size:13px;color:#1a1a18;background:#fff;font-family:inherit;text-align:center}
    .custom-row input[type=text]:focus{outline:none;border-color:#1D9E75}
    .custom-apply{padding:8px 14px;border-radius:10px;border:none;background:#1D9E75;color:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}

    /* ── CARD ĐƠN ── */
    .day-group-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:4px 2px 6px;margin-top:4px;flex-shrink:0}
    .order-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden;flex-shrink:0}
    .order-card.voided{opacity:.5;border-style:dashed}
    .order-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
    .order-num{font-size:13px;font-weight:700;min-width:42px}
    .order-info{flex:1;min-width:0}
    .order-time{font-size:12px;color:#888}
    .order-items-preview{font-size:12px;color:#888;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .order-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
    .order-total{font-size:14px;font-weight:700}
    .method-tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
    .method-cash{background:#E1F5EE;color:#085041}
    .method-transfer{background:#E6F1FB;color:#0C447C}
    .method-void{background:#FCEBEB;color:#A32D2D}
    .order-chevron{color:#bbb;transition:transform .2s;flex-shrink:0}
    .order-chevron.open{transform:rotate(180deg)}
    .order-detail{display:none;border-top:0.5px solid #e8e6e0;padding:0 14px 12px}
    .order-detail.open{display:block}
    .detail-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid #f5f5f0}
    .detail-item:last-child{border-bottom:none}
    .di-name{font-size:13px;color:#1a1a18}
    .di-qty{font-size:12px;color:#888}
    .di-price{font-size:13px;font-weight:500}
    .detail-staff{font-size:11px;color:#bbb;padding-top:8px;border-top:0.5px solid #f5f5f0;margin-top:4px}
    .detail-actions{display:flex;gap:8px;margin-top:10px}
    .edit-btn{flex:1;padding:9px;border-radius:10px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .edit-btn:active{background:#9FE1CB}
    .void-btn{flex:1;padding:9px;border-radius:10px;border:none;background:#FCEBEB;color:#A32D2D;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .void-btn:active{background:#f5c6c6}

    /* ── OVERLAY CHUNG ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
    .sheet-title{font-size:15px;font-weight:600;text-align:center}
    .sheet-sub{font-size:13px;color:#888;text-align:center}
    .sheet-btn{padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sheet-btn.red{background:#FCEBEB;color:#A32D2D}
    .sheet-btn.gray{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}

    /* ── EDIT OVERLAY (full screen) ── */
    .edit-overlay{position:fixed;inset:0;background:#f5f5f0;z-index:400;display:none;flex-direction:column;max-width:480px;left:50%;transform:translateX(-50%)}
    .edit-overlay.show{display:flex}
    .edit-header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .edit-header-left{display:flex;align-items:center;gap:10px}
    .edit-title{font-size:15px;font-weight:600}
    .save-btn{padding:7px 16px;border-radius:20px;border:none;background:#1D9E75;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .save-btn:active{background:#0F6E56}
    .edit-body{flex:1;overflow-y:auto;padding:12px 14px 32px;display:flex;flex-direction:column;gap:12px}
    .edit-section{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden}
    .edit-section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px 8px;border-bottom:0.5px solid #e8e6e0}
    .edit-field{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:0.5px solid #f5f5f0}
    .edit-field:last-child{border-bottom:none}
    .ef-label{font-size:13px;color:#888;flex-shrink:0;min-width:100px}
    .ef-input{flex:1;border:none;font-size:13px;color:#1a1a18;background:transparent;font-family:inherit;text-align:right;outline:none;min-width:0}
    .ef-input:focus{color:#1D9E75}
    .ef-input[type=datetime-local]{font-size:12px}

    /* Edit items */
    .edit-item-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:0.5px solid #f5f5f0}
    .edit-item-row:last-child{border-bottom:none}
    .ei-name{flex:1;min-width:0}
    .ei-n{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ei-price-input{font-size:12px;color:#888;border:none;background:transparent;font-family:inherit;text-align:right;width:72px;outline:none}
    .ei-price-input:focus{color:#1D9E75}
    .ei-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
    .eqb{width:26px;height:26px;border-radius:50%;border:0.5px solid #d8d6d0;background:#f5f5f0;color:#1a1a18;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .eqb:active{background:#e8e6e0}
    .eqb.del{border-color:#fcc;background:#FCEBEB;color:#A32D2D;font-size:13px}
    .eqn{font-size:13px;font-weight:600;min-width:18px;text-align:center}

    .add-item-btn{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;color:#1D9E75;font-size:13px;font-weight:500}
    .add-item-btn:active{background:#E1F5EE}

    /* Thanh toán */
    .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px}
    .method-opt{padding:10px;border-radius:10px;border:0.5px solid #d8d6d0;background:#f5f5f0;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center}
    .method-opt.sel{background:#E1F5EE;border-color:#1D9E75;color:#085041}

    /* Tổng + chiết khấu */
    .edit-total{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:14px 16px}
    .et-row{display:flex;justify-content:space-between;align-items:center}
    .et-label{font-size:15px;font-weight:700}
    .et-value{font-size:20px;font-weight:700;color:#1D9E75}
    .et-sub-label{font-size:13px;color:#888}
    .et-sub-value{font-size:14px;font-weight:600;color:#444}
    .et-divider{border:none;border-top:0.5px solid #f0f0ec;margin:10px 0}
    .et-field-input{border:0.5px solid #d8d6d0;border-radius:8px;padding:6px 10px;font-size:14px;font-weight:600;text-align:right;outline:none;font-family:inherit;background:#fff}
    .et-field-input:focus{border-color:#1D9E75}
    .et-change{display:flex;justify-content:space-between;align-items:center;margin-top:10px;background:#E1F5EE;border-radius:8px;padding:8px 12px;display:none}
    .et-change-lbl{font-size:13px;color:#085041}
    .et-change-val{font-size:14px;font-weight:700;color:#085041}

    /* ── PRODUCT PICKER ── */
    .picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:flex-end;justify-content:center}
    .picker-overlay.show{display:flex}
    .picker-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;display:flex;flex-direction:column;max-height:72dvh}
    .picker-header{padding:14px 16px 10px;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .picker-title{font-size:14px;font-weight:600;margin-bottom:8px}
    .picker-search-wrap{position:relative}
    .picker-search{width:100%;padding:8px 12px 8px 32px;border:0.5px solid #e8e6e0;border-radius:10px;font-size:13px;background:#f5f5f0;font-family:inherit}
    .picker-search:focus{outline:none;border-color:#1D9E75}
    .picker-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;pointer-events:none}
    .picker-list{overflow-y:auto;flex:1}
    .picker-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid #f5f5f0;cursor:pointer}
    .picker-item:active{background:#f5f5f0}
    .picker-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .picker-name{flex:1;font-size:13px;font-weight:500}
    .picker-price{font-size:12px;color:#888}
    .picker-close{padding:12px 16px;border-top:0.5px solid #e8e6e0;flex-shrink:0;text-align:center;font-size:13px;color:#888;cursor:pointer}

    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:600}
  </style>
</head>
<body>

<!-- ── HEADER + LIST ── -->
<div class="header">
  <div class="header-left">
    <button class="back-btn" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="header-title">Đơn bán hàng</span>
  </div>
</div>

<div class="period-bar">
  <button class="period-btn active" id="p-day"    onclick="setPeriod('day')">Hôm nay</button>
  <button class="period-btn"        id="p-week"   onclick="setPeriod('week')">Tuần này</button>
  <button class="period-btn"        id="p-month"  onclick="setPeriod('month')">Tháng này</button>
  <button class="period-btn"        id="p-custom" onclick="setPeriod('custom')">Tuỳ chọn</button>
</div>

<div class="date-nav" id="dateNav">
  <button class="nav-arrow" onclick="shiftPeriod(-1)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="date-label" id="dateLabel"></span>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="today-btn" onclick="goToday()">Hôm nay</button>
    <button class="nav-arrow" onclick="shiftPeriod(1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<div id="customRow" style="display:none" class="custom-row">
  <input type="text" id="cF" placeholder="dd/mm/yyyy" maxlength="10" inputmode="numeric" oninput="autoFmtDate(this)">
  <span style="font-size:13px;color:#888">—</span>
  <input type="text" id="cT" placeholder="dd/mm/yyyy" maxlength="10" inputmode="numeric" oninput="autoFmtDate(this)">
  <button class="custom-apply" onclick="applyCustom()">Xem</button>
</div>

<div class="summary-bar">
  <div class="sum-item"><div class="sum-label">Đơn hàng</div><div class="sum-value" id="sumCount">—</div></div>
  <div class="sum-item"><div class="sum-label">Doanh thu</div><div class="sum-value green" id="sumRevenue">—</div></div>
  <div class="sum-item"><div class="sum-label">Trung bình</div><div class="sum-value" id="sumAvg">—</div></div>
</div>

<div class="pay-breakdown" id="payBreakdown">
  <div class="pay-chip cash">
    <span class="pay-chip-label">Tiền mặt</span>
    <span class="pay-chip-value" id="pbCashRev">—</span>
    <span class="pay-chip-count" id="pbCashCnt">0 đơn</span>
  </div>
  <div class="pay-chip transfer">
    <span class="pay-chip-label">Chuyển khoản</span>
    <span class="pay-chip-value" id="pbTransRev">—</span>
    <span class="pay-chip-count" id="pbTransCnt">0 đơn</span>
  </div>
  <div class="pay-chip voided">
    <span class="pay-chip-label">Đã huỷ</span>
    <span class="pay-chip-value" id="pbVoidRev">—</span>
    <span class="pay-chip-count" id="pbVoidCnt">0 đơn</span>
  </div>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" placeholder="Tìm theo số đơn, món, nhân viên..." oninput="applySearch()">
  </div>
</div>

<div class="content" id="content"><div class="loading">Đang tải...</div></div>

<!-- ── OVERLAY HUỶ ĐƠN ── -->
<div class="overlay" id="voidOverlay" onclick="closeVoid()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Huỷ đơn hàng?</div>
    <div class="sheet-sub" id="voidSub"></div>
    <button class="sheet-btn red" onclick="confirmVoid()">Xác nhận huỷ</button>
    <button class="sheet-btn gray" onclick="closeVoid()">Đóng</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../lib/utils.js"></script>
<script src="../auth/auth.js"></script>
<script src="./orders.js"></script>
</body>
</html>
