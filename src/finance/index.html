<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Tài chính</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none;flex-shrink:0}
    .header-title{font-size:15px;font-weight:600;color:#1a1a18}
    .export-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:12px;font-weight:500;color:#888;cursor:pointer;font-family:inherit}
    .period-bar{background:#fff;padding:10px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .period-bar::-webkit-scrollbar{display:none}
    .period-btn{padding:6px 14px;border-radius:20px;border:0.5px solid #d8d6d0;background:transparent;color:#888;font-size:13px;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:inherit}
    .period-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .date-nav{background:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .nav-arrow{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888}
    .date-label{font-size:14px;font-weight:500;color:#1a1a18}
    .today-btn{font-size:12px;color:#1D9E75;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px}
    .tabs{background:#fff;display:flex;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .tab{flex:1;padding:10px 0;font-size:13px;font-weight:500;color:#888;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
    .tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
    .content{flex:1;overflow-y:auto;padding:12px 14px 32px;display:flex;flex-direction:column;gap:10px}
    .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .metric-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:13px 14px}
    .metric-card.full{grid-column:span 2}
    .metric-label{font-size:11px;color:#888;font-weight:500;margin-bottom:6px}
    .metric-value{font-size:20px;font-weight:700;color:#1a1a18}
    .metric-value.green{color:#1D9E75}
    .metric-value.red{color:#E24B4A}
    .metric-sub{font-size:12px;color:#888;margin-top:4px}
    .pl-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden}
    .pl-header{padding:12px 14px;background:#f5f5f0;border-bottom:0.5px solid #e8e6e0;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}
    .pl-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:0.5px solid #e8e6e0}
    .pl-row:last-child{border-bottom:none}
    .pl-row.profit{background:#E1F5EE20}
    .pl-row.loss{background:#FCEBEB20}
    .pl-row.section{background:#f5f5f040;padding:6px 14px}
    .pl-label{font-size:13px;color:#1a1a18}
    .pl-label.muted{color:#888;font-size:12px}
    .pl-label.bold{font-weight:600;font-size:14px}
    .pl-value{font-size:13px;font-weight:500;color:#1a1a18;text-align:right}
    .pl-value.green{color:#1D9E75}
    .pl-value.red{color:#E24B4A}
    .pl-value.bold{font-size:15px;font-weight:700}
    .pl-value.muted{color:#888;font-size:12px}
    .pl-pct{font-size:11px;color:#888;text-align:right;margin-top:1px}
    .expense-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden}
    .expense-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #e8e6e0}
    .expense-title{font-size:13px;font-weight:500;color:#1a1a18}
    .add-expense-btn{padding:5px 12px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
    .expense-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid #e8e6e0;cursor:pointer}
    .expense-row:last-child{border-bottom:none}
    .expense-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .expense-info{flex:1}
    .expense-name{font-size:13px;font-weight:500;color:#1a1a18}
    .expense-type{font-size:11px;color:#888;margin-top:1px}
    .expense-amount{font-size:13px;font-weight:500;color:#1a1a18;text-align:right}
    .cogs-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid #e8e6e0;cursor:pointer}
    .cogs-row:last-child{border-bottom:none}
    .cogs-icon{font-size:18px;flex-shrink:0}
    .cogs-info{flex:1}
    .cogs-name{font-size:13px;font-weight:500;color:#1a1a18}
    .cogs-detail{font-size:11px;color:#888;margin-top:1px}
    .cogs-cost{font-size:13px;font-weight:500;color:#1a1a18;text-align:right}
    .cogs-unit{font-size:11px;color:#888;text-align:right}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:85dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600;color:#1a1a18}
    .sheet-sub{font-size:13px;color:#888;margin-top:-8px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input,.field select{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field input:focus,.field select:focus{outline:none;border-color:#1D9E75;background:#fff}
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.danger{background:#FCEBEB;color:#A32D2D}
    .sheet-btn.secondary{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}
    .info-box{background:#E6F1FB;border-radius:10px;padding:10px 14px;font-size:12px;color:#0C447C;line-height:1.6}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0;gap:8px;color:#bbb;font-size:13px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:400}
  </style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <a href="../home/index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="header-title">Tài chính</span>
  </div>
  <button class="export-btn" onclick="exportCSV()">Xuất CSV</button>
</div>
<div class="period-bar">
  <button class="period-btn active" id="p-day"    onclick="setPeriod('day')">Hôm nay</button>
  <button class="period-btn"        id="p-week"   onclick="setPeriod('week')">Tuần này</button>
  <button class="period-btn"        id="p-month"  onclick="setPeriod('month')">Tháng này</button>
  <button class="period-btn"        id="p-year"   onclick="setPeriod('year')">Năm này</button>
  <button class="period-btn"        id="p-custom" onclick="setPeriod('custom')">Tuỳ chọn</button>
</div>
<div class="date-nav" id="dateNav">
  <button class="nav-arrow" onclick="shiftPeriod(-1)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="date-label" id="dateLabel"></span>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="today-btn" onclick="goToday()">Hôm nay</button>
    <button class="nav-arrow" onclick="shiftPeriod(1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>
<div class="tabs">
  <button class="tab active" id="tab1" onclick="switchTab(1)">P&amp;L</button>
  <button class="tab"        id="tab2" onclick="switchTab(2)">Chi phí</button>
  <button class="tab"        id="tab3" onclick="switchTab(3)">Giá vốn</button>
</div>
<div class="content" id="content"><div class="empty">Đang tải...</div></div>

<!-- Chi phí sheet -->
<div class="overlay" id="expOverlay" onclick="hideExp()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="expTitle">Thêm chi phí</div>
    <div class="field"><label>Tên chi phí</label><input type="text" id="expName" placeholder="VD: Tiền đá viên, Xăng xe..."></div>
    <div class="field"><label>Danh mục</label>
      <select id="expCat">
        <option value="nguyen_lieu">Nguyên liệu</option>
        <option value="van_hanh">Vận hành</option>
        <option value="nhan_su">Nhân sự</option>
        <option value="khau_hao">Khấu hao</option>
        <option value="dich_vu">Dịch vụ & phần mềm</option>
        <option value="khac">Khác</option>
      </select>
    </div>
    <div class="field"><label>Loại chi phí</label>
      <select id="expType">
        <option value="daily">Cố định hàng ngày</option>
        <option value="weekly">Cố định hàng tuần</option>
        <option value="monthly">Cố định hàng tháng</option>
        <option value="once">Một lần (phát sinh)</option>
      </select>
    </div>
    <div class="field"><label>Số tiền (₫)</label><input type="number" id="expAmount" placeholder="0" min="0" step="1000"></div>
    <div class="field"><label>Ngày phát sinh</label><input type="date" id="expDate"></div>
    <div class="field"><label>Ghi chú</label><input type="text" id="expNote" placeholder="Ghi chú thêm..."></div>
    <button class="sheet-btn primary" onclick="saveExp()">Lưu chi phí</button>
    <button class="sheet-btn danger" id="delExpBtn" style="display:none" onclick="deleteExp()">Xoá chi phí này</button>
    <button class="sheet-btn secondary" onclick="hideExp()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../auth/auth.js"></script>
<script>
  Auth.require('finance');
  const session=Auth.getSession();
  const fmt=n=>n.toLocaleString('en-US')+' ₫';
  const fmtDate=(d,t=false)=>{const dt=d instanceof Date?d:new Date(d);const p=n=>String(n).padStart(2,'0');const s=`${p(dt.getDate())}/${p(dt.getMonth()+1)}/${dt.getFullYear()}`;return t?`${s} ${p(dt.getHours())}:${p(dt.getMinutes())}`:s;};
  const toISO=d=>d.toISOString();
  const toDateInput=d=>{const dd=new Date(d);return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;};

  const RAW_ITEMS=[
    {id:'ca_phe_bot',name:'Cà phê bột',icon:'☕',unit:'g'},
    {id:'cacao_bot',name:'Cacao bột',icon:'🍫',unit:'g'},
    {id:'matcha_bot',name:'Matcha bột',icon:'🍵',unit:'g'},
    {id:'bot_kem_muoi',name:'Bột kem muối',icon:'🧂',unit:'g'},
    {id:'sua_dac',name:'Sữa đặc',icon:'🥛',unit:'g'},
    {id:'sua_tuoi',name:'Sữa tươi',icon:'🍼',unit:'ml'},
    {id:'duong',name:'Đường',icon:'🍬',unit:'g'},
    {id:'nuoc',name:'Nước',icon:'💧',unit:'ml'},
  ];
  const SEMI_RECIPES=[
    {id:'cot_ca_phe',yields:500,recipe:[{id:'ca_phe_bot',amount:200},{id:'nuoc',amount:650}]},
    {id:'cot_cacao',yields:1000,recipe:[{id:'cacao_bot',amount:200},{id:'nuoc',amount:1000}]},
    {id:'cot_matcha',yields:1000,recipe:[{id:'matcha_bot',amount:100},{id:'nuoc',amount:1000}]},
    {id:'kem_muoi',yields:300,recipe:[{id:'bot_kem_muoi',amount:100},{id:'sua_tuoi',amount:200}]},
    {id:'nuoc_duong',yields:1000,recipe:[{id:'duong',amount:600},{id:'nuoc',amount:1000}]},
  ];
  const MENU=[
    {id:1,name:'Cà phê đen',price:18000,ingredients:[{id:'cot_ca_phe',amount:60},{id:'nuoc_duong',amount:20}]},
    {id:2,name:'Cà phê sữa',price:20000,ingredients:[{id:'cot_ca_phe',amount:50},{id:'sua_dac',amount:20}]},
    {id:3,name:'Cà phê sữa tươi',price:22000,ingredients:[{id:'cot_ca_phe',amount:30},{id:'sua_dac',amount:30},{id:'sua_tuoi',amount:70}]},
    {id:4,name:'Cà phê kem muối',price:24000,ingredients:[{id:'cot_ca_phe',amount:50},{id:'sua_dac',amount:20},{id:'kem_muoi',amount:30}]},
    {id:5,name:'Matcha latte',price:23000,ingredients:[{id:'cot_matcha',amount:40},{id:'sua_dac',amount:30},{id:'sua_tuoi',amount:70}]},
    {id:6,name:'Cacao latte',price:23000,ingredients:[{id:'cot_cacao',amount:40},{id:'sua_dac',amount:30},{id:'sua_tuoi',amount:70}]},
  ];
  const CAT_COLORS={nguyen_lieu:'#1D9E75',van_hanh:'#378ADD',nhan_su:'#7F77DD',khau_hao:'#BA7517',dich_vu:'#D4537E',khac:'#888'};
  const CAT_NAMES={nguyen_lieu:'Nguyên liệu',van_hanh:'Vận hành',nhan_su:'Nhân sự',khau_hao:'Khấu hao',dich_vu:'Dịch vụ & phần mềm',khac:'Khác'};
  const TYPE_NAMES={daily:'Hàng ngày',weekly:'Hàng tuần',monthly:'Hàng tháng',once:'Một lần'};

  let period='day',cursor=new Date(),activeTab=1,customFrom=null,customTo=null,editingExpId=null;
  cursor.setHours(0,0,0,0);

  function getRange(){
    const d=new Date(cursor);let from,to;
    if(period==='day'){from=new Date(d);from.setHours(0,0,0,0);to=new Date(d);to.setHours(23,59,59,999);}
    else if(period==='week'){const day=d.getDay(),diff=day===0?-6:1-day;from=new Date(d);from.setDate(d.getDate()+diff);from.setHours(0,0,0,0);to=new Date(from);to.setDate(from.getDate()+6);to.setHours(23,59,59,999);}
    else if(period==='month'){from=new Date(d.getFullYear(),d.getMonth(),1);to=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999);}
    else if(period==='year'){from=new Date(d.getFullYear(),0,1);to=new Date(d.getFullYear(),11,31,23,59,59,999);}
    else{from=customFrom||new Date(d);from=new Date(from);from.setHours(0,0,0,0);to=customTo||new Date(d);to=new Date(to);to.setHours(23,59,59,999);}
    return{from,to};
  }
  function setPeriod(p){period=p;['day','week','month','year','custom'].forEach(x=>document.getElementById('p-'+x).classList.toggle('active',x===p));document.getElementById('dateNav').style.display=p==='custom'?'none':'flex';cursor=new Date();cursor.setHours(0,0,0,0);loadAndRender();}
  function shiftPeriod(dir){if(period==='day')cursor.setDate(cursor.getDate()+dir);else if(period==='week')cursor.setDate(cursor.getDate()+dir*7);else if(period==='month')cursor.setMonth(cursor.getMonth()+dir);else if(period==='year')cursor.setFullYear(cursor.getFullYear()+dir);loadAndRender();}
  function goToday(){cursor=new Date();cursor.setHours(0,0,0,0);loadAndRender();}
  function switchTab(n){activeTab=n;[1,2,3].forEach(i=>document.getElementById('tab'+i).classList.toggle('active',i===n));loadAndRender();}
  function updateDateLabel(){const{from,to}=getRange();let label='';if(period==='day')label=from.toLocaleDateString('vi-VN',{day:'numeric',month:'numeric',year:'numeric'});else if(period==='week')label=`${from.toLocaleDateString('vi-VN',{day:'numeric',month:'numeric'})} — ${to.toLocaleDateString('vi-VN',{day:'numeric',month:'numeric',year:'numeric'})}`;else if(period==='month')label=from.toLocaleDateString('vi-VN',{month:'long',year:'numeric'});else if(period==='year')label=`Năm ${from.getFullYear()}`;document.getElementById('dateLabel').textContent=label;}

  async function loadAndRender(){
    updateDateLabel();
    document.getElementById('content').innerHTML='<div class="empty">Đang tải...</div>';
    const{from,to}=getRange();
    try {
      if(activeTab===1){
        const[orders,expenses,rawStock]=await Promise.all([
          DB.select('orders',`created_at=gte.${toISO(from)}&created_at=lte.${toISO(to)}&select=*`),
          DB.select('expenses','select=*'),
          DB.select('raw_stock','select=*'),
        ]);
        renderPL(orders,expenses,rawStock,from,to);
      } else if(activeTab===2){
        const expenses=await DB.select('expenses','select=*&order=created_at.desc');
        renderExpenses(expenses,from,to);
      } else {
        const rawStock=await DB.select('raw_stock','select=*');
        renderCOGS(rawStock);
      }
    } catch(e){document.getElementById('content').innerHTML=`<div class="empty">Lỗi: ${e.message}</div>`;}
  }

  function calcCOGS(orders,rawStockMap){
    let total=0;
    orders.forEach(o=>{
      (o.items||[]).forEach(item=>{
        const menuItem=MENU.find(m=>m.id===item.id);
        if(!menuItem)return;
        let costPerUnit=0;
        menuItem.ingredients.forEach(ing=>{
          const semi=SEMI_RECIPES.find(s=>s.id===ing.id);
          if(semi){semi.recipe.forEach(r=>{const rawPrice=rawStockMap[r.id]?.avg_cost||0;costPerUnit+=rawPrice*(r.amount/semi.yields)*ing.amount;});}
          else{costPerUnit+=(rawStockMap[ing.id]?.avg_cost||0)*ing.amount;}
        });
        total+=costPerUnit*(item.qty||0);
      });
    });
    return Math.round(total);
  }

  function calcExpenseAmount(exp,from,to){
    const days=Math.max(1,Math.round((to-from)/(1000*60*60*24))+1);
    if(exp.expense_type==='once'){const d=new Date(exp.date);return(d>=from&&d<=to)?exp.amount:0;}
    if(exp.expense_type==='daily') return exp.amount*days;
    if(exp.expense_type==='weekly') return exp.amount*Math.ceil(days/7);
    if(exp.expense_type==='monthly') return exp.amount*Math.ceil(days/30);
    return 0;
  }

  function renderPL(orders,expenses,rawStock,from,to){
    const rawMap={};rawStock.forEach(r=>rawMap[r.id]=r);
    const revenue=orders.reduce((s,o)=>s+o.total,0);
    const cogs=calcCOGS(orders,rawMap);
    const grossProfit=revenue-cogs;
    const grossMargin=revenue>0?grossProfit/revenue*100:0;
    const expByCat={};
    let totalOpex=0;
    expenses.forEach(exp=>{const amt=calcExpenseAmount(exp,from,to);if(amt>0){expByCat[exp.category]=(expByCat[exp.category]||0)+amt;totalOpex+=amt;}});
    const netProfit=grossProfit-totalOpex;
    const netMargin=revenue>0?netProfit/revenue*100:0;
    document.getElementById('content').innerHTML=`
      <div class="metrics-grid">
        <div class="metric-card full"><div class="metric-label">Doanh thu thuần</div><div class="metric-value green">${fmt(revenue)}</div><div class="metric-sub">${orders.length} đơn hàng</div></div>
        <div class="metric-card"><div class="metric-label">Lãi gộp</div><div class="metric-value${grossProfit>=0?' green':' red'}">${fmt(grossProfit)}</div><div class="metric-sub">Biên ${grossMargin.toFixed(1)}%</div></div>
        <div class="metric-card"><div class="metric-label">Lãi ròng</div><div class="metric-value${netProfit>=0?' green':' red'}">${fmt(netProfit)}</div><div class="metric-sub">Biên ${netMargin.toFixed(1)}%</div></div>
      </div>
      <div class="pl-card">
        <div class="pl-header">Báo cáo lãi lỗ (P&L)</div>
        <div class="pl-row"><span class="pl-label bold">Doanh thu</span><div><div class="pl-value bold green">${fmt(revenue)}</div></div></div>
        <div class="pl-row section"><span class="pl-label muted">Giá vốn hàng bán (COGS)</span><span class="pl-value muted">${fmt(cogs)}</span></div>
        <div class="pl-row"><span class="pl-label bold">Lãi gộp</span><div><div class="pl-value bold${grossProfit>=0?' green':' red'}">${fmt(grossProfit)}</div><div class="pl-pct">Biên gộp ${grossMargin.toFixed(1)}%</div></div></div>
        <div class="pl-row section"><span class="pl-label muted">Chi phí vận hành (OPEX)</span><span class="pl-value muted">${fmt(totalOpex)}</span></div>
        ${Object.entries(expByCat).map(([cat,amt])=>`<div class="pl-row" style="padding:7px 14px 7px 24px"><span class="pl-label muted" style="font-size:12px">— ${CAT_NAMES[cat]||cat}</span><span class="pl-value muted">${fmt(amt)}</span></div>`).join('')}
        <div class="pl-row${netProfit>=0?' profit':' loss'}"><span class="pl-label bold">Lãi ròng</span><div><div class="pl-value bold${netProfit>=0?' green':' red'}">${fmt(netProfit)}</div><div class="pl-pct">Biên ròng ${netMargin.toFixed(1)}%</div></div></div>
      </div>
      ${revenue===0?'<div class="info-box">Chưa có dữ liệu bán hàng trong kỳ này.</div>':''}`;
  }

  function renderExpenses(expenses,from,to){
    const days=Math.max(1,Math.round((to-from)/(1000*60*60*24))+1);
    let totalOpex=0;
    expenses.forEach(e=>{totalOpex+=calcExpenseAmount(e,from,to);});
    document.getElementById('content').innerHTML=`
      <div class="expense-card">
        <div class="expense-header"><span class="expense-title">Danh sách chi phí</span><button class="add-expense-btn" onclick="showExp()">+ Thêm</button></div>
        ${expenses.length===0?'<div class="empty" style="padding:24px">Chưa có chi phí nào</div>':
          expenses.map(exp=>`<div class="expense-row" onclick="showExp('${exp.id}')">
            <div class="expense-dot" style="background:${CAT_COLORS[exp.category]||'#888'}"></div>
            <div class="expense-info"><div class="expense-name">${exp.name}</div><div class="expense-type">${CAT_NAMES[exp.category]||exp.category} · ${TYPE_NAMES[exp.expense_type]||exp.expense_type}</div></div>
            <div style="text-align:right"><div class="expense-amount">${fmt(exp.amount)}</div><div style="font-size:11px;color:#888">${TYPE_NAMES[exp.expense_type]||exp.expense_type}</div></div>
          </div>`).join('')}
      </div>
      <div class="pl-card"><div class="pl-row" style="background:#f5f5f0"><span class="pl-label bold">Tổng chi phí kỳ này</span><span class="pl-value bold red">${fmt(totalOpex)}</span></div></div>`;
  }

  function renderCOGS(rawStock){
    const rawMap={};rawStock.forEach(r=>rawMap[r.id]=r);
    document.getElementById('content').innerHTML=`
      <div class="info-box">Giá vốn tính theo bình quân gia quyền. Cập nhật tự động khi nhập kho trong module Nguyên liệu.</div>
      <div class="pl-card">
        <div class="pl-header">Giá vốn bình quân gia quyền</div>
        ${RAW_ITEMS.map(item=>{
          const d=rawMap[item.id]||{avg_cost:0,total_qty_imported:0};
          return `<div class="cogs-row">
            <span class="cogs-icon">${item.icon}</span>
            <div class="cogs-info"><div class="cogs-name">${item.name}</div><div class="cogs-detail">Đã nhập: ${(d.total_qty_imported||0).toLocaleString('en-US')}${item.unit}</div></div>
            <div><div class="cogs-cost">${d.avg_cost>0?fmt(Math.round(d.avg_cost*1000)):'Chưa có'}</div><div class="cogs-unit">${d.avg_cost>0?`₫ / 1000${item.unit}`:''}</div></div>
          </div>`;
        }).join('')}
      </div>`;
  }

  // ── CHI PHÍ CRUD ──
  function showExp(id){
    editingExpId=id||null;
    const title=document.getElementById('expTitle'),del=document.getElementById('delExpBtn');
    if(id){
      DB.select('expenses',`id=eq.${id}&select=*`).then(rows=>{
        if(!rows||!rows.length)return;
        const exp=rows[0];
        title.textContent='Chỉnh sửa chi phí';
        document.getElementById('expName').value=exp.name;
        document.getElementById('expCat').value=exp.category;
        document.getElementById('expType').value=exp.expense_type;
        document.getElementById('expAmount').value=exp.amount;
        document.getElementById('expDate').value=exp.date||toDateInput(new Date());
        document.getElementById('expNote').value=exp.note||'';
        del.style.display='block';
        document.getElementById('expOverlay').classList.add('show');
      });
    } else {
      title.textContent='Thêm chi phí';
      ['expName','expNote'].forEach(x=>document.getElementById(x).value='');
      document.getElementById('expCat').value='van_hanh';
      document.getElementById('expType').value='daily';
      document.getElementById('expAmount').value='';
      document.getElementById('expDate').value=toDateInput(new Date());
      del.style.display='none';
      document.getElementById('expOverlay').classList.add('show');
    }
  }
  function hideExp(){document.getElementById('expOverlay').classList.remove('show');}
  async function saveExp(){
    const name=document.getElementById('expName').value.trim();
    const category=document.getElementById('expCat').value;
    const expense_type=document.getElementById('expType').value;
    const amount=parseFloat(document.getElementById('expAmount').value);
    const date=document.getElementById('expDate').value;
    const note=document.getElementById('expNote').value.trim();
    if(!name||isNaN(amount)||amount<0){toast('Vui lòng điền đầy đủ');return;}
    try {
      if(editingExpId){
        await DB.update('expenses',`id=eq.${editingExpId}`,{name,category,expense_type,amount,date,note:note||null});
      } else {
        await DB.insert('expenses',{name,category,expense_type,amount,date,note:note||null},false);
      }
      hideExp();toast(editingExpId?'✓ Đã cập nhật chi phí':'✓ Đã thêm chi phí');loadAndRender();
    } catch(e){toast('Lỗi: '+e.message);}
  }
  async function deleteExp(){
    if(!editingExpId)return;
    try{await DB.delete('expenses',`id=eq.${editingExpId}`);hideExp();toast('Đã xoá chi phí');loadAndRender();}
    catch(e){toast('Lỗi: '+e.message);}
  }

  async function exportCSV(){
    const{from,to}=getRange();
    const[orders,expenses,rawStock]=await Promise.all([
      DB.select('orders',`created_at=gte.${toISO(from)}&created_at=lte.${toISO(to)}&select=*`),
      DB.select('expenses','select=*'),
      DB.select('raw_stock','select=*'),
    ]);
    const rawMap={};rawStock.forEach(r=>rawMap[r.id]=r);
    const revenue=orders.reduce((s,o)=>s+o.total,0);
    const cogs=calcCOGS(orders,rawMap);
    const totalOpex=expenses.reduce((s,e)=>s+calcExpenseAmount(e,from,to),0);
    const rows=[['Báo cáo P&L',''],['Kỳ',`${fmtDate(from)} — ${fmtDate(to)}`],['',''],['Doanh thu',revenue],['Giá vốn',cogs],['Lãi gộp',revenue-cogs],['Chi phí',totalOpex],['Lãi ròng',revenue-cogs-totalOpex]];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='pl.csv';a.click();URL.revokeObjectURL(url);
  }

  function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2200);}
  loadAndRender();
</script>
</body>
</html>
