<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Nhập hàng</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

    /* HEADER */
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none;flex-shrink:0}
    .header-title{font-size:15px;font-weight:600}
    .new-btn{padding:7px 16px;border-radius:20px;border:none;background:#1D9E75;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .new-btn:active{background:#0F6E56}

    /* FILTER BAR */
    .filter-bar{background:#fff;padding:10px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #e8e6e0;flex-shrink:0;align-items:center}
    .filter-bar::-webkit-scrollbar{display:none}
    .filter-pill{padding:6px 14px;border-radius:20px;border:0.5px solid #d8d6d0;background:transparent;color:#888;font-size:12px;white-space:nowrap;cursor:pointer;font-family:inherit;transition:all .15s}
    .filter-pill.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .search-input{flex:1;min-width:120px;padding:7px 12px;border:0.5px solid #e8e6e0;border-radius:20px;font-size:13px;background:#f5f5f0;font-family:inherit;color:#1a1a18}
    .search-input:focus{outline:none;border-color:#1D9E75;background:#fff}

    /* CONTENT */
    .content{flex:1;overflow-y:auto;padding:12px 14px 32px;display:flex;flex-direction:column;gap:10px}

    /* PO CARD */
    .po-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden;cursor:pointer}
    .po-card:active{background:#f5f5f0}
    .po-card.status-pending{border-left:3px solid #EF9F27;border-radius:0 14px 14px 0}
    .po-card.status-received{border-left:3px solid #378ADD;border-radius:0 14px 14px 0}
    .po-card.status-completed{border-left:3px solid #1D9E75;border-radius:0 14px 14px 0}
    .po-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .po-left{}
    .po-num{font-size:13px;font-weight:600}
    .po-supplier{font-size:12px;color:#888;margin-top:2px}
    .po-date{font-size:11px;color:#bbb;margin-top:2px}
    .po-platform{font-size:11px;color:#378ADD;margin-top:2px}
    .po-right{text-align:right;flex-shrink:0}
    .po-amount{font-size:15px;font-weight:700;color:#1a1a18}
    .po-paid{font-size:11px;color:#888;margin-top:2px}
    .po-debt{font-size:11px;color:#E24B4A;margin-top:2px}
    .po-status-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px}
    .badge-pending{background:#FAEEDA;color:#633806}
    .badge-received{background:#E6F1FB;color:#0C447C}
    .badge-completed{background:#E1F5EE;color:#085041}
    .po-items-preview{padding:0 14px 12px;display:flex;flex-direction:column;gap:3px;border-top:0.5px solid #f5f5f0}
    .po-item-line{font-size:12px;color:#888;display:flex;justify-content:space-between}
    .po-item-name{font-weight:500;color:#1a1a18}

    /* OVERLAY / SHEET */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:95dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600}
    .sheet-sub{font-size:13px;color:#888;margin-top:-8px}

    /* FIELDS */
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input,.field select,.field textarea{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:14px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1D9E75;background:#fff}
    .field textarea{resize:none;height:64px;font-size:13px}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

    /* ITEMS */
    .items-section{display:flex;flex-direction:column;gap:8px}
    .items-header{display:flex;justify-content:space-between;align-items:center}
    .items-title{font-size:13px;font-weight:600}
    .add-item-btn{padding:5px 12px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
    .item-card{background:#f5f5f0;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px;position:relative}
    .item-del{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;border:none;background:#e8e6e0;color:#888;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
    .item-del:active{background:#FCEBEB;color:#A32D2D}
    .item-field{display:flex;flex-direction:column;gap:4px}
    .item-field label{font-size:11px;color:#888}
    .item-field input,.item-field select{width:100%;padding:8px 10px;border:0.5px solid #e8e6e0;border-radius:8px;font-size:13px;color:#1a1a18;background:#fff;font-family:inherit}
    .item-field input:focus,.item-field select:focus{outline:none;border-color:#1D9E75}
    .item-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .item-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .item-calc{font-size:11px;color:#1D9E75;background:#E1F5EE;border-radius:6px;padding:5px 8px}
    .item-readonly{background:#e8e6e0!important;color:#888!important}

    /* ADJUSTMENTS */
    .adj-section{display:flex;flex-direction:column;gap:8px}
    .adj-header{display:flex;justify-content:space-between;align-items:center}
    .adj-title{font-size:13px;font-weight:600}
    .add-adj-btn{padding:5px 12px;border-radius:20px;border:0.5px solid #888;background:#f5f5f0;color:#888;font-size:12px;cursor:pointer;font-family:inherit}
    .adj-row{display:flex;align-items:center;gap:8px}
    .adj-row input,.adj-row select{padding:8px 10px;border:0.5px solid #e8e6e0;border-radius:8px;font-size:13px;font-family:inherit;background:#f5f5f0;color:#1a1a18}
    .adj-row input:focus,.adj-row select:focus{outline:none;border-color:#1D9E75}
    .adj-label{flex:1}
    .adj-amount{width:120px}
    .adj-del{width:24px;height:24px;border-radius:50%;border:none;background:#e8e6e0;color:#888;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* SUMMARY */
    .summary-box{background:#f5f5f0;border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
    .sum-row{display:flex;justify-content:space-between;font-size:13px}
    .sum-row.total{font-weight:700;font-size:15px;padding-top:6px;border-top:0.5px solid #d8d6d0;margin-top:2px}
    .sum-row.debt{color:#E24B4A}
    .sum-label{color:#888}
    .sum-value{font-weight:500;color:#1a1a18}
    .sum-value.green{color:#1D9E75}
    .sum-value.red{color:#E24B4A}

    /* PAYMENTS */
    .payment-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #e8e6e0}
    .payment-row:last-child{border-bottom:none}
    .payment-info{flex:1}
    .payment-amount{font-size:14px;font-weight:600;color:#1D9E75}
    .payment-detail{font-size:12px;color:#888;margin-top:2px}

    /* SHEET BUTTONS */
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.primary:active{background:#0F6E56}
    .sheet-btn.secondary{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}
    .sheet-btn.danger{background:#FCEBEB;color:#A32D2D}
    .sheet-btn.blue{background:#E6F1FB;color:#0C447C}
    .sheet-btn:disabled{opacity:.5;cursor:default}

    .divider{height:0.5px;background:#e8e6e0}
    .section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 0;gap:8px;color:#bbb;font-size:13px}
    .info-box{background:#E6F1FB;border-radius:10px;padding:10px 14px;font-size:12px;color:#0C447C;line-height:1.6}
    .warn-box{background:#FAEEDA;border-radius:10px;padding:10px 14px;font-size:12px;color:#633806;line-height:1.6}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:500}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="../home/index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="header-title">Nhập hàng</span>
  </div>
  <button class="new-btn" onclick="showCreatePO()">+ Tạo đơn</button>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <button class="filter-pill active" id="f-all"       onclick="setFilter('all')">Tất cả</button>
  <button class="filter-pill"        id="f-pending"   onclick="setFilter('pending')">Đang giao</button>
  <button class="filter-pill"        id="f-received"  onclick="setFilter('received')">Đã nhận</button>
  <button class="filter-pill"        id="f-completed" onclick="setFilter('completed')">Hoàn tất</button>
  <input class="search-input" id="searchInput" placeholder="Tìm NCC, SKU, mã đơn..." oninput="onSearch(this.value)">
</div>

<div class="content" id="content"><div class="empty">Đang tải...</div></div>

<!-- ── TẠO / XEM ĐƠN NHẬP ── -->
<div class="overlay" id="poOverlay">
  <div class="sheet" id="poSheet" onclick="event.stopPropagation()">
    <!-- Nội dung render động -->
  </div>
</div>

<!-- ── THÊM THANH TOÁN ── -->
<div class="overlay" id="payOverlay" onclick="hidePayOverlay()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Ghi nhận thanh toán</div>
    <div class="field">
      <label>Số tiền thanh toán (₫)</label>
      <input type="number" id="payAmount" placeholder="0" min="0" step="1000">
    </div>
    <div class="field">
      <label>Hình thức</label>
      <select id="payMethod">
        <option value="transfer">Chuyển khoản</option>
        <option value="cash">Tiền mặt</option>
        <option value="cod">COD</option>
        <option value="other">Khác</option>
      </select>
    </div>
    <div class="field">
      <label>Ghi chú</label>
      <input type="text" id="payNote" placeholder="Ghi chú thanh toán...">
    </div>
    <button class="sheet-btn primary" onclick="savePayment()">Lưu thanh toán</button>
    <button class="sheet-btn secondary" onclick="hidePayOverlay()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../auth/auth.js"></script>
<script>
Auth.require('inventory_edit');
const session = Auth.getSession();
const fmt = n => (n||0).toLocaleString('en-US') + ' ₫';
  const fmtDate=(d,t=false)=>{const dt=d instanceof Date?d:new Date(d);const p=n=>String(n).padStart(2,'0');const s=`${p(dt.getDate())}/${p(dt.getMonth()+1)}/${dt.getFullYear()}`;return t?`${s} ${p(dt.getHours())}:${p(dt.getMinutes())}`:s;};
const fmtN = n => (n||0).toLocaleString('en-US');
  const fmtDate=(d,t=false)=>{const dt=d instanceof Date?d:new Date(d);const p=n=>String(n).padStart(2,'0');const s=`${p(dt.getDate())}/${p(dt.getMonth()+1)}/${dt.getFullYear()}`;return t?`${s} ${p(dt.getHours())}:${p(dt.getMinutes())}`:s;};

let allPOs = [], filteredPOs = [];
let currentFilter = 'all', searchQuery = '';
let SUPPLIERS = [], SKU_ITEMS = [], SKU_UNITS = [];

// ── State tạo đơn ──
let draftItems = [];       // line items
let draftAdjs  = [];       // adjustments
let editingPOId = null;
let viewingPOId = null;
let payingPOId  = null;

// ── INIT ──
async function init(){
  try {
    [SUPPLIERS, SKU_ITEMS, SKU_UNITS] = await Promise.all([
      DB.select('suppliers','active=eq.true&select=*&order=name.asc'),
      DB.select('sku_items','active=eq.true&select=*&order=name.asc'),
      DB.select('sku_units','select=*'),
    ]);
    await loadPOs();
  } catch(e){
    document.getElementById('content').innerHTML=`<div class="empty">Lỗi: ${e.message}</div>`;
  }
}

async function loadPOs(){
  const pos = await DB.select('purchase_orders',
    'select=*,suppliers(name),purchase_order_items(*)&order=created_at.desc'
  );
  allPOs = pos || [];
  applyFilterAndRender();
}

// ── FILTER ──
function setFilter(f){
  currentFilter = f;
  ['all','pending','received','completed'].forEach(x=>
    document.getElementById('f-'+x).classList.toggle('active',x===f)
  );
  applyFilterAndRender();
}

function onSearch(q){ searchQuery = q.toLowerCase().trim(); applyFilterAndRender(); }

function applyFilterAndRender(){
  let list = allPOs;
  if(currentFilter !== 'all') list = list.filter(p=>p.status===currentFilter);
  if(searchQuery){
    list = list.filter(p=>{
      const supplier = (p.suppliers?.name||p.supplier_id||'').toLowerCase();
      const items = (p.purchase_order_items||[]).map(i=>i.item_name.toLowerCase()).join(' ');
      const poNum = (p.po_num||'').toLowerCase();
      const platform = (p.platform_order_id||'').toLowerCase();
      return supplier.includes(searchQuery)||items.includes(searchQuery)||poNum.includes(searchQuery)||platform.includes(searchQuery);
    });
  }
  filteredPOs = list;
  renderList();
}

function renderList(){
  const el = document.getElementById('content');
  if(!filteredPOs.length){
    el.innerHTML='<div class="empty">Không có đơn nào</div>'; return;
  }
  el.innerHTML = filteredPOs.map(po=>{
    const items = po.purchase_order_items||[];
    const totalPaid = po._totalPaid||0; // sẽ load riêng
    const debt = (po.total_amount||0) - totalPaid;
    const statusLabel = {pending:'Đang giao',received:'Đã nhận hàng',completed:'Hoàn tất'}[po.status]||po.status;
    return `<div class="po-card status-${po.status}" onclick="showViewPO('${po.id}')">
      <div class="po-header">
        <div class="po-left">
          <div class="po-num">${po.po_num}</div>
          <div class="po-supplier">${po.suppliers?.name||'—'}</div>
          ${po.platform_order_id?`<div class="po-platform">📦 ${po.platform||'Sàn'}: ${po.platform_order_id}</div>`:''}
          <div class="po-date">${fmtDate(new Date(po.created_at))}</div>
          ${po.debt_due_date?`<div class="po-date" style="color:${new Date(po.debt_due_date)<new Date()?'#E24B4A':'#888'}">Hạn CN: ${fmtDate(new Date(po.debt_due_date))}</div>`:''}
        </div>
        <div class="po-right">
          <div class="po-amount">${fmt(po.total_amount)}</div>
          <span class="po-status-badge badge-${po.status}">${statusLabel}</span>
        </div>
      </div>
      ${items.length?`<div class="po-items-preview">
        ${items.slice(0,3).map(i=>`<div class="po-item-line">
          <span class="po-item-name">${i.item_name}</span>
          <span>${fmtN(i.input_qty)} ${i.sku_unit||i.input_unit} · ${fmt(i.amount_after_discount||i.total_price)}</span>
        </div>`).join('')}
        ${items.length>3?`<div class="po-item-line"><span style="color:#bbb">+${items.length-3} mặt hàng khác</span></div>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

// ── TẠO ĐƠN ──
function showCreatePO(){
  editingPOId = null;
  draftItems = [];
  draftAdjs  = [];
  renderPOSheet('create');
  document.getElementById('poOverlay').classList.add('show');
}

function renderPOSheet(mode){
  const sheet = document.getElementById('poSheet');
  const isCreate = mode === 'create';
  sheet.innerHTML = `
    <div class="sheet-title">${isCreate?'Tạo đơn nhập hàng':'Chỉnh sửa đơn'}</div>

    <div class="field">
      <label>Nhà cung cấp</label>
      <select id="dSupplier">
        <option value="">-- Chọn nhà cung cấp --</option>
        ${SUPPLIERS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
      </select>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Sàn TMĐT (nếu có)</label>
        <select id="dPlatform">
          <option value="">Trực tiếp</option>
          <option value="shopee">Shopee</option>
          <option value="lazada">Lazada</option>
          <option value="tiktok">TikTok Shop</option>
          <option value="other">Khác</option>
        </select>
      </div>
      <div class="field">
        <label>Mã đơn sàn</label>
        <input type="text" id="dPlatformId" placeholder="VD: 250410xxxxx">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Hạn công nợ (không bắt buộc)</label>
        <input type="date" id="dDebtDue">
      </div>
      <div class="field">
        <label>Phí vận chuyển (₫)</label>
        <input type="number" id="dShipping" value="0" min="0" step="1000">
      </div>
    </div>

    <div class="field">
      <label>Ghi chú đơn</label>
      <textarea id="dNote" placeholder="Ghi chú..."></textarea>
    </div>

    <div class="divider"></div>

    <!-- DANH SÁCH MẶT HÀNG -->
    <div class="items-section">
      <div class="items-header">
        <span class="items-title">Danh sách mặt hàng</span>
        <button class="add-item-btn" onclick="addDraftItem()">+ Thêm</button>
      </div>
      <div id="dItemsList"></div>
    </div>

    <div class="divider"></div>

    <!-- ĐIỀU CHỈNH GIÁ -->
    <div class="adj-section">
      <div class="adj-header">
        <span class="adj-title">Chiết khấu & Phụ phí</span>
        <button class="add-adj-btn" onclick="addDraftAdj()">+ Thêm</button>
      </div>
      <div id="dAdjList"></div>
    </div>

    <!-- TỔNG TIỀN -->
    <div class="summary-box" id="dSummary"></div>

    <button class="sheet-btn primary" onclick="savePO()">Lưu đơn nhập hàng</button>
    <button class="sheet-btn secondary" onclick="hidePOOverlay()">Huỷ</button>
  `;
  renderDraftItems();
  renderDraftAdjs();
  updateSummary();
}

function addDraftItem(){
  draftItems.push({skuId:'',skuName:'',skuUnit:'',toBase:1,baseUnit:'',qty:0,amtBefore:0,discount:0,amtAfter:0});
  renderDraftItems();
}
function removeDraftItem(i){ draftItems.splice(i,1); renderDraftItems(); updateSummary(); }

function renderDraftItems(){
  const el = document.getElementById('dItemsList');
  if(!el) return;
  if(!draftItems.length){
    el.innerHTML='<div style="text-align:center;color:#bbb;font-size:13px;padding:12px 0">Chưa có mặt hàng. Nhấn "+ Thêm"</div>';
    return;
  }
  el.innerHTML = draftItems.map((item,i)=>{
    const units = item.skuId ? SKU_UNITS.filter(u=>u.sku_id===item.skuId) : [];
    const convInfo = item.qty>0&&item.toBase>1 ? `${item.qty} ${item.skuUnit} = ${(item.qty*item.toBase).toLocaleString('en-US')} ${item.baseUnit}` : '';
    return `<div class="item-card">
      <button class="item-del" onclick="removeDraftItem(${i})">×</button>
      <div class="item-field">
        <label>SKU / Sản phẩm</label>
        <select onchange="onItemSKUChange(${i},this.value)">
          <option value="">-- Chọn SKU --</option>
          ${SKU_ITEMS.map(s=>`<option value="${s.id}" ${item.skuId===s.id?'selected':''}>[${s.sku_code}] ${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="item-grid2">
        <div class="item-field">
          <label>Đơn vị tính</label>
          <select onchange="onItemUnitChange(${i},this.value,this.options[this.selectedIndex].dataset.rate,this.options[this.selectedIndex].dataset.base)">
            ${units.length
              ? units.map(u=>`<option value="${u.unit_name}" data-rate="${u.to_base}" data-base="${item.baseUnit}" ${item.skuUnit===u.unit_name?'selected':''}>${u.unit_name} (×${u.to_base})</option>`).join('')
              : `<option value="${item.baseUnit||''}">${item.baseUnit||'—'}</option>`}
          </select>
        </div>
        <div class="item-field">
          <label>Số lượng</label>
          <input type="number" min="0" step="any" value="${item.qty||''}" placeholder="0" oninput="onItemQty(${i},this.value)">
        </div>
      </div>
      <div class="item-grid3">
        <div class="item-field">
          <label>T.tiền trước CK (₫)</label>
          <input type="number" min="0" step="1000" value="${item.amtBefore||''}" placeholder="0" oninput="onItemAmtBefore(${i},this.value)">
        </div>
        <div class="item-field">
          <label>T.tiền sau CK (₫)</label>
          <input type="number" min="0" step="1000" value="${item.amtAfter||''}" placeholder="0" oninput="onItemAmtAfter(${i},this.value)">
        </div>
        <div class="item-field">
          <label>Chiết khấu (₫)</label>
          <input class="item-readonly" type="text" readonly value="${((item.amtBefore||0)-(item.amtAfter||0)).toLocaleString('en-US')}">
        </div>
      </div>
      ${convInfo?`<div class="item-calc">🔄 ${convInfo}</div>`:''}
    </div>`;
  }).join('');
}

function onItemSKUChange(i, skuId){
  const sku = SKU_ITEMS.find(s=>s.id===skuId)||{};
  const units = SKU_UNITS.filter(u=>u.sku_id===skuId);
  const firstUnit = units[0]||{};
  draftItems[i] = {...draftItems[i], skuId, skuName:sku.name||'', baseUnit:sku.base_unit||'',
    skuUnit:firstUnit.unit_name||sku.base_unit||'', toBase:firstUnit.to_base||1};
  renderDraftItems(); updateSummary();
}
function onItemUnitChange(i, unit, rate, base){
  draftItems[i].skuUnit = unit;
  draftItems[i].toBase  = parseFloat(rate)||1;
  renderDraftItems(); updateSummary();
}
function onItemQty(i,v){ draftItems[i].qty=parseFloat(v)||0; updateSummary(); }
function onItemAmtBefore(i,v){ draftItems[i].amtBefore=parseInt(v)||0; draftItems[i].discount=(draftItems[i].amtBefore||0)-(draftItems[i].amtAfter||0); renderDraftItems(); updateSummary(); }
function onItemAmtAfter(i,v){ draftItems[i].amtAfter=parseInt(v)||0; draftItems[i].discount=(draftItems[i].amtBefore||0)-(draftItems[i].amtAfter||0); renderDraftItems(); updateSummary(); }

// ── ADJUSTMENTS ──
function addDraftAdj(){ draftAdjs.push({label:'',type:'discount',amount:0}); renderDraftAdjs(); updateSummary(); }
function removeDraftAdj(i){ draftAdjs.splice(i,1); renderDraftAdjs(); updateSummary(); }
function renderDraftAdjs(){
  const el = document.getElementById('dAdjList');
  if(!el) return;
  el.innerHTML = draftAdjs.map((adj,i)=>`
    <div class="adj-row">
      <input class="adj-label" type="text" placeholder="Tên chiết khấu/phụ phí..." value="${adj.label}" oninput="draftAdjs[${i}].label=this.value">
      <select onchange="draftAdjs[${i}].type=this.value;updateSummary()">
        <option value="discount" ${adj.type==='discount'?'selected':''}>Giảm giá</option>
        <option value="fee"      ${adj.type==='fee'?'selected':''}>Phụ phí</option>
        <option value="other"    ${adj.type==='other'?'selected':''}>Khác</option>
      </select>
      <input class="adj-amount" type="number" placeholder="0" value="${adj.amount||''}" oninput="draftAdjs[${i}].amount=parseInt(this.value)||0;updateSummary()">
      <button class="adj-del" onclick="removeDraftAdj(${i})">×</button>
    </div>`).join('')||'<div style="font-size:12px;color:#bbb;padding:4px 0">Không có điều chỉnh. Nhấn "+ Thêm" để thêm chiết khấu hoặc phụ phí.</div>';
}

function calcSummary(){
  const itemsTotal = draftItems.reduce((s,i)=>s+(i.amtAfter||0),0);
  const shipping   = parseInt(document.getElementById('dShipping')?.value)||0;
  const adjTotal   = draftAdjs.reduce((s,a)=>{
    return s + (a.type==='discount' ? -(a.amount||0) : (a.amount||0));
  },0);
  const grandTotal = itemsTotal + shipping + adjTotal;
  return {itemsTotal, shipping, adjTotal, grandTotal};
}

function updateSummary(){
  const el = document.getElementById('dSummary');
  if(!el) return;
  const {itemsTotal,shipping,adjTotal,grandTotal} = calcSummary();
  el.innerHTML = `
    <div class="sum-row"><span class="sum-label">Tổng tiền hàng (sau CK dòng)</span><span class="sum-value">${fmt(itemsTotal)}</span></div>
    <div class="sum-row"><span class="sum-label">Phí vận chuyển</span><span class="sum-value">${fmt(shipping)}</span></div>
    ${draftAdjs.map(a=>`<div class="sum-row"><span class="sum-label">${a.label||'Điều chỉnh'}</span><span class="sum-value${a.type==='discount'?' green':' red'}">${a.type==='discount'?'-':'+'} ${fmt(Math.abs(a.amount))}</span></div>`).join('')}
    <div class="sum-row total"><span>Tổng tiền phải trả</span><span class="sum-value">${fmt(grandTotal)}</span></div>`;
}

async function savePO(){
  const validItems = draftItems.filter(i=>i.skuId&&i.qty>0);
  if(!validItems.length){ toast('Vui lòng thêm ít nhất 1 mặt hàng hợp lệ'); return; }
  const supplierId = document.getElementById('dSupplier').value||null;
  const platform   = document.getElementById('dPlatform').value||null;
  const platformId = document.getElementById('dPlatformId').value.trim()||null;
  const debtDue    = document.getElementById('dDebtDue').value||null;
  const shipping   = parseInt(document.getElementById('dShipping').value)||0;
  const note       = document.getElementById('dNote').value.trim()||null;
  const {grandTotal} = calcSummary();
  const poNum = 'NH' + Date.now().toString().slice(-8);
  try {
    const poRes = await DB.insert('purchase_orders',{
      po_num:poNum, supplier_id:supplierId||null, platform, platform_order_id:platformId,
      debt_due_date:debtDue, shipping_fee:shipping, note, total_amount:grandTotal,
      status:'pending', staff_name:session?.name||'',
    });
    const poId = poRes[0].id;
    // Insert items
    for(const item of validItems){
      const sku = SKU_ITEMS.find(s=>s.id===item.skuId);
      const baseQty = item.qty * item.toBase;
      await DB.insert('purchase_order_items',{
        po_id:poId, sku_id:item.skuId, item_type:sku?.type||'raw',
        item_id:sku?.map_to_id||'', item_name:sku?.name||'',
        input_qty:item.qty, input_unit:item.skuUnit, sku_unit:item.skuUnit,
        conversion_rate:item.toBase, to_base_rate:item.toBase,
        base_qty:baseQty, base_unit:item.baseUnit||sku?.base_unit||'',
        unit_price:item.qty>0?Math.round(item.amtAfter/item.qty):0,
        total_price:item.amtAfter,
        amount_before_discount:item.amtBefore,
        discount_amount:item.discount||0,
        amount_after_discount:item.amtAfter,
      },false);
    }
    // Insert adjustments
    for(const adj of draftAdjs.filter(a=>a.label&&a.amount)){
      await DB.insert('po_adjustments',{
        po_id:poId, label:adj.label, type:adj.type,
        amount: adj.type==='discount' ? -adj.amount : adj.amount,
      },false);
    }
    hidePOOverlay();
    toast(`✓ Đã tạo đơn ${poNum}`);
    await loadPOs();
  } catch(e){ toast('Lỗi: '+e.message); }
}

// ── XEM ĐƠN ──
async function showViewPO(poId){
  viewingPOId = poId;
  document.getElementById('poSheet').innerHTML = '<div style="padding:24px;text-align:center;color:#888;font-size:13px">Đang tải...</div>';
  document.getElementById('poOverlay').classList.add('show');
  try {
    const [pos, items, adjs, payments] = await Promise.all([
      DB.select('purchase_orders',`id=eq.${poId}&select=*,suppliers(name)`),
      DB.select('purchase_order_items',`po_id=eq.${poId}&select=*`),
      DB.select('po_adjustments',`po_id=eq.${poId}&select=*`),
      DB.select('po_payments',`po_id=eq.${poId}&select=*&order=paid_at.asc`),
    ]);
    const po = pos[0];
    const totalPaid = payments.reduce((s,p)=>s+p.amount,0);
    const debt = (po.total_amount||0) - totalPaid;
    const statusLabel = {pending:'Đang giao',received:'Đã nhận hàng',completed:'Hoàn tất'}[po.status]||po.status;
    const methodLabel = {cash:'Tiền mặt',transfer:'Chuyển khoản',cod:'COD',other:'Khác'};

    document.getElementById('poSheet').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="sheet-title">${po.po_num}</div>
          <div style="font-size:12px;color:#888;margin-top:4px">${po.suppliers?.name||'—'}</div>
          ${po.platform_order_id?`<div style="font-size:12px;color:#378ADD;margin-top:2px">📦 ${po.platform||'Sàn'}: ${po.platform_order_id}</div>`:''}
        </div>
        <span class="po-status-badge badge-${po.status}" style="font-size:12px;padding:4px 10px">${statusLabel}</span>
      </div>

      ${po.debt_due_date?`<div class="warn-box">⏰ Hạn công nợ: ${fmtDate(new Date(po.debt_due_date))}${new Date(po.debt_due_date)<new Date()?' — Đã quá hạn!':''}</div>`:''}

      <!-- ITEMS -->
      <div class="section-title">Danh sách mặt hàng</div>
      <div style="background:#f5f5f0;border-radius:12px;overflow:hidden">
        ${items.map(item=>`<div style="padding:10px 12px;border-bottom:0.5px solid #e8e6e0;display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:13px;font-weight:500">${item.item_name}</div>
            <div style="font-size:12px;color:#888;margin-top:2px">${fmtN(item.input_qty)} ${item.sku_unit||item.input_unit} = ${fmtN(item.base_qty)} ${item.base_unit}</div>
            ${item.discount_amount>0?`<div style="font-size:11px;color:#1D9E75">CK: -${fmt(item.discount_amount)}</div>`:''}
          </div>
          <div style="text-align:right">
            ${item.amount_before_discount>0&&item.amount_before_discount!==item.amount_after_discount?`<div style="font-size:11px;color:#bbb;text-decoration:line-through">${fmt(item.amount_before_discount)}</div>`:''}
            <div style="font-size:13px;font-weight:600">${fmt(item.amount_after_discount||item.total_price)}</div>
          </div>
        </div>`).join('')}
      </div>

      <!-- ADJUSTMENTS -->
      ${adjs.length?`<div class="section-title">Chiết khấu & Phụ phí</div>
      <div style="background:#f5f5f0;border-radius:12px;overflow:hidden">
        ${adjs.map(a=>`<div style="padding:8px 12px;display:flex;justify-content:space-between;border-bottom:0.5px solid #e8e6e0">
          <span style="font-size:13px">${a.label}</span>
          <span style="font-size:13px;font-weight:500;color:${a.amount<0?'#1D9E75':'#E24B4A'}">${a.amount<0?'-':'+'} ${fmt(Math.abs(a.amount))}</span>
        </div>`).join('')}
      </div>`:''}

      <!-- TỔNG TIỀN -->
      <div class="summary-box">
        <div class="sum-row"><span class="sum-label">Tổng hàng</span><span class="sum-value">${fmt(items.reduce((s,i)=>s+(i.amount_after_discount||i.total_price),0))}</span></div>
        ${po.shipping_fee>0?`<div class="sum-row"><span class="sum-label">Phí ship</span><span class="sum-value">${fmt(po.shipping_fee)}</span></div>`:''}
        <div class="sum-row total"><span>Tổng phải trả</span><span class="sum-value">${fmt(po.total_amount)}</span></div>
        <div class="sum-row"><span class="sum-label">Đã thanh toán</span><span class="sum-value green">${fmt(totalPaid)}</span></div>
        ${debt>0?`<div class="sum-row debt"><span class="sum-label">Còn nợ</span><span class="sum-value red">${fmt(debt)}</span></div>`:''}
      </div>

      <!-- LỊCH SỬ THANH TOÁN -->
      ${payments.length?`<div class="section-title">Lịch sử thanh toán</div>
      <div style="background:#f5f5f0;border-radius:12px;overflow:hidden">
        ${payments.map(p=>`<div class="payment-row" style="padding:10px 12px">
          <div class="payment-info">
            <div class="payment-amount">${fmt(p.amount)}</div>
            <div class="payment-detail">${methodLabel[p.method]||p.method} · ${fmtDate(new Date(p.paid_at))}${p.note?' · '+p.note:''}</div>
          </div>
        </div>`).join('')}
      </div>`:''}

      <!-- ACTIONS theo trạng thái -->
      <div class="section-title">Thao tác</div>
      ${po.status==='pending'?`
        <button class="sheet-btn blue" onclick="updatePOStatus('${po.id}','received')">✓ Xác nhận đã nhận hàng</button>
        <button class="sheet-btn primary" onclick="showAddPayment('${po.id}','${po.total_amount}')">💳 Ghi nhận thanh toán</button>
      `:''}
      ${po.status==='received'?`
        <button class="sheet-btn primary" onclick="showAddPayment('${po.id}','${debt}')">💳 Ghi nhận thanh toán</button>
        ${debt<=0?`<button class="sheet-btn blue" onclick="updatePOStatus('${po.id}','completed')">✓ Hoàn tất đơn hàng</button>`:''}
      `:''}
      ${po.status==='completed'?`<div class="info-box">✓ Đơn hàng đã hoàn tất — nhận đủ hàng & thanh toán đầy đủ</div>`:''}
      <button class="sheet-btn secondary" onclick="hidePOOverlay()">Đóng</button>
    `;
  } catch(e){ document.getElementById('poSheet').innerHTML=`<div style="padding:24px;text-align:center;color:#E24B4A;font-size:13px">Lỗi: ${e.message}</div>`; }
}

async function updatePOStatus(poId, status){
  try {
    const update = {status};
    if(status==='received'){
      update.received_at = new Date().toISOString();
      // Cập nhật tồn kho khi nhận hàng
      await receiveInventory(poId);
    }
    if(status==='completed') update.completed_at = new Date().toISOString();
    await DB.update('purchase_orders',`id=eq.${poId}`,update);
    toast(status==='received'?'✓ Đã xác nhận nhận hàng — tồn kho đã cập nhật':'✓ Đơn hàng hoàn tất');
    await loadPOs();
    showViewPO(poId);
  } catch(e){ toast('Lỗi: '+e.message); }
}

async function receiveInventory(poId){
  const items = await DB.select('purchase_order_items',`po_id=eq.${poId}&select=*`);
  for(const item of items){
    if(item.item_type==='raw'){
      const stocks = await DB.select('raw_stock',`id=eq.${item.item_id}&select=*`);
      const cur = stocks&&stocks.length?stocks[0]:{quantity:0,avg_cost:0,total_qty_imported:0};
      const oldQty = parseFloat(cur.quantity)||0;
      const oldAvg = parseFloat(cur.avg_cost)||0;
      const addQty = parseFloat(item.base_qty)||0;
      const unitCost = addQty>0?(item.amount_after_discount||item.total_price)/addQty:0;
      const newQty = oldQty + addQty;
      const newAvg = newQty>0?(oldAvg*oldQty+unitCost*addQty)/newQty:0;
      await DB.upsert('raw_stock',{
        id:item.item_id, quantity:newQty, avg_cost:newAvg,
        total_qty_imported:(parseFloat(cur.total_qty_imported)||0)+addQty,
        updated_at:new Date().toISOString(),
      });
    } else {
      const stocks = await DB.select('supplies',`id=eq.${item.item_id}&select=quantity`);
      const cur = stocks&&stocks.length?stocks[0]:{quantity:0};
      const addQty = parseFloat(item.base_qty)||0;
      const unitCost = addQty>0?(parseFloat(item.amount_after_discount)||parseFloat(item.total_price)||0)/addQty:0;
      await DB.update('supplies',`id=eq.${item.item_id}`,{
        quantity:(parseFloat(cur.quantity)||0)+addQty,
        updated_at:new Date().toISOString(),
      });
      if(addQty>0){
        await DB.insert('supply_batches',{
          supply_id: item.item_id,
          po_id: poId,
          initial_qty: addQty,
          remaining_qty: addQty,
          purchase_date: new Date().toISOString().split('T')[0],
          unit_cost: unitCost,
        },false);
      }
    }
  }
}

// ── THANH TOÁN ──
function showAddPayment(poId, remaining){
  payingPOId = poId;
  document.getElementById('payAmount').value = remaining>0?remaining:'';
  document.getElementById('payMethod').value = 'transfer';
  document.getElementById('payNote').value = '';
  document.getElementById('payOverlay').classList.add('show');
}
function hidePayOverlay(){ document.getElementById('payOverlay').classList.remove('show'); }

async function savePayment(){
  const amount = parseInt(document.getElementById('payAmount').value)||0;
  const method = document.getElementById('payMethod').value;
  const note   = document.getElementById('payNote').value.trim();
  if(!amount||amount<=0){ toast('Vui lòng nhập số tiền hợp lệ'); return; }
  try {
    await DB.insert('po_payments',{
      po_id:payingPOId, amount, method, note:note||null,
      paid_at:new Date().toISOString(), staff_name:session?.name||'',
    },false);
    hidePayOverlay();
    toast(`✓ Đã ghi nhận ${fmt(amount)}`);
    await loadPOs();
    showViewPO(payingPOId);
  } catch(e){ toast('Lỗi: '+e.message); }
}

function hidePOOverlay(){ document.getElementById('poOverlay').classList.remove('show'); }

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2500);
}

init();
</script>
