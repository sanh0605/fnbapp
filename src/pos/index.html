<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Bán hàng</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
    .status-bar{background:#fff;padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .status-left{display:flex;align-items:center;gap:8px}
    .status-title{font-size:13px;font-weight:600;color:#1a1a18}
    .user-name{font-size:12px;color:#888;background:#f5f5f0;padding:3px 8px;border-radius:20px}
    .status-right{display:flex;align-items:center;gap:8px}
    .net-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;transition:background .4s}
    .net-dot.offline{background:#E24B4A}
    .order-badge{font-size:12px;font-weight:500;color:#888;background:#f5f5f0;padding:3px 8px;border-radius:20px}
    .icon-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;text-decoration:none;flex-shrink:0}
    .icon-btn:active{background:#e8e6e0}
    .icon-btn.danger:active{background:#FCEBEB;color:#A32D2D}
    .cat-bar{background:#fff;padding:10px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .cat-bar::-webkit-scrollbar{display:none}
    .cat-pill{padding:6px 16px;border-radius:20px;border:0.5px solid #d8d6d0;background:transparent;color:#888;font-size:13px;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:inherit}
    .cat-pill.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .menu-list{flex:1;overflow-y:auto;padding:10px 14px 90px;display:flex;flex-direction:column;gap:7px}
    .menu-row{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:11px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .12s;user-select:none}
    .menu-row:active{background:#f5f5f0}
    .menu-row.out{opacity:.4;pointer-events:none}
    .micon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .minfo{flex:1;min-width:0}
    .mname{font-size:14px;font-weight:500;color:#1a1a18}
    .mprice{font-size:13px;color:#888;margin-top:2px}
    .add-btn{width:36px;height:36px;border-radius:50%;background:#E1F5EE;border:none;color:#0F6E56;font-size:24px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .add-btn:active{background:#9FE1CB}
    .qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .qb{width:30px;height:30px;border-radius:50%;border:0.5px solid #d8d6d0;background:#f5f5f0;color:#1a1a18;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .qb:active{background:#e8e6e0}
    .qn{font-size:14px;font-weight:500;min-width:18px;text-align:center}

    /* BOTTOM CART */
    .bottom-cart{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;border-top:0.5px solid #d8d6d0;transition:height .32s cubic-bezier(.4,0,.2,1);height:74px;overflow:hidden;display:flex;flex-direction:column;z-index:100}
    .bottom-cart.expanded{height:min(600px,80dvh)}
    .handle{width:36px;height:4px;background:#d8d6d0;border-radius:2px;position:absolute;top:10px;left:50%;transform:translateX(-50%)}
    .cart-collapsed{padding:0 16px;height:74px;flex-shrink:0;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
    .cart-summary{flex:1}
    .cart-lbl{font-size:11px;color:#888}
    .cart-total-big{font-size:20px;font-weight:600;color:#1a1a18;display:flex;align-items:center;gap:8px}
    .count-badge{background:#E24B4A;color:#fff;font-size:11px;font-weight:600;border-radius:10px;padding:1px 7px}
    .cart-toggle-btn{background:#1D9E75;color:#fff;border:none;border-radius:16px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;min-width:44px;min-height:44px}
    .cart-toggle-btn:disabled{background:#d8d6d0;cursor:default}
    .cart-toggle-btn.icon-only{padding:0;border-radius:50%;width:44px;height:44px}
    .cart-detail{flex:1;overflow-y:auto;padding:4px 16px 0}
    .cart-header-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;border-bottom:0.5px solid #e8e6e0}
    .cart-title{font-size:15px;font-weight:600}
    .clear-btn{font-size:12px;color:#888;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px}
    .ci{border-bottom:0.5px solid #e8e6e0;padding:10px 0}
    .ci-top{display:flex;align-items:center;gap:8px}
    .ci-name{flex:1;font-size:14px;font-weight:500}
    .ci-price{font-size:13px;color:#888;min-width:70px;text-align:right}
    .ci-note{width:100%;border:0.5px solid #e8e6e0;border-radius:8px;padding:6px 10px;font-size:12px;background:#f5f5f0;font-family:inherit;margin-top:8px}
    .ci-note:focus{outline:none;border-color:#1D9E75}
    .ci-note::placeholder{color:#bbb}

    /* BAG INDICATOR */
    .bag-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #e8e6e0}
    .bag-label{font-size:12px;color:#888;flex:1}
    .bag-value{font-size:12px;font-weight:500;color:#1a1a18;background:#f5f5f0;padding:3px 10px;border-radius:20px}

    .cart-footer{padding:12px 16px 28px;border-top:0.5px solid #e8e6e0;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
    .total-row{display:flex;justify-content:space-between;font-size:16px;font-weight:600}
    .pay-method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .pay-method-btn{padding:11px;border-radius:12px;border:0.5px solid #d8d6d0;background:#f5f5f0;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center}
    .pay-method-btn.selected{background:#E1F5EE;border-color:#1D9E75;color:#085041}
    .qr-section{display:none;flex-direction:column;align-items:center;gap:8px;background:#f5f5f0;border-radius:12px;padding:14px}
    .qr-section.show{display:flex}
    .qr-section img{width:180px;height:180px;border-radius:8px;background:#fff}
    .qr-amount{font-size:18px;font-weight:700;color:#1D9E75}
    .qr-hint{font-size:11px;color:#bbb;text-align:center}
    .confirm-btn{padding:14px;border-radius:12px;border:none;background:#d8d6d0;font-size:15px;font-weight:600;cursor:default;color:#fff;font-family:inherit;width:100%}
    .confirm-btn.active{background:#1D9E75;cursor:pointer}
    .confirm-btn.active:active{background:#0F6E56}

    /* TỒNG KHO BOTTOM SHEET */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px;max-height:75dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600}
    .stock-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid #e8e6e0}
    .stock-row:last-child{border-bottom:none}
    .stock-icon{font-size:20px;flex-shrink:0}
    .stock-name{flex:1;font-size:13px;font-weight:500}
    .stock-qty{font-size:13px;font-weight:600}
    .stock-qty.ok{color:#1D9E75}
    .stock-qty.warn{color:#BA7517}
    .stock-qty.danger{color:#E24B4A}
    .sheet-close{padding:12px;border-radius:12px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center}

    .cart-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0;gap:8px;color:#bbb;font-size:13px}
    .loading{display:flex;align-items:center;justify-content:center;flex:1;color:#888;font-size:13px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:500}
  </style>
</head>
<body>

<div class="status-bar">
  <div class="status-left">
    <span class="status-title">Bán hàng</span>
    <span class="user-name" id="userName"></span>
  </div>
  <div class="status-right">
    <div class="net-dot" id="netDot"></div>
    <span class="order-badge" id="orderBadge">#001</span>
    <!-- Nút kiểm tra tồn kho (tất cả roles) -->
    <button class="icon-btn" onclick="showStockSheet()" title="Kiểm tra tồn kho">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    </button>
    <!-- Nút Home chỉ hiện với manager/owner -->
    <a href="../home/index.html" class="icon-btn" id="homeBtn" style="display:none" title="Về trang chủ">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <!-- Nút đăng xuất -->
    <button class="icon-btn danger" onclick="showLogout()" title="Đăng xuất">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<div class="cat-bar" id="catBar"></div>
<div class="menu-list" id="menuList"><div class="loading">Đang tải menu...</div></div>

<div class="bottom-cart" id="bottomCart">
  <div class="handle"></div>
  <div class="cart-collapsed" onclick="toggleCart()">
    <div class="cart-summary">
      <div class="cart-lbl">Đơn <span id="orderNum">#001</span></div>
      <div class="cart-total-big">
        <span id="cartTotal">0 ₫</span>
        <span class="count-badge" id="countBadge" style="display:none">0</span>
      </div>
    </div>
    <button class="cart-toggle-btn" id="cartToggleBtn" disabled onclick="event.stopPropagation();toggleCart()">
      <span id="cartBtnContent">Xem giỏ hàng</span>
    </button>
  </div>
  <div class="cart-detail">
    <div class="cart-header-row">
      <span class="cart-title">Giỏ hàng</span>
      <button class="clear-btn" onclick="clearAll()">Xoá tất cả</button>
    </div>
    <div id="cartItems"></div>
    <div id="bagRow"></div>
  </div>
  <div class="cart-footer">
    <div class="total-row"><span>Tổng cộng</span><span id="footerTotal">0 ₫</span></div>
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:6px">Hình thức thanh toán</div>
      <div class="pay-method-grid">
        <button class="pay-method-btn" id="btnCash" onclick="selectMethod('cash')">Tiền mặt</button>
        <button class="pay-method-btn" id="btnTransfer" onclick="selectMethod('transfer')">Chuyển khoản</button>
      </div>
    </div>
    <div class="qr-section" id="qrSection">
      <img id="qrImg" src="" alt="QR">
      <div class="qr-amount" id="qrAmount"></div>
      <div class="qr-hint">Khách quét QR — số tiền tự động điền</div>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmPay()">Xác nhận thanh toán</button>
  </div>
</div>

<!-- Kiểm tra tồn kho -->
<div class="overlay" id="stockOverlay" onclick="hideStockSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Tồn kho tại điểm bán</div>
    <div id="stockList"><div class="loading">Đang tải...</div></div>
    <button class="sheet-close" onclick="hideStockSheet()">Đóng</button>
  </div>
</div>

<!-- Đăng xuất -->
<div class="overlay" id="logoutOverlay" onclick="hideLogout()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" style="text-align:center">Đăng xuất?</div>
    <div style="font-size:13px;color:#888;text-align:center" id="logoutSub"></div>
    <button style="padding:14px;border-radius:12px;border:none;background:#FCEBEB;color:#A32D2D;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit" onclick="Auth.logout()">Đăng xuất</button>
    <button style="padding:14px;border-radius:12px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit" onclick="hideLogout()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../auth/auth.js"></script>
<script>
  Auth.require('pos');
  const session = Auth.getSession();
  const role    = Auth.getRole();

  // Hiện nút Home cho manager/owner
  if(role === 'manager' || role === 'owner'){
    document.getElementById('homeBtn').style.display = 'flex';
  }
  if(session) document.getElementById('userName').textContent = session.name;

  // Network
  const netDot = document.getElementById('netDot');
  function updateNet(){ netDot.className = 'net-dot' + (navigator.onLine ? '' : ' offline'); }
  window.addEventListener('online', updateNet); window.addEventListener('offline', updateNet); updateNet();

  const fmt = n => n.toLocaleString('vi-VN') + ' ₫';

  // ── STATE ──
  let MENU = [], SETTINGS = {}, activeCat = 'Tất cả';
  let cart = {}, notes = {}, orderN = 1, expanded = false, payMethod = null;
  let supplyCounts = { tui_don: 0, tui_doi: 0, muong: 0 }; // user-editable

  const getTotal = () => Object.keys(cart).reduce((s,k) => s + (MENU.find(m=>m.id===k)?.price||0) * cart[k], 0);
  const getTotalQty = () => Object.keys(cart).reduce((s,k) => s + cart[k], 0);

  function changeSupplyCount(id, delta){
    supplyCounts[id] = Math.max(0, (supplyCounts[id]||0) + delta);
    renderCartItems();
  }

  // ── LOAD DATA ──
  async function init(){
    try {
      const [products, settings] = await Promise.all([
        DB.select('products', 'active=eq.true&select=*&order=sort_order.asc'),
        DB.select('settings', 'select=*'),
      ]);
      MENU = products;
      settings.forEach(s => SETTINGS[s.key] = s.value);
      renderCats(); renderMenu();
    } catch(e){
      document.getElementById('menuList').innerHTML = `<div class="loading">Lỗi tải menu: ${e.message}</div>`;
    }
  }

  // ── RENDER ──
  function getCats(){ return ['Tất cả', ...new Set(MENU.map(m=>m.category))]; }

  function renderCats(){
    const cats = getCats();
    document.getElementById('catBar').innerHTML = cats.map(c =>
      `<button class="cat-pill${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`
    ).join('');
  }
  function setCat(c){ activeCat=c; renderCats(); renderMenu(); }

  function renderMenu(){
    const items = activeCat==='Tất cả' ? MENU : MENU.filter(m=>m.category===activeCat);
    if(!items.length){ document.getElementById('menuList').innerHTML='<div class="loading">Không có sản phẩm</div>'; return; }
    document.getElementById('menuList').innerHTML = items.map(item => {
      const qty = cart[item.id] || 0;
      const out = item.active === false;
      return `<div class="menu-row${out?' out':''}">
        <div class="micon" style="background:${item.color||'#f5f5f0'}">${item.icon||'☕'}</div>
        <div class="minfo">
          <div class="mname">${item.name}</div>
          <div class="mprice">${fmt(item.price)}</div>
        </div>
        ${out ? '' : qty === 0
          ? `<button class="add-btn" onclick="add('${item.id}')">+</button>`
          : `<div class="qty-ctrl">
               <button class="qb" onclick="chg('${item.id}',-1)">−</button>
               <span class="qn">${qty}</span>
               <button class="qb" onclick="chg('${item.id}',1)">+</button>
             </div>`}
      </div>`;
    }).join('');
  }

  function add(id){ cart[id]=(cart[id]||0)+1; if(!notes[id])notes[id]=''; payMethod=null; update(); toast('+1 '+MENU.find(m=>m.id===id)?.name); }
  function chg(id,d){ cart[id]=(cart[id]||0)+d; if(cart[id]<=0){delete cart[id];delete notes[id];} payMethod=null; update(); }
  function clearAll(){ cart={}; notes={}; payMethod=null; supplyCounts={tui_don:0,tui_doi:0,muong:0}; update(); if(expanded)toggleCart(); }
  function update(){ renderMenu(); renderCartItems(); updateCartBar(); updatePaymentUI(); }

  function updateCartBar(){
    const count = getTotalQty(), total = getTotal();
    document.getElementById('cartTotal').textContent = fmt(total);
    document.getElementById('footerTotal').textContent = fmt(total);
    const badge = document.getElementById('countBadge');
    badge.textContent = count; badge.style.display = count>0?'inline':'none';
    const btn = document.getElementById('cartToggleBtn');
    btn.disabled = count === 0;
    const content = document.getElementById('cartBtnContent');
    if(expanded){
      btn.classList.add('icon-only');
      content.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`;
    } else {
      btn.classList.remove('icon-only');
      content.textContent = 'Xem giỏ hàng';
    }
  }

  function renderCartItems(){
    const keys = Object.keys(cart);
    if(!keys.length){
      document.getElementById('cartItems').innerHTML = `<div class="cart-empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Chưa có món nào</div>`;
      document.getElementById('bagRow').innerHTML = '';
      return;
    }
    document.getElementById('cartItems').innerHTML = keys.map(id => {
      const item = MENU.find(m=>m.id===id);
      if(!item) return '';
      return `<div class="ci">
        <div class="ci-top">
          <span class="ci-name">${item.name}</span>
          <div class="qty-ctrl">
            <button class="qb" onclick="chg('${id}',-1)">−</button>
            <span class="qn">${cart[id]}</span>
            <button class="qb" onclick="chg('${id}',1)">+</button>
          </div>
          <span class="ci-price">${fmt(item.price*cart[id])}</span>
        </div>
        <input class="ci-note" placeholder="Ghi chú: ít đường, không đá..."
          value="${notes[id]||''}" oninput="notes['${id}']=this.value" onclick="event.stopPropagation()">
      </div>`;
    }).join('');

    // Hiện 3 dòng vật tư chọn tay
    const supplyRows = [
      { id:'tui_don', icon:'🛍️', label:'Túi chữ T' },
      { id:'tui_doi', icon:'🛍️', label:'Túi đôi'   },
      { id:'muong',   icon:'🥄', label:'Muỗng'      },
    ];
    document.getElementById('bagRow').innerHTML = Object.keys(cart).length
      ? supplyRows.map(s=>`
          <div class="bag-row">
            <span class="bag-label">${s.icon} ${s.label}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <button class="qb" style="width:26px;height:26px;font-size:16px" onclick="changeSupplyCount('${s.id}',-1)">−</button>
              <span style="font-size:13px;font-weight:600;min-width:18px;text-align:center">${supplyCounts[s.id]||0}</span>
              <button class="qb" style="width:26px;height:26px;font-size:16px" onclick="changeSupplyCount('${s.id}',1)">+</button>
            </div>
          </div>`).join('')
      : '';
  }

  function selectMethod(m){ payMethod=m; updatePaymentUI(); }

  function updatePaymentUI(){
    const total = getTotal(), hasItems = Object.keys(cart).length > 0;
    document.getElementById('btnCash').classList.toggle('selected', payMethod==='cash');
    document.getElementById('btnTransfer').classList.toggle('selected', payMethod==='transfer');
    const qr = document.getElementById('qrSection');
    if(payMethod==='transfer' && hasItems){ qr.classList.add('show'); updateQR(total); }
    else qr.classList.remove('show');
    document.getElementById('confirmBtn').classList.toggle('active', payMethod!==null && hasItems);
  }

  function updateQR(amount){
    const bankId      = SETTINGS.bank_id      || 'ACB';
    const accountNo   = SETTINGS.account_no   || 'XXXXXXXXXX';
    const accountName = SETTINGS.account_name || '';
    const content     = SETTINGS.transfer_content || 'Thanh toan don hang';
    const url = `https://img.vietqr.io/image/${bankId}-${accountNo}-compact2.jpg?amount=${amount}&addInfo=${encodeURIComponent(content)}&accountName=${encodeURIComponent(accountName)}`;
    document.getElementById('qrImg').src = url;
    document.getElementById('qrAmount').textContent = fmt(amount);
  }

  function toggleCart(){
    if(Object.keys(cart).length===0 && !expanded) return;
    expanded = !expanded;
    document.getElementById('bottomCart').classList.toggle('expanded', expanded);
    if(!expanded){ payMethod=null; updatePaymentUI(); }
    updateCartBar();
  }

  async function confirmPay(){
    if(!document.getElementById('confirmBtn').classList.contains('active')) return;
    const total = getTotal();
    const methodName = payMethod==='cash' ? 'Tiền mặt' : 'Chuyển khoản';
    const orderNum = '#' + String(orderN).padStart(3,'0');
    const bag = { ...supplyCounts }; // {tui_don, tui_doi, muong}

    const items = Object.keys(cart).map(id => {
      const item = MENU.find(m=>m.id===id);
      return { id, name:item?.name||'', qty:cart[id], price:item?.price||0 };
    });

    // Lưu đơn lên Supabase
    try {
      await DB.insert('orders', {
        order_num:  orderNum,
        total,
        method:     methodName,
        items,
        staff_name: session?.name || '',
      }, false);
    } catch(e){ console.warn('Lỗi lưu đơn:', e); }

    // Trừ vật tư tiêu hao (ly, nắp, ống hút, túi)
    deductSupplies(items, bag);

    toast(`✓ ${methodName} — ${fmt(total)}`);
    cart={}; notes={}; payMethod=null; supplyCounts={tui_don:0,tui_doi:0,muong:0};
    orderN++;
    const num = '#' + String(orderN).padStart(3,'0');
    document.getElementById('orderNum').textContent = num;
    document.getElementById('orderBadge').textContent = num;
    expanded = false;
    document.getElementById('bottomCart').classList.remove('expanded');
    update();
  }

  async function deductSupplies(items, bag){
    try {
      // Lấy product_recipes để biết vật tư từng món
      const productIds = items.map(i => i.id).join(',');
      const recipes = await DB.select('product_recipes',
        `product_id=in.(${productIds})&ingredient_type=eq.supply&select=*`
      );

      // Vật tư không auto-trừ (thêm tay)
      const MANUAL_SUPPLIES = new Set(['muong']);

      // Tính tổng vật tư cần trừ
      const deductions = {};
      items.forEach(orderItem => {
        const itemRecipes = recipes.filter(r => r.product_id === orderItem.id);
        itemRecipes.forEach(r => {
          if(MANUAL_SUPPLIES.has(r.ingredient_id)) return; // bỏ qua muỗng
          deductions[r.ingredient_id] = (deductions[r.ingredient_id]||0) + r.amount * orderItem.qty;
        });
      });

      // Cộng vật tư chọn tay (túi, muỗng)
      for(const [id, cnt] of Object.entries(bag||{})){
        if(cnt > 0) deductions[id] = (deductions[id]||0) + cnt;
      }

      // Trừ FIFO từ supply_batches → cập nhật supplies.quantity
      for(const [supplyId, totalQty] of Object.entries(deductions)){
        let remaining = totalQty;

        // Lấy các lô còn hàng, cũ nhất trước (FIFO)
        const batches = await DB.select('supply_batches',
          `supply_id=eq.${supplyId}&remaining_qty=gt.0&order=purchase_date.asc,created_at.asc&select=*`
        );

        if(batches && batches.length){
          for(const batch of batches){
            if(remaining <= 0) break;
            const have = parseFloat(batch.remaining_qty)||0;
            const take = Math.min(have, remaining);
            await DB.update('supply_batches', `id=eq.${batch.id}`, {
              remaining_qty: have - take,
            });
            remaining -= take;
          }
          // Tính lại tổng tồn từ tất cả các lô
          const allBatches = await DB.select('supply_batches',`supply_id=eq.${supplyId}&select=remaining_qty`);
          const totalRemaining = (allBatches||[]).reduce((s,b)=>s+(parseFloat(b.remaining_qty)||0),0);
          await DB.update('supplies', `id=eq.${supplyId}`, {
            quantity: Math.max(0, totalRemaining),
            updated_at: new Date().toISOString(),
          });
        } else {
          // Fallback: không có lô → trừ thẳng vào supplies.quantity
          const cur = await DB.select('supplies',`id=eq.${supplyId}&select=quantity`);
          const curQty = cur&&cur.length?parseFloat(cur[0].quantity)||0:0;
          await DB.update('supplies', `id=eq.${supplyId}`, {
            quantity: Math.max(0, curQty - totalQty),
            updated_at: new Date().toISOString(),
          });
        }
      }

      // Trừ bán thành phẩm
      const semiRecipes = await DB.select('product_recipes',
        `product_id=in.(${productIds})&ingredient_type=eq.semi&select=*`
      );
      const semiDeductions = {};
      items.forEach(orderItem => {
        const itemRecipes = semiRecipes.filter(r => r.product_id === orderItem.id);
        itemRecipes.forEach(r => {
          semiDeductions[r.ingredient_id] = (semiDeductions[r.ingredient_id]||0) + r.amount * orderItem.qty;
        });
      });
      const semiStocks = await DB.select('semi_stock', 'select=id,quantity');
      const semiMap = {};
      semiStocks.forEach(s => semiMap[s.id] = parseFloat(s.quantity)||0);
      for(const [id, qty] of Object.entries(semiDeductions)){
        if(semiMap[id] != null){
          const newQty = Math.max(0, semiMap[id] - qty);
          await DB.update('semi_stock', `id=eq.${id}`, { quantity: newQty, updated_at: new Date().toISOString() });
        }
      }
    } catch(e){ console.warn('Lỗi trừ vật tư:', e); }
  }

  // ── KIỂM TRA TỒN KHO ──
  async function showStockSheet(){
    document.getElementById('stockOverlay').classList.add('show');
    document.getElementById('stockList').innerHTML = '<div class="loading">Đang tải...</div>';
    try {
      const [semi, supplies] = await Promise.all([
        DB.select('semi_stock', 'select=id,quantity'),
        DB.select('supplies', 'select=*&order=category.asc'),
      ]);
      const semiProducts = await DB.select('semi_products', 'select=id,name,icon,unit,warn_at');
      const semiMap = {}; semi.forEach(s => semiMap[s.id] = parseFloat(s.quantity)||0);

      let html = '<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Bán thành phẩm</div>';
      html += semiProducts.map(sp => {
        const qty = semiMap[sp.id] || 0;
        const st = qty <= 0 ? 'danger' : qty <= sp.warn_at ? 'warn' : 'ok';
        return `<div class="stock-row">
          <span class="stock-icon">${sp.icon||'🥤'}</span>
          <span class="stock-name">${sp.name}</span>
          <span class="stock-qty ${st}">${qty.toLocaleString('vi-VN')} ${sp.unit}</span>
        </div>`;
      }).join('');

      html += '<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px">Vật tư tiêu hao</div>';
      html += supplies.filter(s=>s.category==='consumable').map(s => {
        const qty = parseFloat(s.quantity)||0;
        const st = qty <= 0 ? 'danger' : qty <= s.warn_at ? 'warn' : 'ok';
        return `<div class="stock-row">
          <span class="stock-icon">📦</span>
          <span class="stock-name">${s.name}</span>
          <span class="stock-qty ${st}">${qty.toLocaleString('vi-VN')} ${s.unit}</span>
        </div>`;
      }).join('');

      document.getElementById('stockList').innerHTML = html;
    } catch(e){
      document.getElementById('stockList').innerHTML = `<div class="loading">Lỗi: ${e.message}</div>`;
    }
  }
  function hideStockSheet(){ document.getElementById('stockOverlay').classList.remove('show'); }

  function showLogout(){
    document.getElementById('logoutSub').textContent = session ? `Đang đăng nhập: ${session.name}` : '';
    document.getElementById('logoutOverlay').classList.add('show');
  }
  function hideLogout(){ document.getElementById('logoutOverlay').classList.remove('show'); }

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.opacity = '1';
    clearTimeout(t._tid); t._tid = setTimeout(() => t.style.opacity = '0', 2200);
  }

  init();
</script>
