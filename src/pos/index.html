<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Bán hàng</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
    .status-bar{background:#fff;padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .status-left{display:flex;align-items:center;gap:8px}
    .status-title{font-size:13px;font-weight:600;color:#1a1a18}
    .user-name{font-size:12px;color:#888;background:#f5f5f0;padding:3px 8px;border-radius:20px}
    .status-right{display:flex;align-items:center;gap:8px}
    .net-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;transition:background .4s}
    .net-dot.offline{background:#E24B4A}
    .order-badge{font-size:12px;font-weight:500;color:#888;background:#f5f5f0;padding:3px 8px;border-radius:20px}
    .icon-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;text-decoration:none;flex-shrink:0}
    .icon-btn:active{background:#e8e6e0}
    .icon-btn.danger:active{background:#FCEBEB;color:#A32D2D}
    .cat-bar{background:#fff;padding:10px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .cat-bar::-webkit-scrollbar{display:none}
    .cat-pill{padding:6px 16px;border-radius:20px;border:0.5px solid #d8d6d0;background:transparent;color:#888;font-size:13px;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:inherit}
    .cat-pill.active{background:#1D9E75;border-color:#1D9E75;color:#fff}
    .menu-list{flex:1;overflow-y:auto;padding:10px 14px 90px;display:flex;flex-direction:column;gap:7px}
    .menu-row{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:11px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .12s;user-select:none}
    .menu-row:active{background:#f5f5f0}
    .menu-row.out{opacity:.4;pointer-events:none}
    .micon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .minfo{flex:1;min-width:0}
    .mname{font-size:14px;font-weight:500;color:#1a1a18}
    .mprice{font-size:13px;color:#888;margin-top:2px}
    .add-btn{width:36px;height:36px;border-radius:50%;background:#E1F5EE;border:none;color:#0F6E56;font-size:24px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .add-btn:active{background:#9FE1CB}
    .qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .qb{width:30px;height:30px;border-radius:50%;border:0.5px solid #d8d6d0;background:#f5f5f0;color:#1a1a18;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
    .qb:active{background:#e8e6e0}
    .qn{font-size:14px;font-weight:500;min-width:18px;text-align:center}

    /* BOTTOM CART */
    .bottom-cart{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;border-top:0.5px solid #d8d6d0;transition:height .32s cubic-bezier(.4,0,.2,1);height:74px;overflow:hidden;display:flex;flex-direction:column;z-index:100}
    .bottom-cart.expanded{height:min(600px,80dvh)}
    .handle{width:36px;height:4px;background:#d8d6d0;border-radius:2px;position:absolute;top:10px;left:50%;transform:translateX(-50%)}
    .cart-collapsed{padding:0 16px;height:74px;flex-shrink:0;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
    .cart-summary{flex:1}
    .cart-lbl{font-size:11px;color:#888}
    .cart-total-big{font-size:20px;font-weight:600;color:#1a1a18;display:flex;align-items:center;gap:8px}
    .count-badge{background:#E24B4A;color:#fff;font-size:11px;font-weight:600;border-radius:10px;padding:1px 7px}
    .cart-toggle-btn{background:#1D9E75;color:#fff;border:none;border-radius:16px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;min-width:44px;min-height:44px}
    .cart-toggle-btn:disabled{background:#d8d6d0;cursor:default}
    .cart-toggle-btn.icon-only{padding:0;border-radius:50%;width:44px;height:44px}
    .cart-detail{flex:1;overflow-y:auto;padding:4px 16px 0}
    .cart-header-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;border-bottom:0.5px solid #e8e6e0}
    .cart-title{font-size:15px;font-weight:600}
    .clear-btn{font-size:12px;color:#888;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px}
    .ci{border-bottom:0.5px solid #e8e6e0;padding:10px 0}
    .ci-top{display:flex;align-items:center;gap:8px}
    .ci-name{flex:1;font-size:14px;font-weight:500}
    .ci-price{font-size:13px;color:#888;min-width:70px;text-align:right}
    .ci-note{width:100%;border:0.5px solid #e8e6e0;border-radius:8px;padding:6px 10px;font-size:12px;background:#f5f5f0;font-family:inherit;margin-top:8px}
    .ci-note:focus{outline:none;border-color:#1D9E75}
    .ci-note::placeholder{color:#bbb}

    /* BAG INDICATOR */
    .bag-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #e8e6e0}
    .bag-label{font-size:12px;color:#888;flex:1}
    .bag-value{font-size:12px;font-weight:500;color:#1a1a18;background:#f5f5f0;padding:3px 10px;border-radius:20px}

    .cart-footer{padding:12px 16px 28px;border-top:0.5px solid #e8e6e0;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
    .total-row{display:flex;justify-content:space-between;font-size:16px;font-weight:600}
    /* Chiết khấu + Thực thu */
    .disc-block{background:#f5f5f0;border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
    .disc-row{display:flex;align-items:center;gap:8px}
    .disc-lbl{font-size:13px;color:#888;flex-shrink:0;min-width:70px}
    .disc-type-wrap{display:flex;border:0.5px solid #d8d6d0;border-radius:8px;overflow:hidden;flex-shrink:0}
    .disc-type{padding:5px 9px;border:none;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#888;transition:all .15s}
    .disc-type.active{background:#1D9E75;color:#fff}
    .disc-input{flex:1;border:0.5px solid #d8d6d0;border-radius:8px;padding:6px 10px;font-size:14px;font-weight:600;background:#fff;font-family:inherit;text-align:right;outline:none;min-width:0}
    .disc-input:focus{border-color:#1D9E75}
    .actual-input{flex:1;border:0.5px solid #d8d6d0;border-radius:8px;padding:6px 10px;font-size:14px;font-weight:700;background:#fff;font-family:inherit;text-align:right;outline:none;min-width:0;color:#1a1a18}
    .actual-input:focus{border-color:#1D9E75}
    .payable-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:0 2px}
    .change-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:0 2px}
    .pay-method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .pay-method-btn{padding:11px;border-radius:12px;border:0.5px solid #d8d6d0;background:#f5f5f0;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center}
    .pay-method-btn.selected{background:#E1F5EE;border-color:#1D9E75;color:#085041}
    .qr-section{display:none;flex-direction:column;align-items:center;gap:8px;background:#f5f5f0;border-radius:12px;padding:14px}
    .qr-section.show{display:flex}
    .qr-section img{width:180px;height:180px;border-radius:8px;background:#fff}
    .qr-amount{font-size:18px;font-weight:700;color:#1D9E75}
    .qr-hint{font-size:11px;color:#bbb;text-align:center}
    .confirm-btn{padding:14px;border-radius:12px;border:none;background:#d8d6d0;font-size:15px;font-weight:600;cursor:default;color:#fff;font-family:inherit;width:100%}
    .confirm-btn.active{background:#1D9E75;cursor:pointer}
    .confirm-btn.active:active{background:#0F6E56}

    /* POS TABS */
    .pos-tab-bar{background:#fff;display:flex;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .pos-tab{flex:1;padding:9px 4px;border:none;background:transparent;font-size:13px;font-weight:500;color:#888;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s}
    .pos-tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:600}
    /* Today & Summary views */
    .alt-view{flex:1;overflow-y:auto;padding:10px 14px 90px;display:flex;flex-direction:column;gap:8px}
    .order-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:12px 14px;cursor:pointer}
    .order-card-row{display:flex;justify-content:space-between;align-items:center}
    .order-num{font-size:13px;font-weight:600}
    .order-time{font-size:12px;color:#888}
    .order-items{font-size:12px;color:#888;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .order-total{font-size:15px;font-weight:700;color:#1D9E75}
    .order-method{font-size:11px;background:#f5f5f0;padding:2px 8px;border-radius:10px;color:#555}
    .order-voided{opacity:.45}
    .order-voided .order-num{text-decoration:line-through}
    .void-btn{font-size:12px;padding:4px 10px;border-radius:8px;border:0.5px solid #e8e6e0;background:#f5f5f0;color:#c0392b;cursor:pointer;font-family:inherit;margin-top:8px}
    .summary-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:16px}
    .summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #f0f0ec}
    .summary-row:last-child{border-bottom:none}
    .summary-label{font-size:13px;color:#888}
    .summary-value{font-size:14px;font-weight:600}
    .summary-big .summary-value{font-size:18px;color:#1D9E75}
    /* OVERLAY */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px;max-height:75dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600}
    .sheet-close{padding:12px;border-radius:12px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center}

    .cart-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0;gap:8px;color:#bbb;font-size:13px}
    .loading{display:flex;align-items:center;justify-content:center;flex:1;color:#888;font-size:13px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:500}
  </style>
</head>
<body>

<div class="status-bar">
  <div class="status-left">
    <a href="../home/index.html" class="icon-btn" id="homeBtn" title="Trang chủ" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <span class="status-title" id="posTabTitle">Bán hàng</span>
    <span class="user-name" id="userName"></span>
  </div>
  <div class="status-right">
    <div class="net-dot" id="netDot"></div>
    <span class="order-badge" id="orderBadge">#001</span>
    <!-- Đơn bán hàng — hiện với manager/owner -->
    <a href="../orders/index.html" class="icon-btn" id="ordersBtn" style="display:none" title="Đơn bán hàng">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </a>
    <!-- Doanh thu — hiện với manager/owner -->
    <a href="../revenue/index.html" class="icon-btn" id="revenueBtn" style="display:none" title="Doanh thu">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </a>
    <!-- Menu — hiện với owner -->
    <a href="../menu/index.html" class="icon-btn" id="menuNavBtn" style="display:none" title="Quản lý menu">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </a>
    <!-- Cài đặt — hiện với owner -->
    <a href="../settings/index.html" class="icon-btn" id="settingsBtn" style="display:none" title="Cài đặt">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>
    <!-- Nút đăng xuất -->
    <button class="icon-btn danger" onclick="showLogout()" title="Đăng xuất">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<div class="pos-tab-bar" id="posTabBar">
  <button class="pos-tab active" id="tabSell"    onclick="switchPosTab('sell')">Bán hàng</button>
  <button class="pos-tab"        id="tabToday"   onclick="switchPosTab('today')">Hôm nay</button>
  <button class="pos-tab"        id="tabSummary" onclick="switchPosTab('summary')">Tổng kết</button>
</div>

<div class="cat-bar" id="catBar"></div>
<div class="menu-list" id="menuList"><div class="loading">Đang tải menu...</div></div>

<div class="alt-view" id="todayView" style="display:none"><div class="loading">Đang tải...</div></div>
<div class="alt-view" id="summaryView" style="display:none"><div class="loading">Đang tải...</div></div>

<div class="bottom-cart" id="bottomCart">
  <div class="handle"></div>
  <div class="cart-collapsed" onclick="toggleCart()">
    <div class="cart-summary">
      <div class="cart-lbl">Đơn <span id="orderNum">#001</span></div>
      <div class="cart-total-big">
        <span id="cartTotal">0 ₫</span>
        <span class="count-badge" id="countBadge" style="display:none">0</span>
      </div>
    </div>
    <button class="cart-toggle-btn" id="cartToggleBtn" disabled onclick="event.stopPropagation();toggleCart()">
      <span id="cartBtnContent">Xem giỏ hàng</span>
    </button>
  </div>
  <div class="cart-detail">
    <div class="cart-header-row">
      <span class="cart-title">Giỏ hàng</span>
      <button class="clear-btn" onclick="clearAll()">Xoá tất cả</button>
    </div>
    <div id="cartItems"></div>
  </div>
  <div class="cart-footer">
    <div class="total-row"><span>Tổng cộng</span><span id="footerSubtotal">0 ₫</span></div>

    <!-- Chiết khấu + Thực thu -->
    <div class="disc-block">
      <!-- Chiết khấu -->
      <div class="disc-row">
        <span class="disc-lbl">Chiết khấu</span>
        <div class="disc-type-wrap">
          <button class="disc-type active" id="dtVnd" onclick="setDiscType('vnd')">₫</button>
          <button class="disc-type"        id="dtPct" onclick="setDiscType('pct')">%</button>
        </div>
        <input class="disc-input" id="discInput" type="number" min="0" placeholder="0" oninput="updateDiscount()">
      </div>
      <!-- Sau chiết khấu (chỉ hiện khi có CK) -->
      <div class="payable-row" id="payableRow" style="display:none">
        <span style="color:#888">Sau chiết khấu</span>
        <span id="payableAmt" style="font-weight:700;color:#1D9E75;font-size:15px"></span>
      </div>
      <!-- Thực thu -->
      <div class="disc-row">
        <span class="disc-lbl">Thực thu</span>
        <input class="actual-input" id="actualInput" type="number" min="0" placeholder="Tự động" oninput="updateActual()">
      </div>
      <!-- Tiền thừa (chỉ hiện khi thực thu > cần TT) -->
      <div class="change-row" id="changeRow" style="display:none">
        <span style="color:#888">Tiền thừa trả khách</span>
        <span id="changeAmt" style="color:#1D9E75;font-weight:600"></span>
      </div>
    </div>

    <div>
      <div style="font-size:12px;color:#888;margin-bottom:6px">Hình thức thanh toán</div>
      <div class="pay-method-grid">
        <button class="pay-method-btn" id="btnCash" onclick="selectMethod('cash')">Tiền mặt</button>
        <button class="pay-method-btn" id="btnTransfer" onclick="selectMethod('transfer')">Chuyển khoản</button>
      </div>
    </div>
    <div class="qr-section" id="qrSection">
      <img id="qrImg" src="" alt="QR">
      <div class="qr-amount" id="qrAmount"></div>
      <div class="qr-hint">Khách quét QR — số tiền tự động điền</div>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmPay()">Xác nhận thanh toán</button>
  </div>
</div>

<!-- Đăng xuất -->
<div class="overlay" id="logoutOverlay" onclick="hideLogout()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" style="text-align:center">Đăng xuất?</div>
    <div style="font-size:13px;color:#888;text-align:center" id="logoutSub"></div>
    <button style="padding:14px;border-radius:12px;border:none;background:#FCEBEB;color:#A32D2D;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit" onclick="Auth.logout()">Đăng xuất</button>
    <button style="padding:14px;border-radius:12px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit" onclick="hideLogout()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../lib/utils.js"></script>
<script src="../lib/idb-service.js"></script>
<script src="../auth/auth.js"></script>
<script src="./pos.js"></script>
</body>
</html>
