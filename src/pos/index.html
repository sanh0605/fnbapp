<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB — Bán hàng</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a18;height:100dvh;overflow:hidden;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

    /* ── HEADER ── */
    .header{background:#fff;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid #ebebeb;flex-shrink:0}
    .header-left{display:flex;align-items:center;flex-shrink:0;min-width:32px}
    .header-title{font-size:16px;font-weight:700;color:#1a1a18;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .icon-btn{width:36px;height:36px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;text-decoration:none;flex-shrink:0}
    .icon-btn:active{background:#e8e6e0}
    .net-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;transition:background .4s;flex-shrink:0}
    .net-dot.offline{background:#E03C31}
    .order-badge{font-size:11px;font-weight:600;color:#888;background:#f5f5f0;padding:3px 8px;border-radius:20px}

    /* ── CATEGORY PILLS ── */
    .cat-bar{background:#fff;padding:10px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #ebebeb;flex-shrink:0}
    .cat-bar::-webkit-scrollbar{display:none}
    /* min 44px tall tap target */
    .cat-pill{min-height:40px;padding:0 20px;border-radius:22px;border:1px solid #e0e0e0;background:#fff;color:#555;font-size:14px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .15s;font-family:inherit;flex-shrink:0;display:flex;align-items:center}
    .cat-pill.active{background:#E03C31;border-color:#E03C31;color:#fff;font-weight:600}

    /* ── MENU LIST (1 cột) ── */
    .menu-list{flex:1;overflow-y:auto;padding:8px 12px 110px;display:flex;flex-direction:column;gap:8px;scrollbar-width:none}
    .menu-list::-webkit-scrollbar{display:none}
    .cat-header{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px;padding:8px 4px 2px}

    .menu-card{background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:row;align-items:stretch;box-shadow:0 1px 4px rgba(0,0,0,.06);min-height:88px;position:relative;transition:box-shadow .12s}
    .menu-card.in-cart{box-shadow:0 0 0 2px #E03C31}
    .menu-card.out{opacity:.4;pointer-events:none}

    /* Hình ảnh 25% chiều rộng */
    .mc-img{width:25%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
    .mc-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}

    /* Nội dung bên phải */
    .mc-content{flex:1;padding:12px 12px 10px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;gap:6px}
    .mc-name{font-size:16px;font-weight:600;color:#1a1a18;line-height:1.3}

    .mc-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .mc-prices{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .mc-price{font-size:16px;font-weight:700;color:#E03C31}
    .mc-original{font-size:11px;color:#bbb;text-decoration:line-through}

    /* Nút + và qty controls — thumb zone phải */
    .mc-add-btn{width:48px;height:48px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
    .mc-add-btn:active{opacity:.7}
    .mc-qty{display:flex;align-items:center;gap:4px;flex-shrink:0}
    .qb{width:48px;height:48px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0;padding:0;border-radius:50%}
    .qb:active{background:rgba(0,0,0,.05)}
    .qn{font-size:18px;font-weight:700;min-width:28px;text-align:center}

    /* ── BOTTOM CART ── */
    .bottom-cart{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.12);transition:height .32s cubic-bezier(.4,0,.2,1);height:84px;overflow:hidden;display:flex;flex-direction:column;z-index:100}
    .bottom-cart.expanded{height:min(640px,88dvh)}
    .handle{width:40px;height:4px;background:#d8d6d0;border-radius:2px;position:absolute;top:10px;left:50%;transform:translateX(-50%)}

    /* Collapsed: 84px — đủ cao cho ngón cái */
    .cart-collapsed{padding:0 16px;height:84px;flex-shrink:0;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;border-bottom:0.5px solid transparent;transition:border-color .2s}
    .bottom-cart.expanded .cart-collapsed{border-bottom-color:#e8e6e0}
    .cart-icon-circle{width:48px;height:48px;border-radius:50%;border:none;background:#E03C31;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(224,60,49,.35)}
    .cart-diamond{height:40px;padding:0 12px;background:#E03C31;border-radius:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(224,60,49,.35)}
    .cart-diamond-inner{display:inline-flex;flex-direction:row;align-items:center;justify-content:center;gap:4px;pointer-events:none}
    .cart-diamond-qty{font-size:13px;font-weight:700;color:#fff;line-height:1;display:block}
    .cart-total-big{font-size:15px;font-weight:400;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
    #trashBtn{margin-left:auto}
    .cart-action-btn{width:40px;height:40px;border-radius:50%;border:none;background:#E03C31;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;transition:background .15s;box-shadow:0 2px 8px rgba(224,60,49,.35)}
    .cart-action-btn:active{background:#C42B21}
    .cart-toggle-btn{width:40px;height:40px;border-radius:50%;border:none;background:#E03C31;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:background .15s;box-shadow:0 2px 8px rgba(224,60,49,.35)}
    .cart-toggle-btn:active{background:#C42B21}
    .cart-toggle-btn:disabled{background:#ddd;box-shadow:none;cursor:default}

    .cart-detail{flex:1;overflow-y:auto;padding:4px 16px 0;scrollbar-width:none}
    .cart-detail::-webkit-scrollbar{display:none}
    .cart-header-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;border-bottom:0.5px solid #ebebeb}
    .cart-title{font-size:15px;font-weight:700}
    .clear-btn{font-size:12px;color:#E03C31;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px}
    .ci-group{padding:10px 0;border-bottom:0.5px solid #f0f0ec}
    .ci-group:last-child{border-bottom:none}
    .ci-group-name{font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:4px}
    .ci-line{display:flex;align-items:center;gap:6px;padding:3px 0}
    .ci-line-opts{flex:1;background:none;border:none;font-size:12px;color:#888;cursor:pointer;font-family:inherit;text-align:left;padding:4px 0;min-height:28px;line-height:1.4}
    .ci-line-opts:active{opacity:.6}
    .ci-line-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .ci-line-qty .qb{width:36px;height:36px}
    .ci-line-qty .qn{font-size:15px;min-width:22px}
    .ci-price{font-size:13px;font-weight:600;color:#1a1a18;min-width:56px;text-align:right}

    .cart-footer{padding:12px 16px 28px;border-top:0.5px solid #ebebeb;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
    .total-row{display:flex;justify-content:space-between;font-size:16px;font-weight:700}
    .disc-block{background:#f5f5f5;border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
    .disc-row{display:flex;align-items:center;gap:8px}
    .disc-lbl{font-size:13px;color:#888;flex-shrink:0;min-width:70px}
    .disc-type-wrap{display:flex;border:0.5px solid #d8d6d0;border-radius:8px;overflow:hidden;flex-shrink:0}
    .disc-type{padding:5px 9px;border:none;background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#888;transition:all .15s}
    .disc-type.active{background:#E03C31;color:#fff}
    .disc-input{flex:1;border:0.5px solid #d8d6d0;border-radius:8px;padding:6px 10px;font-size:14px;font-weight:600;background:#fff;font-family:inherit;text-align:right;outline:none;min-width:0}
    .disc-input:focus{border-color:#E03C31}
    .actual-input{flex:1;border:0.5px solid #d8d6d0;border-radius:8px;padding:6px 10px;font-size:14px;font-weight:700;background:#fff;font-family:inherit;text-align:right;outline:none;min-width:0}
    .actual-input:focus{border-color:#E03C31}
    .payable-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:0 2px}
    .change-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:0 2px}
    .pay-method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .pay-method-btn{padding:15px;min-height:48px;border-radius:14px;border:1px solid #e0e0e0;background:#f5f5f5;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
    .pay-method-btn.selected{background:#FDECEA;border-color:#E03C31;color:#C42B21;font-weight:600}
    .qr-section{display:none;flex-direction:column;align-items:center;gap:8px;background:#f5f5f5;border-radius:12px;padding:14px}
    .qr-section.show{display:flex}
    .qr-section img{width:180px;height:180px;border-radius:8px;background:#fff}
    .qr-amount{font-size:18px;font-weight:700;color:#E03C31}
    .qr-hint{font-size:11px;color:#bbb;text-align:center}
    .confirm-btn{padding:17px;border-radius:16px;border:none;background:#ddd;font-size:16px;font-weight:700;cursor:default;color:#fff;font-family:inherit;width:100%;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:10px}
    .confirm-btn.active{background:#E03C31;cursor:pointer}
    .confirm-btn.active:active{background:#C42B21}
    .confirm-btn.loading{background:#E03C31;opacity:.7;cursor:default;pointer-events:none}
    .confirm-btn.success{background:#1D9E75;cursor:default;pointer-events:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

    /* ── QUICK PAY ── */
    .quick-pay-wrap{display:flex;gap:6px;align-items:center}
    .qpay-btn{height:40px;padding:0 14px;border-radius:20px;border:none;background:#E03C31;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;box-shadow:0 2px 8px rgba(224,60,49,.35)}
    .qpay-btn:active{background:#C42B21}

    /* ── DISC TOGGLE ── */
    .disc-toggle{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:2px 0;user-select:none}
    .disc-toggle:active{opacity:.7}

    /* ── QTY EDIT ── */
    .qn-edit{width:40px;border:none;border-bottom:2px solid #E03C31;text-align:center;font-size:18px;font-weight:700;background:transparent;outline:none;font-family:inherit;color:#1a1a18}

    /* ── CUSTOM MODAL ── */
    .custom-section{margin-bottom:16px}
    .custom-section-label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
    .custom-pills{display:flex;flex-wrap:wrap;gap:8px}
    .custom-pill{height:36px;padding:0 14px;border-radius:18px;border:1.5px solid #e0e0e0;background:#fff;font-size:13px;font-weight:500;color:#555;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;transition:all .12s}
    .custom-pill.active{background:#E03C31;border-color:#E03C31;color:#fff;font-weight:700}
    .custom-pill:active{opacity:.7}

    /* ── SKELETON ── */
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .skel-card{background:#fff;border-radius:14px;height:88px;display:flex;overflow:hidden;flex-shrink:0}
    .skel-img{width:25%;background:#efefef}
    .skel-body{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:10px;justify-content:center}
    .skel-line{height:13px;border-radius:6px;background:linear-gradient(90deg,#efefef 25%,#e0e0e0 50%,#efefef 75%);background-size:200% 100%;animation:shimmer 1.3s infinite}
    .skel-line.short{width:45%}

    /* ── DRAFT ── */
    .park-btn{padding:13px;border-radius:14px;border:0.5px solid #e8e6e0;background:#f5f5f0;color:#555;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%}
    .park-btn:active{background:#e8e6e0}
    .draft-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid #f0f0ec}
    .draft-row:last-child{border-bottom:none}
    .draft-info{flex:1;min-width:0}
    .draft-label{font-size:13px;color:#555;margin-bottom:4px}
    .draft-label strong{font-weight:700;color:#1a1a18}
    .draft-items{font-size:13px;color:#1a1a18;line-height:1.5;margin-bottom:3px}
    .draft-meta{font-size:12px;color:#888}
    .draft-resume{padding:7px 14px;border-radius:10px;border:none;background:#E03C31;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
    .draft-resume:active{background:#C42B21}
    .draft-del{width:30px;height:30px;border-radius:50%;border:none;background:#f5f5f0;color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
    .draft-del:active{background:#e8e6e0}

    /* ── MISC ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px;max-height:75dvh;overflow-y:auto}
    .cart-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 0;gap:8px;color:#bbb;font-size:13px}
    .loading{display:flex;align-items:center;justify-content:center;flex:1;color:#888;font-size:13px;grid-column:1/-1;padding:32px 0}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:500}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="icon-btn" id="homeBtn" style="visibility:hidden" onclick="history.back()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
  </div>
  <span class="header-title" id="posTabTitle">Bán hàng</span>
  <div class="header-right">
    <div class="net-dot" id="netDot"></div>
    <a href="../orders/index.html" class="icon-btn" id="ordersBtn" style="display:none" title="Đơn hàng">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    </a>
    <a href="../revenue/index.html" class="icon-btn" id="revenueBtn" style="display:none" title="Báo cáo">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </a>
    <button class="icon-btn" id="draftListBtn" style="display:none;position:relative" onclick="showDrafts()" title="Đơn nháp">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span id="draftBadge" style="position:absolute;top:-3px;right:-3px;background:#E03C31;color:#fff;font-size:9px;font-weight:700;border-radius:8px;min-width:14px;height:14px;display:flex;align-items:center;justify-content:center;pointer-events:none"></span>
    </button>
    <button class="icon-btn" onclick="showLogout()" style="color:#c0392b" title="Đăng xuất">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<div class="cat-bar" id="catBar"></div>
<div class="menu-list" id="menuList"><div class="loading">Đang tải menu...</div></div>

<!-- CART BACKDROP -->
<div id="cartBackdrop" onclick="toggleCart()" style="display:none;position:fixed;inset:0;z-index:50"></div>

<!-- BOTTOM CART -->
<div class="bottom-cart" id="bottomCart">
  <div class="handle"></div>
  <div class="cart-collapsed" onclick="toggleCart()">
    <div id="cartIconArea" class="cart-icon-circle">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </div>
    <div id="cartTotalBig" class="cart-total-big" style="display:none"></div>
    <div id="quickPayBtns" class="quick-pay-wrap" style="display:none">
      <button class="qpay-btn" onclick="event.stopPropagation();quickPay('cash')">TM</button>
      <button class="qpay-btn" onclick="event.stopPropagation();quickPay('transfer')">CK</button>
    </div>
    <button class="cart-action-btn" id="trashBtn" style="visibility:hidden" onclick="event.stopPropagation();clearAll()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
    <button class="cart-toggle-btn" id="cartToggleBtn" disabled onclick="event.stopPropagation();toggleCart()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 12 12 6 6 12"/><polyline points="18 18 12 12 6 18"/></svg>
    </button>
  </div>

  <div class="cart-detail">
    <div id="cartItems"></div>
  </div>

  <div class="cart-footer">
    <div class="total-row"><span>Tổng cộng</span><span id="footerSubtotal">0 ₫</span></div>
    <div class="disc-toggle" onclick="toggleDisc()">
      <span style="font-size:13px;color:#888;font-weight:500">Chiết khấu</span>
      <svg id="discArrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="disc-block" id="discBlock" style="display:none">
      <div class="disc-row">
        <span class="disc-lbl">Chiết khấu</span>
        <div class="disc-type-wrap">
          <button class="disc-type active" id="dtVnd" onclick="setDiscType('vnd')">₫</button>
          <button class="disc-type"        id="dtPct" onclick="setDiscType('pct')">%</button>
        </div>
        <input class="disc-input" id="discInput" type="text" inputmode="numeric" placeholder="0" oninput="updateDiscount()">
      </div>
      <div class="payable-row" id="payableRow" style="display:none">
        <span style="color:#888">Sau chiết khấu</span>
        <span id="payableAmt" style="font-weight:700;color:#E03C31;font-size:15px"></span>
      </div>
      <div class="disc-row" id="actualRow" style="display:none">
        <span class="disc-lbl">Thực thu</span>
        <input class="actual-input" id="actualInput" type="text" inputmode="numeric" placeholder="Tự động" oninput="updateActual()">
      </div>
      <div class="change-row" id="changeRow" style="display:none">
        <span style="color:#888">Tiền thừa trả khách</span>
        <span id="changeAmt" style="color:#E03C31;font-weight:600"></span>
      </div>
    </div>
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:6px">Hình thức thanh toán</div>
      <div class="pay-method-grid">
        <button class="pay-method-btn" id="btnCash"     onclick="selectMethod('cash')">Tiền mặt</button>
        <button class="pay-method-btn" id="btnTransfer" onclick="selectMethod('transfer')">Chuyển khoản</button>
      </div>
    </div>
    <div class="qr-section" id="qrSection">
      <img id="qrImg" src="" alt="QR">
      <div class="qr-amount" id="qrAmount"></div>
      <div class="qr-hint">Khách quét QR — số tiền tự động điền</div>
    </div>
    <button class="park-btn" id="parkBtn" style="display:none" onclick="parkOrder()">Lưu nháp &amp; đơn mới</button>
    <button class="confirm-btn" id="confirmBtn" onclick="confirmPay()">Xác nhận thanh toán</button>
  </div>
</div>

<!-- PRODUCT CUSTOMIZATION MODAL -->
<div class="overlay" id="customModal" onclick="cancelCustom()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700" id="customItemName"></div>
      <button onclick="cancelCustom()" style="width:30px;height:30px;border-radius:50%;border:none;background:#f5f5f0;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:16px;border-bottom:0.5px solid #f0f0ec">
      <span style="font-size:14px;font-weight:600">Số lượng</span>
      <div class="mc-qty">
        <button id="customQtyMinus" class="qb minus" onclick="customQty(-1)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="12" fill="#f5f5f5"/><line x1="7" y1="12" x2="17" y2="12" stroke="#E03C31" stroke-width="2.5" stroke-linecap="round"/></svg></button>
        <span id="customQtyVal" class="qn">1</span>
        <button class="qb" onclick="customQty(1)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="12" fill="#f5f5f5"/><line x1="12" y1="7" x2="12" y2="17" stroke="#1a1a18" stroke-width="2.5" stroke-linecap="round"/><line x1="7" y1="12" x2="17" y2="12" stroke="#1a1a18" stroke-width="2.5" stroke-linecap="round"/></svg></button>
      </div>
    </div>
    <div class="custom-section">
      <div class="custom-section-label">Ngọt</div>
      <div class="custom-pills" id="sweetPills"></div>
    </div>
    <div class="custom-section">
      <div class="custom-section-label">Đá</div>
      <div class="custom-pills" id="icePills"></div>
    </div>
    <div class="custom-section" id="toppingSection" style="display:none">
      <div class="custom-section-label">Topping</div>
      <div class="custom-pills" id="toppingPills"></div>
    </div>
    <div style="margin-bottom:16px">
      <div class="custom-section-label">Ghi chú</div>
      <input id="customNote" type="text" placeholder="Vd: thêm đường, không kem..."
        style="width:100%;border:0.5px solid #e8e6e0;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none"
        onfocus="this.style.borderColor='#E03C31'" onblur="this.style.borderColor='#e8e6e0'"
        onkeydown="if(event.key==='Enter') this.blur()">
    </div>
    <button id="customDelBtn" onclick="deleteCustomLine()" style="display:none;padding:12px;border-radius:12px;border:none;background:#FCEBEB;color:#A32D2D;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px;width:100%">Xoá dòng này</button>
    <button id="customAddBtn" onclick="confirmCustom()" style="padding:15px;border-radius:14px;border:none;background:#E03C31;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%">Thêm vào giỏ</button>
  </div>
</div>

<!-- DRAFT LIST -->
<div class="overlay" id="draftsOverlay" onclick="hideDrafts()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:15px;font-weight:600">Đơn nháp</div>
      <button onclick="hideDrafts()" style="width:30px;height:30px;border-radius:50%;border:none;background:#f5f5f0;color:#555;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="draftList"></div>
  </div>
</div>


<!-- ĐĂNG XUẤT -->
<div class="overlay" id="logoutOverlay" onclick="hideLogout()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div style="font-size:15px;font-weight:600;text-align:center">Đăng xuất?</div>
    <div style="font-size:13px;color:#888;text-align:center" id="logoutSub"></div>
    <button style="padding:14px;border-radius:12px;border:none;background:#FCEBEB;color:#A32D2D;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit" onclick="Auth.logout()">Đăng xuất</button>
    <button style="padding:14px;border-radius:12px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit" onclick="hideLogout()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../lib/utils.js"></script>
<script src="../lib/idb-service.js"></script>
<script src="../auth/auth.js"></script>
<script src="./pos.js"></script>
</body>
</html>
