<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Tài sản</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none;flex-shrink:0}
    .header-title{font-size:15px;font-weight:600;flex:1}
    .section-add{padding:5px 12px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
    .toolbar{background:#fff;padding:8px 14px;display:flex;gap:8px;border-bottom:0.5px solid #e8e6e0;flex-shrink:0;flex-wrap:wrap}
    .search-box{flex:1;min-width:160px;display:flex;align-items:center;gap:6px;background:#f5f5f0;border:0.5px solid #e8e6e0;border-radius:10px;padding:7px 10px}
    .search-box input{border:none;background:transparent;font-size:13px;color:#1a1a18;font-family:inherit;flex:1;outline:none}
    .search-box input::placeholder{color:#bbb}
    .filter-row{width:100%;display:flex;gap:6px;flex-wrap:wrap}
    .filter-btn{padding:4px 10px;border-radius:20px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:12px;color:#888;cursor:pointer;font-family:inherit;white-space:nowrap}
    .filter-btn.active{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:500}
    .group-toggle{padding:4px 10px;border-radius:20px;border:0.5px solid #e8e6e0;background:#f5f5f0;font-size:12px;color:#888;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:auto}
    .group-toggle.active{background:#EEEDFE;border-color:#3C3489;color:#3C3489;font-weight:500}
    .content{flex:1;overflow-y:auto;padding:14px 14px 32px;display:flex;flex-direction:column;gap:14px}
    .group-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:2px 0}
    .card-list{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden}
    .card-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-bottom:0.5px solid #e8e6e0;cursor:pointer}
    .card-row:last-child{border-bottom:none}
    .card-row:active{background:#f5f5f0}
    .card-icon{width:40px;height:40px;border-radius:12px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .card-info{flex:1;min-width:0}
    .card-name{font-size:14px;font-weight:500}
    .card-code{font-size:11px;color:#888;margin-top:1px}
    .card-meta{font-size:12px;color:#888;margin-top:3px}
    .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
    .badge-active{background:#E1F5EE;color:#085041}
    .badge-maintenance{background:#FAEEDA;color:#633806}
    .badge-broken{background:#FCEBEB;color:#A32D2D}
    .badge-disposed{background:#f5f5f0;color:#888}
    .progress-wrap{width:70px;background:#e8e6e0;border-radius:4px;height:4px;overflow:hidden}
    .progress-bar{height:4px;border-radius:4px;background:#1D9E75;transition:width .3s}
    .progress-bar.warn{background:#EF9F27}
    .progress-bar.danger{background:#E24B4A}
    .depre-text{font-size:10px;color:#888}
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 0;gap:8px;color:#bbb;font-size:13px}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:92dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600}
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.primary:active{background:#0F6E56}
    .sheet-btn.danger{background:#FCEBEB;color:#A32D2D}
    .sheet-btn.secondary{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}
    .divider{height:0.5px;background:#e8e6e0;margin:2px 0}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input,.field select,.field textarea{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field textarea{resize:none;min-height:72px}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1D9E75;background:#fff}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:400}
  </style>
</head>
<body>

<div class="header">
  <a href="../home/index.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <span class="header-title">Tài sản</span>
  <button class="section-add" onclick="showAsset()">+ Thêm</button>
</div>

<div class="toolbar">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Tìm tên, mã, loại..." oninput="applyFilter()">
  </div>
  <div class="filter-row" id="filterRow"></div>
</div>

<div class="content" id="content"><div style="text-align:center;padding:32px;color:#bbb;font-size:13px">Đang tải...</div></div>

<!-- Asset sheet -->
<div class="overlay" id="assetOverlay" onclick="hideAsset()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="assetSheetTitle">Thêm tài sản</div>
    <input type="hidden" id="editAssetId">

    <div class="field-row">
      <div class="field"><label>Mã tài sản</label><input type="text" id="aCode" placeholder="TS-001" readonly style="background:#f0f0ec"></div>
      <div class="field"><label>Trạng thái</label>
        <select id="aStatus">
          <option value="active">Đang dùng</option>
          <option value="maintenance">Bảo trì</option>
          <option value="broken">Hỏng</option>
          <option value="disposed">Đã thanh lý</option>
        </select>
      </div>
    </div>

    <div class="field"><label>Tên tài sản</label><input type="text" id="aName" placeholder="Máy pha cà phê Breville..."></div>
    <div class="field-row">
      <div class="field"><label>Loại tài sản</label><input type="text" id="aType" placeholder="Thiết bị / Dụng cụ / Xe..."></div>
      <div class="field"><label>Vị trí</label><input type="text" id="aLocation" placeholder="Quầy pha chế"></div>
    </div>
    <div class="field"><label>Người chịu trách nhiệm</label>
      <select id="aAssigned">
        <option value="">— Không gán —</option>
      </select>
    </div>
    <div class="field"><label>Mô tả</label><textarea id="aDesc" placeholder="Ghi chú thêm..."></textarea></div>

    <div class="divider"></div>
    <div style="font-size:13px;font-weight:600">Thông tin mua sắm</div>

    <div class="field-row">
      <div class="field"><label>Ngày mua</label><input type="date" id="aPurchaseDate"></div>
      <div class="field"><label>Giá mua (₫)</label><input type="number" id="aPurchasePrice" placeholder="0" min="0" step="1000"></div>
    </div>
    <div class="field"><label>Nhà cung cấp</label>
      <select id="aSupplier">
        <option value="">— Không có —</option>
      </select>
    </div>

    <div class="divider"></div>
    <div style="font-size:13px;font-weight:600">Khấu hao (đường thẳng)</div>

    <div class="field-row">
      <div class="field"><label>Thời gian khấu hao (tháng)</label><input type="number" id="aUsefulLife" placeholder="36" min="0"></div>
      <div class="field"><label>Giá trị thanh lý (₫)</label><input type="number" id="aSalvage" placeholder="0" min="0" step="1000"></div>
    </div>

    <div class="field"><label>Ghi chú</label><textarea id="aNote" placeholder="..."></textarea></div>

    <button class="sheet-btn primary" onclick="saveAsset()">Lưu tài sản</button>
    <button class="sheet-btn danger" id="delAssetBtn" style="display:none" onclick="deleteAsset()">Xoá tài sản</button>
    <button class="sheet-btn secondary" onclick="hideAsset()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../auth/auth.js"></script>
<script>
  Auth.require('inventory_edit');

  const fmt = n => n.toLocaleString('en-US') + ' ₫';
  const fmtDate=(d,t=false)=>{const dt=d instanceof Date?d:new Date(d);const p=n=>String(n).padStart(2,'0');const s=`${p(dt.getDate())}/${p(dt.getMonth()+1)}/${dt.getFullYear()}`;return t?`${s} ${p(dt.getHours())}:${p(dt.getMinutes())}`:s;};
  const STATUS_LABEL = {active:'Đang dùng', maintenance:'Bảo trì', broken:'Hỏng', disposed:'Đã thanh lý'};
  const STATUS_BADGE = {active:'badge-active', maintenance:'badge-maintenance', broken:'badge-broken', disposed:'badge-disposed'};

  let ASSETS=[], USERS=[], SUPPLIERS=[];
  let filterStatus='all', filterType='all', groupByType=true;

  async function init(){
    try {
      [ASSETS, USERS, SUPPLIERS] = await Promise.all([
        DB.select('assets','select=*,assigned_user:users(name),supplier:suppliers(name)&order=asset_code.asc'),
        DB.select('users','select=id,name,role&order=name.asc'),
        DB.select('suppliers','contact_type=eq.nha_cung_cap&select=id,name,code&order=name.asc'),
      ]);
      renderFilterRow();
      renderContent();
      populateSheetSelects();
    } catch(e){
      document.getElementById('content').innerHTML=`<div class="empty">Lỗi: ${e.message}</div>`;
    }
  }

  function renderFilterRow(){
    const types = [...new Set(ASSETS.map(a=>a.asset_type))].sort();
    let html = `<button class="filter-btn ${filterStatus==='all'?'active':''}" onclick="setStatusFilter('all')">Tất cả</button>`;
    ['active','maintenance','broken','disposed'].forEach(s=>{
      const count = ASSETS.filter(a=>a.status===s).length;
      if(count>0) html+=`<button class="filter-btn ${filterStatus===s?'active':''}" onclick="setStatusFilter('${s}')">${STATUS_LABEL[s]} (${count})</button>`;
    });
    html+=`<button class="group-toggle ${groupByType?'active':''}" onclick="toggleGroup()">Nhóm: ${groupByType?'Loại':'Trạng thái'}</button>`;
    if(types.length>0){
      html+=`<span style="font-size:11px;color:#bbb;align-self:center;padding:4px 2px;width:100%">Lọc loại:</span>`;
      html+=`<button class="filter-btn ${filterType==='all'?'active':''}" onclick="setTypeFilter('all')">Tất cả loại</button>`;
      types.forEach(t=>{ html+=`<button class="filter-btn ${filterType===t?'active':''}" onclick="setTypeFilter('${t}')">${t}</button>`; });
    }
    document.getElementById('filterRow').innerHTML=html;
  }

  function setStatusFilter(s){ filterStatus=s; renderFilterRow(); renderContent(); }
  function setTypeFilter(t){ filterType=t; renderFilterRow(); renderContent(); }
  function toggleGroup(){ groupByType=!groupByType; renderFilterRow(); renderContent(); }

  function applyFilter(){ renderContent(); }

  function getFiltered(){
    const q = (document.getElementById('searchInput')?.value||'').toLowerCase().trim();
    return ASSETS.filter(a=>{
      if(filterStatus!=='all' && a.status!==filterStatus) return false;
      if(filterType!=='all' && a.asset_type!==filterType) return false;
      if(q && !a.name.toLowerCase().includes(q) && !a.asset_code.toLowerCase().includes(q) && !a.asset_type.toLowerCase().includes(q)) return false;
      return true;
    });
  }

  function calcDepreciation(a){
    if(!a.purchase_price||!a.useful_life_months||a.useful_life_months<=0) return null;
    const monthly = (a.purchase_price - (a.salvage_value||0)) / a.useful_life_months;
    let monthsUsed = 0;
    if(a.purchase_date){
      const start = new Date(a.purchase_date);
      const now = new Date();
      monthsUsed = (now.getFullYear()-start.getFullYear())*12+(now.getMonth()-start.getMonth());
      monthsUsed = Math.max(0, Math.min(monthsUsed, a.useful_life_months));
    }
    const accumulated = monthly * monthsUsed;
    const remaining = Math.max(a.salvage_value||0, a.purchase_price - accumulated);
    const pct = a.purchase_price > 0 ? (remaining / a.purchase_price) * 100 : 0;
    return { monthly, monthsUsed, accumulated, remaining, pct };
  }

  function renderContent(){
    const filtered = getFiltered();
    const el = document.getElementById('content');
    if(!filtered.length){ el.innerHTML='<div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Không có tài sản nào</span></div>'; return; }

    const groupKey = groupByType ? 'asset_type' : 'status';
    const groups = {};
    filtered.forEach(a=>{ const k=a[groupKey]; if(!groups[k]) groups[k]=[]; groups[k].push(a); });

    let html='';
    Object.keys(groups).sort().forEach(gk=>{
      const label = groupByType ? gk : STATUS_LABEL[gk]||gk;
      html+=`<div class="group-label">${label} (${groups[gk].length})</div><div class="card-list">`;
      groups[gk].forEach(a=>{
        const dep = calcDepreciation(a);
        const pct = dep ? Math.round(dep.pct) : null;
        const barClass = pct===null?'':pct>50?'progress-bar':pct>20?'progress-bar warn':'progress-bar danger';
        html+=`<div class="card-row" onclick="showAsset('${a.id}')">
          <div class="card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3C3489" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          </div>
          <div class="card-info">
            <div class="card-name">${a.name}</div>
            <div class="card-code">${a.asset_code} · ${a.asset_type}${a.location?` · ${a.location}`:''}</div>
            ${a.assigned_user?.name?`<div class="card-meta">Phụ trách: ${a.assigned_user.name}</div>`:''}
            ${dep?`<div style="margin-top:5px">
              <div class="progress-wrap"><div class="${barClass}" style="width:${pct}%"></div></div>
              <div class="depre-text">${fmt(dep.remaining)} còn lại · ${dep.monthsUsed}/${a.useful_life_months} tháng</div>
            </div>`:''}
          </div>
          <div class="card-right">
            <span class="badge ${STATUS_BADGE[a.status]}">${STATUS_LABEL[a.status]}</span>
            ${a.purchase_price?`<span style="font-size:11px;color:#888">${fmt(a.purchase_price)}</span>`:''}
          </div>
        </div>`;
      });
      html+=`</div>`;
    });
    el.innerHTML=html;
  }

  function populateSheetSelects(){
    const asSel = document.getElementById('aAssigned');
    asSel.innerHTML='<option value="">— Không gán —</option>'+USERS.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
    const supSel = document.getElementById('aSupplier');
    supSel.innerHTML='<option value="">— Không có —</option>'+SUPPLIERS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  }

  async function showAsset(id){
    const delBtn = document.getElementById('delAssetBtn');
    if(id){
      const a = ASSETS.find(x=>x.id===id);
      if(!a) return;
      document.getElementById('assetSheetTitle').textContent='Chỉnh sửa tài sản';
      document.getElementById('editAssetId').value=id;
      document.getElementById('aCode').value=a.asset_code;
      document.getElementById('aName').value=a.name;
      document.getElementById('aType').value=a.asset_type;
      document.getElementById('aStatus').value=a.status;
      document.getElementById('aLocation').value=a.location||'';
      document.getElementById('aAssigned').value=a.assigned_to||'';
      document.getElementById('aDesc').value=a.description||'';
      document.getElementById('aPurchaseDate').value=a.purchase_date||'';
      document.getElementById('aPurchasePrice').value=a.purchase_price||'';
      document.getElementById('aSupplier').value=a.supplier_id||'';
      document.getElementById('aUsefulLife').value=a.useful_life_months||'';
      document.getElementById('aSalvage').value=a.salvage_value||'';
      document.getElementById('aNote').value=a.note||'';
      delBtn.style.display='block';
    } else {
      document.getElementById('assetSheetTitle').textContent='Thêm tài sản';
      document.getElementById('editAssetId').value='';
      const nextNum = ASSETS.length + 1;
      document.getElementById('aCode').value='TS-'+String(nextNum).padStart(3,'0');
      ['aName','aType','aLocation','aDesc','aPurchaseDate','aPurchasePrice','aUsefulLife','aSalvage','aNote'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('aStatus').value='active';
      document.getElementById('aAssigned').value='';
      document.getElementById('aSupplier').value='';
      delBtn.style.display='none';
    }
    document.getElementById('assetOverlay').classList.add('show');
  }

  function hideAsset(){ document.getElementById('assetOverlay').classList.remove('show'); }

  async function saveAsset(){
    const id = document.getElementById('editAssetId').value;
    const payload = {
      asset_code:          document.getElementById('aCode').value.trim(),
      name:                document.getElementById('aName').value.trim(),
      asset_type:          document.getElementById('aType').value.trim(),
      status:              document.getElementById('aStatus').value,
      location:            document.getElementById('aLocation').value.trim()||null,
      assigned_to:         document.getElementById('aAssigned').value||null,
      description:         document.getElementById('aDesc').value.trim()||null,
      purchase_date:       document.getElementById('aPurchaseDate').value||null,
      purchase_price:      parseInt(document.getElementById('aPurchasePrice').value)||0,
      supplier_id:         document.getElementById('aSupplier').value||null,
      useful_life_months:  parseInt(document.getElementById('aUsefulLife').value)||0,
      salvage_value:       parseInt(document.getElementById('aSalvage').value)||0,
      note:                document.getElementById('aNote').value.trim()||null,
      updated_at:          new Date().toISOString(),
    };
    if(!payload.name||!payload.asset_type){ toast('Vui lòng nhập tên và loại tài sản'); return; }
    if(!payload.asset_code){ toast('Mã tài sản không hợp lệ'); return; }
    try {
      if(id){
        await DB.update('assets',`id=eq.${id}`,payload);
      } else {
        await DB.insert('assets',{...payload,active:true});
      }
      hideAsset(); toast('✓ Đã lưu tài sản');
      await reload();
    } catch(e){ toast('Lỗi: '+e.message); }
  }

  async function deleteAsset(){
    const id = document.getElementById('editAssetId').value;
    if(!id) return;
    try {
      await DB.update('assets',`id=eq.${id}`,{active:false, updated_at: new Date().toISOString()});
      hideAsset(); toast('Đã xoá tài sản');
      await reload();
    } catch(e){ toast('Lỗi: '+e.message); }
  }

  async function reload(){
    ASSETS = await DB.select('assets','select=*,assigned_user:users(name),supplier:suppliers(name)&order=asset_code.asc');
    renderFilterRow();
    renderContent();
  }

  function toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.style.opacity='1';
    clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2500);
  }

  init();
</script>
</body>
</html>
