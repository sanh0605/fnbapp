<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FNB App — Cài đặt</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    .header{background:#fff;padding:10px 16px 8px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #e8e6e0;flex-shrink:0}
    .back-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid #e8e6e0;background:#f5f5f0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;text-decoration:none}
    .header-title{font-size:15px;font-weight:600}
    .content{flex:1;overflow-y:auto;padding:14px 14px 32px;display:flex;flex-direction:column;gap:14px}

    /* SECTION */
    .section-header{display:flex;justify-content:space-between;align-items:center}
    .section-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px}
    .section-add{padding:5px 12px;border-radius:20px;border:0.5px solid #1D9E75;background:#E1F5EE;color:#085041;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}

    /* CARD LIST */
    .card-list{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;overflow:hidden}
    .card-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:0.5px solid #e8e6e0;cursor:pointer}
    .card-row:last-child{border-bottom:none}
    .card-row:active{background:#f5f5f0}
    .card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .card-info{flex:1;min-width:0}
    .card-name{font-size:14px;font-weight:500}
    .card-sub{font-size:12px;color:#888;margin-top:2px}
    .card-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
    .badge-owner{background:#EEEDFE;color:#3C3489}
    .badge-manager{background:#E6F1FB;color:#0C447C}
    .badge-staff{background:#f5f5f0;color:#888}
    .badge-active{background:#E1F5EE;color:#085041}
    .badge-inactive{background:#FCEBEB;color:#A32D2D}
    .chevron{color:#bbb}

    /* SETTINGS FORM */
    .settings-card{background:#fff;border-radius:14px;border:0.5px solid #e8e6e0;padding:14px;display:flex;flex-direction:column;gap:12px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:#888;font-weight:500}
    .field input,.field select{width:100%;padding:11px 14px;border:0.5px solid #e8e6e0;border-radius:12px;font-size:15px;color:#1a1a18;background:#f5f5f0;font-family:inherit}
    .field input:focus,.field select:focus{outline:none;border-color:#1D9E75;background:#fff}
    .save-btn{padding:12px;border-radius:12px;border:none;background:#1D9E75;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .save-btn:active{background:#0F6E56}

    /* OVERLAY */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;max-height:90dvh;overflow-y:auto}
    .sheet-title{font-size:15px;font-weight:600}
    .sheet-sub{font-size:13px;color:#888;margin-top:-8px}
    .sheet-btn{padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sheet-btn.primary{background:#1D9E75;color:#fff}
    .sheet-btn.primary:active{background:#0F6E56}
    .sheet-btn.danger{background:#FCEBEB;color:#A32D2D}
    .sheet-btn.secondary{background:#f5f5f0;color:#1a1a18;border:0.5px solid #e8e6e0}
    .divider{height:0.5px;background:#e8e6e0;margin:4px 0}

    .info-box{background:#E6F1FB;border-radius:10px;padding:10px 14px;font-size:12px;color:#0C447C;line-height:1.6}
    .qr-preview{display:flex;flex-direction:column;align-items:center;gap:8px;background:#f5f5f0;border-radius:12px;padding:14px}
    .qr-preview img{width:160px;height:160px;border-radius:8px;border:0.5px solid #e8e6e0;background:#fff}
    .recipe-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid #e8e6e0}
    .recipe-row:last-child{border-bottom:none}
    .recipe-name{flex:1;font-size:13px;color:#888}
    .recipe-inputs{display:flex;gap:6px;align-items:center}
    .recipe-inputs input{width:70px;padding:6px 8px;border:0.5px solid #e8e6e0;border-radius:8px;font-size:13px;background:#f5f5f0;font-family:inherit;text-align:right}
    .recipe-unit{font-size:12px;color:#888;white-space:nowrap}

    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0;gap:8px;color:#bbb;font-size:13px}
    .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:400}
  </style>
</head>
<body>

<div class="header">
  <a href="../home/index.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <span class="header-title">Cài đặt</span>
</div>

<div class="content" id="content"><div style="text-align:center;padding:32px;color:#bbb;font-size:13px">Đang tải...</div></div>

<!-- Tài khoản sheet -->
<div class="overlay" id="userOverlay" onclick="hideUser()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="userSheetTitle">Thêm tài khoản</div>
    <input type="hidden" id="editUserId">
    <div class="field"><label>Tên hiển thị</label><input type="text" id="uName" placeholder="Nguyễn Văn A"></div>
    <div class="field"><label>Tài khoản đăng nhập</label><input type="text" id="uUsername" placeholder="staff01" autocapitalize="none"></div>
    <div class="field"><label>Mật khẩu</label><input type="password" id="uPassword" placeholder="Để trống = không đổi mật khẩu"></div>
    <div class="field"><label>Vai trò</label>
      <select id="uRole">
        <option value="staff">Nhân viên (staff)</option>
        <option value="manager">Quản lý (manager)</option>
        <option value="owner">Chủ (owner)</option>
      </select>
    </div>
    <div class="field"><label>Trạng thái</label>
      <select id="uActive">
        <option value="true">Đang hoạt động</option>
        <option value="false">Đã khoá</option>
      </select>
    </div>
    <button class="sheet-btn primary" onclick="saveUser()">Lưu tài khoản</button>
    <button class="sheet-btn danger" id="delUserBtn" style="display:none" onclick="deleteUser()">Xoá tài khoản này</button>
    <button class="sheet-btn secondary" onclick="hideUser()">Huỷ</button>
  </div>
</div>

<!-- Đổi mật khẩu bản thân -->
<div class="overlay" id="pwOverlay" onclick="hidePw()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title">Đổi mật khẩu</div>
    <div class="field"><label>Mật khẩu hiện tại</label><input type="password" id="pwCurrent" placeholder="Nhập mật khẩu hiện tại"></div>
    <div class="field"><label>Mật khẩu mới</label><input type="password" id="pwNew" placeholder="Mật khẩu mới"></div>
    <div class="field"><label>Xác nhận mật khẩu mới</label><input type="password" id="pwConfirm" placeholder="Nhập lại mật khẩu mới"></div>
    <button class="sheet-btn primary" onclick="savePassword()">Đổi mật khẩu</button>
    <button class="sheet-btn secondary" onclick="hidePw()">Huỷ</button>
  </div>
</div>

<!-- Sản phẩm sheet -->
<div class="overlay" id="productOverlay" onclick="hideProduct()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="productSheetTitle">Thêm sản phẩm</div>
    <input type="hidden" id="editProductId">
    <div class="field"><label>Tên sản phẩm</label><input type="text" id="pName" placeholder="Cà phê đen"></div>
    <div class="field"><label>Danh mục</label><input type="text" id="pCategory" placeholder="Cà phê"></div>
    <div class="field"><label>Giá bán (₫)</label><input type="number" id="pPrice" placeholder="0" min="0" step="500"></div>
    <div class="field"><label>Icon (emoji)</label><input type="text" id="pIcon" placeholder="☕"></div>
    <div class="field"><label>Màu nền (hex)</label><input type="text" id="pColor" placeholder="#FAEEDA"></div>
    <div class="field"><label>Trạng thái</label>
      <select id="pActive">
        <option value="true">Đang bán</option>
        <option value="false">Tạm ngưng</option>
      </select>
    </div>
    <div class="divider"></div>
    <div style="font-size:13px;font-weight:600">Công thức nguyên liệu</div>
    <div id="recipeEditor"></div>
    <button class="sheet-btn primary" onclick="saveProduct()">Lưu sản phẩm</button>
    <button class="sheet-btn danger" id="delProductBtn" style="display:none" onclick="deleteProduct()">Xoá sản phẩm</button>
    <button class="sheet-btn secondary" onclick="hideProduct()">Huỷ</button>
  </div>
</div>

<!-- Nhà cung cấp sheet -->
<div class="overlay" id="supplierOverlay" onclick="hideSupplier()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="supplierSheetTitle">Thêm nhà cung cấp</div>
    <input type="hidden" id="editSupplierId">
    <div class="field"><label>Mã NCC</label><input type="text" id="sCode" placeholder="NCC-001"></div>
    <div class="field"><label>Tên nhà cung cấp</label><input type="text" id="sName" placeholder="Nhà cung cấp ABC"></div>
    <div class="field"><label>Số điện thoại</label><input type="tel" id="sPhone" placeholder="0901234567"></div>
    <div class="field"><label>Email</label><input type="text" id="sEmail" placeholder="ncc@example.com"></div>
    <div class="field"><label>Địa chỉ</label><input type="text" id="sAddress" placeholder="123 Đường..."></div>
    <div class="field"><label>Kênh mua hàng</label>
      <select id="sPlatform">
        <option value="direct">Trực tiếp</option>
        <option value="shopee">Shopee</option>
        <option value="lazada">Lazada</option>
        <option value="tiktok">TikTok Shop</option>
        <option value="other">Khác</option>
      </select>
    </div>
    <div class="field"><label>Link shop / sàn TMĐT</label><input type="text" id="sPlatformUrl" placeholder="https://..."></div>
    <div class="field"><label>Ghi chú</label><input type="text" id="sNote" placeholder=""></div>
    <div class="field"><label>Trạng thái</label>
      <select id="sActive">
        <option value="true">Đang hợp tác</option>
        <option value="false">Ngưng hợp tác</option>
      </select>
    </div>
    <button class="sheet-btn primary" onclick="saveSupplier()">Lưu nhà cung cấp</button>
    <button class="sheet-btn danger" id="delSupplierBtn" style="display:none" onclick="deleteSupplier()">Xoá nhà cung cấp này</button>
    <button class="sheet-btn secondary" onclick="hideSupplier()">Huỷ</button>
  </div>
</div>

<!-- SKU sheet -->
<div class="overlay" id="skuOverlay" onclick="hideSku()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-title" id="skuSheetTitle">Thêm SKU</div>
    <input type="hidden" id="editSkuId">
    <div class="field"><label>Mã SKU</label><input type="text" id="skuCode" placeholder="NVL-001"></div>
    <div class="field"><label>Tên SKU</label><input type="text" id="skuName" placeholder="Sữa tươi Mlekovita"></div>
    <div class="field"><label>Loại</label>
      <select id="skuType" onchange="onSkuTypeChange()">
        <option value="raw">Nguyên liệu thô (NVL)</option>
        <option value="supply">Vật tư tiêu hao (VTU)</option>
        <option value="equipment">Dụng cụ thiết bị (CCU)</option>
      </select>
    </div>
    <div class="field"><label>Map về nguyên liệu / vật tư</label>
      <select id="skuMapTo" onchange="onSkuMapToChange()"></select>
    </div>
    <div class="field"><label>Đơn vị cơ bản</label><input type="text" id="skuBaseUnit" placeholder="ml" readonly style="color:#888"></div>
    <div class="divider"></div>
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">Đơn vị tính</div>
    <div id="skuUnitsEditor"></div>
    <button class="sheet-btn primary" onclick="saveSku()">Lưu SKU</button>
    <button class="sheet-btn danger" id="delSkuBtn" style="display:none" onclick="deleteSku()">Xoá SKU này</button>
    <button class="sheet-btn secondary" onclick="hideSku()">Huỷ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../lib/supabase.js"></script>
<script src="../auth/auth.js"></script>
<script>
  Auth.require('pos'); // tất cả roles đều vào được, nhưng chức năng bị giới hạn theo role
  const session = Auth.getSession();
  const role    = Auth.getRole();
  const isOwner = role === 'owner';
  const fmt     = n => n.toLocaleString('vi-VN') + ' ₫';

  let USERS=[], PRODUCTS=[], RAW_MATERIALS=[], SEMI_PRODUCTS=[], SETTINGS={}, SUPPLIERS=[], SKU_ITEMS=[], SUPPLIES=[];
  let editingUserId=null, editingProductId=null, currentRecipes=[];

  async function init(){
    try {
      const loads = [
        DB.select('settings','select=*'),
        DB.select('products','select=*&order=sort_order.asc'),
        DB.select('raw_materials','select=*&order=name.asc'),
        DB.select('semi_products','select=*&order=name.asc'),
      ];
      if(isOwner){
        loads.push(DB.select('users','select=*&order=role.asc,name.asc'));
        loads.push(DB.select('suppliers','select=*&order=code.asc'));
        loads.push(DB.select('sku_items','select=*&order=sku_code.asc'));
        loads.push(DB.select('supplies','select=*&order=name.asc'));
      }
      const results = await Promise.all(loads);
      results[0].forEach(s=>SETTINGS[s.key]=s.value);
      PRODUCTS = results[1];
      RAW_MATERIALS = results[2];
      SEMI_PRODUCTS = results[3];
      if(isOwner){ USERS=results[4]||[]; SUPPLIERS=results[5]||[]; SKU_ITEMS=results[6]||[]; SUPPLIES=results[7]||[]; }
      render();
    } catch(e){ document.getElementById('content').innerHTML=`<div style="text-align:center;padding:32px;color:#E24B4A;font-size:13px">Lỗi: ${e.message}</div>`; }
  }

  function render(){
    const el = document.getElementById('content');
    let html = '';

    // ── ĐỔI MẬT KHẨU (tất cả roles) ──
    html += `<div>
      <div class="section-header"><span class="section-title">Tài khoản của tôi</span></div>
      <div class="card-list" style="margin-top:8px">
        <div class="card-row" onclick="showPw()">
          <div class="card-icon" style="background:#E1F5EE">🔑</div>
          <div class="card-info">
            <div class="card-name">Đổi mật khẩu</div>
            <div class="card-sub">${session?.name} · ${role}</div>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>`;

    // ── QUẢN LÝ TÀI KHOẢN (owner only) ──
    if(isOwner){
      html += `<div>
        <div class="section-header">
          <span class="section-title">Quản lý tài khoản</span>
          <button class="section-add" onclick="showUser()">+ Thêm</button>
        </div>
        <div class="card-list" style="margin-top:8px">
          ${USERS.map(u=>`<div class="card-row" onclick="showUser('${u.id}')">
            <div class="card-icon" style="background:#f5f5f0">👤</div>
            <div class="card-info">
              <div class="card-name">${u.name}</div>
              <div class="card-sub">@${u.username}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="card-badge badge-${u.role}">${u.role}</span>
              ${!u.active?'<span class="card-badge badge-inactive">Khoá</span>':''}
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }

    // ── QUẢN LÝ MENU (owner only) ──
    if(isOwner){
      html += `<div>
        <div class="section-header">
          <span class="section-title">Menu & Sản phẩm</span>
          <button class="section-add" onclick="showProduct()">+ Thêm</button>
        </div>
        <div class="card-list" style="margin-top:8px">
          ${PRODUCTS.map(p=>`<div class="card-row" onclick="showProduct('${p.id}')">
            <div class="card-icon" style="background:${p.color||'#f5f5f0'}">${p.icon||'☕'}</div>
            <div class="card-info">
              <div class="card-name">${p.name}</div>
              <div class="card-sub">${fmt(p.price)} · ${p.category}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="card-badge ${p.active?'badge-active':'badge-inactive'}">${p.active?'Đang bán':'Tạm ngưng'}</span>
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }

    // ── CÀI ĐẶT THANH TOÁN (owner only) ──
    if(isOwner){
      const bankId = SETTINGS.bank_id||'ACB';
      const accountNo = SETTINGS.account_no||'';
      const accountName = SETTINGS.account_name||'';
      const content = SETTINGS.transfer_content||'Thanh toan don hang';
      const qrUrl = accountNo && accountNo !== 'XXXXXXXXXX'
        ? `https://img.vietqr.io/image/${bankId}-${accountNo}-compact2.jpg?amount=0&addInfo=${encodeURIComponent(content)}&accountName=${encodeURIComponent(accountName)}`
        : '';
      html += `<div>
        <div class="section-header"><span class="section-title">Thanh toán QR</span></div>
        <div class="settings-card" style="margin-top:8px">
          <div class="field"><label>Ngân hàng (Bank ID)</label>
            <select id="bankId">
              ${['ACB','VCB','TCB','MB','VPB','BIDV','CTG','STB','OCB','MSB','TPB'].map(b=>`<option value="${b}" ${bankId===b?'selected':''}>${b}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>Số tài khoản</label><input type="text" id="accountNo" value="${accountNo}" placeholder="Số tài khoản"></div>
          <div class="field"><label>Tên chủ tài khoản (IN HOA, không dấu)</label><input type="text" id="accountName" value="${accountName}" placeholder="NGUYEN VAN A"></div>
          <div class="field"><label>Nội dung chuyển khoản mặc định</label><input type="text" id="transferContent" value="${content}" placeholder="Thanh toan don hang"></div>
          ${qrUrl?`<div class="qr-preview"><img src="${qrUrl}" alt="QR preview"><div style="font-size:12px;color:#888">Preview QR (số tiền thực tế sẽ điền tự động)</div></div>`:''}
          <button class="save-btn" onclick="savePaymentSettings()">Lưu cài đặt thanh toán</button>
        </div>
      </div>`;
    }

    // ── CÀI ĐẶT HỆ THỐNG (owner only) ──
    if(isOwner){
      html += `<div>
        <div class="section-header"><span class="section-title">Cài đặt hệ thống</span></div>
        <div class="settings-card" style="margin-top:8px">
          <div class="field"><label>Giờ mở bán</label>
            <select id="openHour">
              ${Array.from({length:12},(_,i)=>i+5).map(h=>`<option value="${h}" ${(SETTINGS.open_hour||'6')==String(h)?'selected':''}>${String(h).padStart(2,'0')}:00</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>Giờ đóng bán</label>
            <select id="closeHour">
              ${Array.from({length:12},(_,i)=>i+8).map(h=>`<option value="${h}" ${(SETTINGS.close_hour||'10')==String(h)?'selected':''}>${String(h).padStart(2,'0')}:00</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>Ngưỡng trễ chấp nhận (phút)</label>
            <input type="number" id="lateGrace" value="${SETTINGS.late_grace_minutes||15}" min="0" max="60">
          </div>
          <button class="save-btn" onclick="saveSystemSettings()">Lưu cài đặt hệ thống</button>
        </div>
      </div>`;
    }

    // ── QUẢN LÝ NHÀ CUNG CẤP (owner only) ──
    if(isOwner){
      html += `<div>
        <div class="section-header">
          <span class="section-title">Nhà cung cấp</span>
          <button class="section-add" onclick="showSupplier()">+ Thêm</button>
        </div>
        <div class="card-list" style="margin-top:8px">

  // ── HELPER SUPPLIER & SKU ──
  function platformLabel(p){ return {direct:'Trực tiếp',shopee:'Shopee',lazada:'Lazada',tiktok:'TikTok',other:'Khác'}[p]||p||''; }
  function skuTypeLabel(t){ return {raw:'Nguyên liệu',supply:'Vật tư',equipment:'Thiết bị'}[t]||t||''; }
  function skuTypeBg(t){ return {raw:'#E1F5EE',supply:'#E6F1FB',equipment:'#F5F0FF'}[t]||'#f5f5f0'; }
  function skuTypeIcon(t){ return {raw:'🌿',supply:'📦',equipment:'🔧'}[t]||'📦'; }
  function skuMapName(s){
    if(!s.map_to_id) return '';
    const r = RAW_MATERIALS.find(x=>x.id===s.map_to_id);
    if(r) return r.name;
    const sp = SUPPLIES.find(x=>x.id===s.map_to_id);
    return sp?sp.name:'';
  }
  function nextSupplierCode(){
    const nums = SUPPLIERS.map(s=>parseInt((s.code||'').replace('NCC-',''))||0);
    return 'NCC-'+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
  }
  function nextSkuCode(type){
    const prefix = type==='raw'?'NVL':type==='supply'?'VTU':'CCU';
    const nums = SKU_ITEMS.filter(s=>(s.sku_code||'').startsWith(prefix+'-')).map(s=>parseInt(s.sku_code.slice(4))||0);
    return prefix+'-'+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
  }
  function buildSkuMapOptions(type){
    const items = type==='supply'
      ? SUPPLIES.map(x=>({id:x.id,name:x.name,unit:x.unit}))
      : RAW_MATERIALS.map(x=>({id:x.id,name:x.name,unit:x.unit}));
    return '<option value="">— Không map —</option>'+items.map(x=>`<option value="${x.id}" data-unit="${x.unit||''}">${x.name}</option>`).join('');
  }

    } catch(e){ toast('Lỗi: '+e.message); }
  }

  async function deleteSku(){
    if(!editingSkuId) return;
    try {
      await DB.delete('sku_units', `sku_id=eq.${editingSkuId}`);
      await DB.delete('sku_items', `id=eq.${editingSkuId}`);
      hideSku(); toast('Đã xoá SKU');
      SKU_ITEMS = await DB.select('sku_items','select=*&order=sku_code.asc');
      render();
    } catch(e){ toast('Lỗi: '+e.message); }
  }

  init();
</script>
</body>
